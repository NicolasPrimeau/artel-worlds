app = "artel-herald"
primary_region = "yyz"

[build]
  dockerfile = "Dockerfile.herald"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 400
    soft_limit = 300

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0b0f">
<title>Artel Worlds — World 1</title>
<style>
  :root {
    --bg: #0a0b0f; --panel: rgba(16,18,24,.85); --line: #1c2129;
    --fg: #d7dce5; --dim: #717b8c; --accent: #7fd1a8;
    --up: #6fd58a; --down: #e08a8a;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--bg); color: var(--fg); overflow: hidden;
    font: 13px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    display: flex; flex-direction: column; height: 100dvh;
  }
  header {
    flex: 0 0 auto; display: flex; flex-wrap: wrap; align-items: center;
    gap: 4px 16px; padding: 10px 14px; border-bottom: 1px solid var(--line);
    padding-top: max(10px, env(safe-area-inset-top));
  }
  header h1 {
    font-size: 13px; margin: 0 4px 0 0; letter-spacing: 2px; font-weight: 700; color: #fff;
  }
  header h1 span { color: var(--dim); font-weight: 400; letter-spacing: 1px; }
  .stat { color: var(--dim); white-space: nowrap; }
  .stat b { color: #fff; font-weight: 600; font-variant-numeric: tabular-nums; }
  .up { color: var(--up); } .down { color: var(--down); }
  #spark { width: 92px; height: 22px; display: block; opacity: .9; }
  #conn { margin-left: auto; }
  #conn.live { color: var(--accent); } #conn.live::before { content: "● "; }
  #conn.down { color: #d98a8a; }

  #wrap { position: relative; flex: 1 1 auto; min-height: 0; }
  canvas#c { display: block; width: 100%; height: 100%; touch-action: none; }

  #legend {
    position: absolute; left: 10px; bottom: calc(10px + env(safe-area-inset-bottom));
    background: var(--panel); border: 1px solid var(--line); border-radius: 8px;
    padding: 8px 10px; backdrop-filter: blur(6px); max-width: 46vw;
    pointer-events: none; font-size: 11px; color: var(--dim); line-height: 1.7;
  }
  #legend .row { display: flex; align-items: center; gap: 7px; }
  #legend .sw { width: 11px; height: 11px; border-radius: 50%; flex: 0 0 auto; }
  #legend .sw.ring { background: #1a1c22; box-shadow: 0 0 0 2px #fff inset; }
  #legend .bar, #legend .barn { width: 38px; height: 8px; border-radius: 2px; flex: 0 0 auto; }
  #legend .barn { background: linear-gradient(90deg, #11141a, #1f9d5c, #28b86b); }
  #legend .bar { background: linear-gradient(90deg, #1f9d5c, #e6aa28, #ef5a28, #ff2417); }
  #legend .t { color: var(--fg); font-weight: 600; letter-spacing: .5px; display: block; margin-bottom: 3px; }

  #tip {
    position: fixed; z-index: 10; pointer-events: none; opacity: 0; transition: opacity .08s;
    background: var(--panel); border: 1px solid #2b323d; border-radius: 8px; padding: 8px 10px;
    backdrop-filter: blur(8px); box-shadow: 0 6px 22px rgba(0,0,0,.5); font-size: 12px; max-width: 240px;
  }
  #tip.show { opacity: 1; }
  #tip.pinned { border-color: var(--accent); }
  #tip .hd { font-weight: 700; color: #fff; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
  #tip .dot { width: 10px; height: 10px; border-radius: 50%; flex: 0 0 auto; }
  #tip .badge { font-size: 10px; padding: 1px 5px; border-radius: 4px; background: #243; color: var(--accent); letter-spacing: .5px; }
  #tip .badge.house { background: #222733; color: var(--dim); }
  #tip .pin { font-size: 10px; color: var(--accent); margin-left: auto; }
  #tip table { border-collapse: collapse; }
  #tip td { padding: 1px 0; color: var(--dim); }
  #tip td.v { color: var(--fg); text-align: right; padding-left: 14px; font-variant-numeric: tabular-nums; }
  #tip .delta { font-size: 10px; }
  #tip .dna { margin-top: 7px; border-top: 1px solid #2b323d; padding-top: 6px; }
  #tip .dna .lbl { color: var(--dim); font-size: 10px; letter-spacing: .5px; margin-bottom: 4px; }
  #tip .dna .bc { display: flex; gap: 1px; height: 13px; border-radius: 3px; overflow: hidden; margin-bottom: 6px; }
  #tip .dna .bc i { flex: 1 1 0; min-width: 3px; }
  #tip .dna .rule { display: flex; align-items: flex-start; gap: 6px; color: var(--dim); font-size: 11px; line-height: 1.5; }
  #tip .dna .rule .vd { width: 7px; height: 7px; border-radius: 2px; margin-top: 4px; flex: 0 0 auto; }
  #tip .dna .rule b { color: var(--fg); font-weight: 600; }
  #tip .dna .regs { display: flex; flex-wrap: wrap; gap: 4px 10px; margin-top: 6px; color: var(--dim); font-size: 10px; }

  #hint {
    position: absolute; right: 10px; bottom: calc(10px + env(safe-area-inset-bottom));
    color: var(--dim); font-size: 11px; pointer-events: none; opacity: .7;
  }
  @media (max-width: 560px) {
    header { gap: 2px 12px; padding: 8px 11px; }
    header h1 { width: 100%; margin-bottom: 2px; }
    #spark { display: none; }
    #conn { margin-left: 0; }
    #legend { font-size: 10px; } #hint { display: none; }
  }
</style>
</head>
<body>
<header>
  <h1>ARTEL WORLDS <span>· World 1</span></h1>
  <span class="stat">tick <b id="s_tick">—</b></span>
  <span class="stat">pop <b id="s_pop">—</b> <span id="s_bd"></span></span>
  <span class="stat">lineages <b id="s_lin">—</b></span>
  <span class="stat">energy <b id="s_en">—</b></span>
  <span class="stat">toxin <b id="s_tox">—</b></span>
  <span class="stat">players <b id="s_pl">—</b></span>
  <canvas id="spark" width="184" height="44" title="population over time"></canvas>
  <span class="stat" id="conn">connecting…</span>
</header>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="legend">
    <span class="t">LEGEND</span>
    <div class="row"><span class="sw" style="background:hsl(140 70% 55%)"></span> organism (color = lineage)</div>
    <div class="row"><span class="sw ring"></span> player-controlled agent</div>
    <div class="row"><span class="barn"></span> nutrient (food)</div>
    <div class="row"><span class="bar"></span> toxin&nbsp;→&nbsp;lethal</div>
  </div>
  <div id="hint">hover to inspect · click to pin, track &amp; read DNA</div>
</div>
<div id="tip"></div>
<script>
const $ = id => document.getElementById(id);
const cv = $('c'), ctx = cv.getContext('2d');
const scene = document.createElement('canvas'), sctx = scene.getContext('2d');
const heat = document.createElement('canvas'), hctx = heat.getContext('2d');
const spk = $('spark'), spc = spk.getContext('2d');
const tip = $('tip');

let snap = null, L = null, hits = [];
let dpr = 1, cssW = 0, cssH = 0;
let hoverId = null, pinnedId = null, pinnedLineage = 0;
let lastCursor = { x: 0, y: 0 };
let prevIds = null, diedTimer = null;
const popHist = [], HIST = 90;
const genomeCache = {};

const SQRT3 = Math.sqrt(3);
const hue = lin => (lin * 47) % 360;
const esc = s => String(s).replace(/[<>&]/g, c => ({ '<': '&lt;', '>': '&gt;', '&': '&amp;' }[c]));
const VERB_COLOR = { metabolize: '#3fb950', divide: '#4a9eff', migrate: '#e3a72c', dormant: '#8b949e' };

function fetchGenome(id) {
  if (genomeCache[id] !== undefined) return;
  genomeCache[id] = 'loading';
  fetch(`/organism/${id}`).then(r => (r.ok ? r.json() : null)).then(d => {
    genomeCache[id] = d ? d.genome : null; updateDisplay();
  }).catch(() => { genomeCache[id] = null; updateDisplay(); });
}
const condText = c => c ? `${c.variable.replace(/_/g, ' ')} ${c.op} ${c.threshold}` : '';
function dnaHTML(g) {
  const b = g.behaviors;
  const bars = b.map(x => `<i style="background:${VERB_COLOR[x.verb] || '#666'}" title="${esc(condText(x.cond1) + (x.cond2 ? ' & ' + condText(x.cond2) : ''))} → ${x.verb}(${x.target})"></i>`).join('');
  const rules = b.map(x => `<div class="rule"><span class="vd" style="background:${VERB_COLOR[x.verb] || '#666'}"></span>`
    + `<span><b>${x.verb}</b> → ${x.target}<br><span style="opacity:.8">if ${esc(condText(x.cond1))}${x.cond2 ? ' &amp; ' + esc(condText(x.cond2)) : ''}</span></span></div>`).join('');
  const regs = Object.entries(g.regulators).map(([k, v]) => `${k.replace(/_/g, ' ')} <b style="color:var(--fg)">${v}</b>`).join('');
  return `<div class="dna"><div class="lbl">⬡ DNA · ${b.length} gene${b.length !== 1 ? 's' : ''} · first match wins</div>`
    + `<div class="bc">${bars}</div>${rules}<div class="regs">${regs}</div></div>`;
}

function decodeField(b64) {
  const bin = atob(b64), n = bin.length, out = new Uint8Array(n);
  for (let i = 0; i < n; i++) out[i] = bin.charCodeAt(i);
  return out;
}

function resize() {
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  const wrap = $('wrap');
  cssW = wrap.clientWidth; cssH = wrap.clientHeight;
  for (const cnv of [cv, scene]) { cnv.width = Math.round(cssW * dpr); cnv.height = Math.round(cssH * dpr); }
  cv.style.width = scene.style.width = cssW + 'px';
  cv.style.height = scene.style.height = cssH + 'px';
  if (snap) { computeLayout(); render(); updateDisplay(); }
}

function computeLayout() {
  const cols = snap.width, rows = snap.height;
  const size = Math.min(cssW / (SQRT3 * (cols + 0.5)), cssH / (1.5 * rows + 0.5));
  const gridW = SQRT3 * size * (cols + 0.5), gridH = (1.5 * rows + 0.5) * size;
  L = { size, gridW, gridH, offX: (cssW - gridW) / 2, offY: (cssH - gridH) / 2 };
}

function center(q, r) {
  return [L.offX + SQRT3 * L.size * (q + 0.5 * (r & 1) + 0.5), L.offY + L.size * (1.5 * r + 1)];
}

// Health-map field: green = fertile substrate, reddening toward lethal toxin.
function buildHeat() {
  const cols = snap.width, rows = snap.height;
  heat.width = cols; heat.height = rows;
  const img = hctx.createImageData(cols, rows), d = img.data;
  const tox = decodeField(snap.toxin), nut = decodeField(snap.nutrient);
  const tmax = snap.toxin_max, nmax = snap.nutrient_max, lethal = snap.toxin_lethal;
  for (let q = 0; q < cols; q++) {
    for (let r = 0; r < rows; r++) {
      const idx = q * rows + r;
      const nf = nut[idx] / nmax;
      let R = 11, G = 15, B = 18;                       // barren
      const g = Math.pow(nf, 0.85) * 0.82;              // fertility -> green
      R += (28 - R) * g; G += (170 - G) * g; B += (96 - B) * g;
      const tx = tox[idx];
      if (tx > 0) {                                     // toxin reddens the cell
        const td = Math.min(1, tx / lethal);
        const cr = 232 + 23 * td, cg = 162 - 117 * td, cb = 36 - 8 * td;
        const w = Math.min(0.92, 0.22 + td * 0.78);
        R += (cr - R) * w; G += (cg - G) * w; B += (cb - B) * w;
        if (tx >= lethal) {                             // past lethal: hotter core
          const o = Math.min(1, (tx - lethal) / lethal);
          R += (255 - R) * o * 0.5; G *= 1 - o * 0.35; B *= 1 - o * 0.35;
        }
      }
      const p = (r * cols + q) * 4;
      d[p] = R; d[p + 1] = G; d[p + 2] = B; d[p + 3] = 255;
    }
  }
  hctx.putImageData(img, 0, 0);
}

function render() {
  if (!snap || !L) return;
  sctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  sctx.fillStyle = '#070809'; sctx.fillRect(0, 0, cssW, cssH);
  sctx.imageSmoothingEnabled = true; sctx.imageSmoothingQuality = 'high';
  sctx.drawImage(heat, L.offX, L.offY, L.gridW, L.gridH);

  hits = [];
  const rad = Math.max(1.6, L.size * 0.62);
  for (const o of snap.organisms) {
    const [x, y] = center(o.q, o.r);
    sctx.beginPath(); sctx.arc(x, y, rad, 0, 7);
    sctx.fillStyle = `hsl(${hue(o.lineage)} 72% ${42 + Math.min(28, o.energy / 3)}%)`;
    sctx.fill();
    if (o.agent) { sctx.lineWidth = Math.max(1, rad * 0.4); sctx.strokeStyle = '#fff'; sctx.stroke(); }
    hits.push({ x, y, r: rad, o });
  }
  blit();
}

function ring(id, color, pad) {
  const h = hits.find(h => h.o.id === id); if (!h) return;
  ctx.beginPath(); ctx.arc(h.x, h.y, h.r + pad, 0, 7);
  ctx.lineWidth = 2; ctx.strokeStyle = color; ctx.stroke();
}
function blit() {
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.clearRect(0, 0, cv.width, cv.height);
  ctx.drawImage(scene, 0, 0);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  if (pinnedId != null) ring(pinnedId, getComputedStyle(document.body).getPropertyValue('--accent'), 4);
  if (hoverId != null && hoverId !== pinnedId) ring(hoverId, '#fff', 3.5);
}

function pick(px, py) {
  let best = null, bd = Infinity;
  for (const h of hits) {
    const dx = px - h.x, dy = py - h.y, d = dx * dx + dy * dy, reach = Math.max(h.r + 6, 13);
    if (d < reach * reach && d < bd) { bd = d; best = h; }
  }
  return best;
}

function tipHTML(o, pinned) {
  const idx = o.q * snap.height + o.r;
  const tox = decodeField(snap.toxin)[idx], nut = decodeField(snap.nutrient)[idx];
  const player = !!o.agent;
  return `<div class="hd"><span class="dot" style="background:hsl(${hue(o.lineage)} 72% 60%)"></span>`
    + `lineage #${o.lineage}<span class="badge ${player ? '' : 'house'}">${player ? 'PLAYER' : 'HOUSE'}</span>`
    + (pinned ? `<span class="pin">📌 tracking</span>` : '') + `</div><table>`
    + (player ? `<tr><td>agent</td><td class="v">${esc(o.agent)}</td></tr>` : '')
    + `<tr><td>energy</td><td class="v">${o.energy}</td></tr>`
    + `<tr><td>age</td><td class="v">${o.age} ticks</td></tr>`
    + `<tr><td>cell</td><td class="v">${o.q}, ${o.r}</td></tr>`
    + `<tr><td>nutrient here</td><td class="v">${nut}</td></tr>`
    + `<tr><td>toxin here</td><td class="v">${tox}${tox >= snap.toxin_lethal ? ' ☠' : ''}</td></tr></table>`
    + (pinned ? dnaSection(o.id) : '');
}
function dnaSection(id) {
  const g = genomeCache[id];
  if (g && g !== 'loading') return dnaHTML(g);
  if (g === null) return '';
  return `<div class="dna"><div class="lbl">⬡ decoding DNA…</div></div>`;
}

function place(clientX, clientY) {
  const r = tip.getBoundingClientRect();
  let tx = clientX + 16, ty = clientY + 16;
  if (tx + r.width > innerWidth - 8) tx = clientX - r.width - 16;
  if (ty + r.height > innerHeight - 8) ty = clientY - r.height - 16;
  tip.style.left = Math.max(8, tx) + 'px'; tip.style.top = Math.max(8, ty) + 'px';
}

// Decide what the tooltip shows: live hover (at cursor) else pinned (follows organism).
function updateDisplay() {
  if (hoverId != null) {
    const h = hits.find(x => x.o.id === hoverId);
    if (h) { tip.className = 'show'; tip.innerHTML = tipHTML(h.o, false); place(lastCursor.x, lastCursor.y); return; }
  }
  if (pinnedId != null) {
    const h = hits.find(x => x.o.id === pinnedId);
    if (h) {
      const r = cv.getBoundingClientRect();
      tip.className = 'show pinned'; tip.innerHTML = tipHTML(h.o, true);
      place(r.left + h.x, r.top + h.y); return;
    }
  }
  tip.className = '';
}

function announceDeath() {
  const r = cv.getBoundingClientRect();
  tip.className = 'show pinned';
  tip.innerHTML = `<div class="hd"><span class="dot" style="background:hsl(${hue(pinnedLineage)} 72% 60%)"></span>`
    + `lineage #${pinnedLineage}<span class="pin">✝ died</span></div>`
    + `<div style="color:var(--dim)">organism #${pinnedId} died at tick ${snap.tick}</div>`;
  place(r.left + cssW / 2, r.top + cssH / 2);
  clearTimeout(diedTimer);
  diedTimer = setTimeout(() => { pinnedId = null; updateDisplay(); blit(); }, 2600);
}

function onMove(e) {
  lastCursor = { x: e.clientX, y: e.clientY };
  const rect = cv.getBoundingClientRect();
  const h = pick(e.clientX - rect.left, e.clientY - rect.top);
  const id = h ? h.o.id : null;
  if (id !== hoverId) { hoverId = id; blit(); }
  updateDisplay();
}
function togglePin(h) {
  if (h && pinnedId === h.o.id) { pinnedId = null; }
  else if (h) { pinnedId = h.o.id; pinnedLineage = h.o.lineage; clearTimeout(diedTimer); fetchGenome(h.o.id); }
  else { pinnedId = null; }
}

cv.addEventListener('pointermove', e => { if (e.pointerType === 'mouse') onMove(e); });
cv.addEventListener('pointerleave', e => { if (e.pointerType === 'mouse') { hoverId = null; updateDisplay(); blit(); } });
cv.addEventListener('pointerdown', e => {
  const rect = cv.getBoundingClientRect();
  const h = pick(e.clientX - rect.left, e.clientY - rect.top);
  if (e.pointerType !== 'mouse') { e.preventDefault(); hoverId = null; lastCursor = { x: e.clientX, y: e.clientY }; }
  togglePin(h);
  updateDisplay(); blit();
});
document.addEventListener('pointerdown', e => {
  if (e.pointerType !== 'mouse' && e.target !== cv && pinnedId != null) { pinnedId = null; updateDisplay(); blit(); }
});
addEventListener('keydown', e => { if (e.key === 'Escape') { pinnedId = null; hoverId = null; updateDisplay(); blit(); } });

function drawSpark() {
  const w = spk.width, h = spk.height, n = popHist.length;
  spc.clearRect(0, 0, w, h);
  if (n < 2) return;
  const mn = Math.min(...popHist), mx = Math.max(...popHist), span = mx - mn || 1, pad = 3;
  const X = i => (i / (n - 1)) * (w - 2 * pad) + pad;
  const Y = v => h - pad - ((v - mn) / span) * (h - 2 * pad);
  spc.beginPath();
  popHist.forEach((v, i) => { const x = X(i), y = Y(v); i ? spc.lineTo(x, y) : spc.moveTo(x, y); });
  spc.strokeStyle = 'rgba(127,209,168,.9)'; spc.lineWidth = 2; spc.lineJoin = 'round'; spc.stroke();
  spc.lineTo(X(n - 1), h - pad); spc.lineTo(X(0), h - pad); spc.closePath();
  spc.fillStyle = 'rgba(127,209,168,.12)'; spc.fill();
  spc.beginPath(); spc.arc(X(n - 1), Y(popHist[n - 1]), 2.5, 0, 7);
  spc.fillStyle = '#bfe8d4'; spc.fill();
}

function apply(s) {
  const first = !snap || snap.width !== s.width;
  snap = s;
  if (!L || first) computeLayout();
  buildHeat(); render();

  const cur = new Set(s.organisms.map(o => o.id));
  let births = 0, deaths = 0;
  if (prevIds) { for (const id of cur) if (!prevIds.has(id)) births++; for (const id of prevIds) if (!cur.has(id)) deaths++; }
  prevIds = cur;
  popHist.push(s.population); if (popHist.length > HIST) popHist.shift();
  drawSpark();

  $('s_tick').textContent = s.tick;
  $('s_pop').textContent = s.population;
  $('s_bd').innerHTML = births || deaths
    ? `<span class="delta up">▲${births}</span> <span class="delta down">▼${deaths}</span>` : '';
  $('s_lin').textContent = s.lineages;
  $('s_en').textContent = s.avg_energy;
  $('s_tox').textContent = s.avg_toxin;
  $('s_pl').textContent = s.players;

  if (pinnedId != null && !cur.has(pinnedId)) announceDeath();
  else updateDisplay();
  blit();
}

function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const ws = new WebSocket(`${proto}://${location.host}/stream`);
  ws.onopen = () => { $('conn').textContent = 'live'; $('conn').className = 'stat live'; };
  ws.onmessage = e => apply(JSON.parse(e.data));
  ws.onclose = () => { $('conn').textContent = 'reconnecting…'; $('conn').className = 'stat down'; setTimeout(connect, 1500); };
  ws.onerror = () => ws.close();
}

new ResizeObserver(resize).observe($('wrap'));
resize();
connect();
</script>
</body>
</html>

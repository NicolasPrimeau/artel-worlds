app = "artel-vibequest"
primary_region = "yyz"

[build]
  dockerfile = "Dockerfile.vibequest"

[env]
  VIBEQUEST_NARRATION_MODEL = "groq:openai/gpt-oss-120b"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 400
    soft_limit = 300

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[checks]
  [checks.health]
    grace_period = "10s"
    interval = "15s"
    method = "GET"
    path = "/health"
    port = 8000
    timeout = "5s"
    type = "http"

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<title>Alibi · Outpost 31</title>
<style>
  :root{ --panel:rgba(12,18,30,.78); --line:rgba(120,160,220,.16); --ink:#e7eefc; --dim:#8aa0c4;
    --warn:#ff5a5a; --good:#39d98a; --frost:#bfe0ff; }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:#04070d;color:var(--ink);
    font:14px/1.4 "Inter",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;overflow:hidden;-webkit-font-smoothing:antialiased}
  #stage{position:fixed;inset:0}
  canvas{position:absolute;inset:0;display:block;cursor:grab;touch-action:none}
  canvas:active{cursor:grabbing}
  .hud{position:fixed;top:0;left:0;right:0;height:52px;display:flex;align-items:center;gap:12px;
    padding:0 14px;background:linear-gradient(#060a12ee,#060a1200);z-index:10;pointer-events:none}
  .brand{font-weight:800;letter-spacing:.16em;font-size:14px}
  .brand small{color:var(--frost);font-weight:600;letter-spacing:.2em}
  .pill{display:flex;align-items:center;gap:7px;background:var(--panel);border:1px solid var(--line);
    border-radius:999px;padding:5px 10px;backdrop-filter:blur(8px);font-size:12px}
  .pill b{font-variant-numeric:tabular-nums}
  .taskbar{width:110px;height:7px;border-radius:999px;background:#16213a;overflow:hidden;border:1px solid var(--line)}
  .taskbar i{display:block;height:100%;background:linear-gradient(90deg,#2fa1ff,#39d98a);transition:width .4s}
  .spacer{flex:1}
  .hint{color:var(--dim);font-size:11px}
  .roster{position:fixed;left:12px;top:60px;width:172px;z-index:9;display:flex;flex-direction:column;gap:4px}
  .who{display:flex;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--line);
    border-radius:9px;padding:5px 8px;backdrop-filter:blur(8px);cursor:pointer;transition:border-color .15s,background .15s}
  .who:hover{border-color:rgba(150,200,255,.4)}
  .who.sel{border-color:rgba(150,215,255,.9);background:rgba(40,70,110,.55);box-shadow:0 0 12px rgba(120,200,255,.3)}
  .who .dot{width:11px;height:11px;border-radius:50%;flex:none;box-shadow:0 0 7px currentColor}
  .who .nm{font-weight:700;font-size:12px}.who .md{color:var(--dim);font-size:9.5px}
  .who.dead{opacity:.36}.who.dead .nm{text-decoration:line-through}

  /* meeting chat — docked panel, phalanx-style, map stays visible */
  #chat{position:fixed;right:12px;top:60px;bottom:12px;width:330px;max-width:42vw;z-index:12;
    background:var(--panel);border:1px solid var(--line);border-radius:14px;backdrop-filter:blur(12px);
    display:none;flex-direction:column;overflow:hidden}
  #chat.show{display:flex}
  #chat .ch{display:flex;align-items:center;gap:7px;padding:11px 13px;border-bottom:1px solid var(--line);
    font-size:10px;letter-spacing:.14em;color:var(--frost);font-weight:700}
  #chat .ch .dot{width:7px;height:7px;border-radius:50%;background:var(--warn);box-shadow:0 0 8px var(--warn);
    animation:pulse 1.1s infinite}
  @keyframes pulse{50%{opacity:.35}}
  #chat .lede{padding:8px 13px;color:var(--dim);font-size:11.5px;border-bottom:1px solid var(--line)}
  #clog{list-style:none;margin:0;padding:10px 12px;flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:8px}
  #clog li{font-size:12.5px;line-height:1.35;animation:cin .3s ease}
  @keyframes cin{from{opacity:0;transform:translateY(5px)}to{opacity:1}}
  #clog .who{display:inline;background:none;border:none;padding:0;font-weight:800;font-size:11.5px}
  #clog .md{color:var(--dim);font-size:9.5px;margin-left:5px}
  #clog .tx{display:block;color:#dfe8fb;margin-top:1px}
  #chat .verdict{padding:12px 13px;border-top:1px solid var(--line);text-align:center}
  #chat .verdict .big{font-size:15px;font-weight:800}
  #chat .verdict .big.thing{color:var(--warn)}#chat .verdict .big.clear{color:var(--good)}
  #chat .verdict .tally{color:var(--dim);font-size:10.5px;margin-top:5px;line-height:1.5}

  /* HUD right side — connection status + the crew-vs-Thing record (the world's uniform "results") */
  #conn{display:inline-flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:.09em;
    font-size:11px;font-weight:700;color:var(--dim)}
  #conn::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--dim)}
  #conn.live{color:var(--good)} #conn.live::before{background:var(--good);box-shadow:0 0 8px var(--good)}
  #conn.paused{color:#e8c24a} #conn.paused::before{background:#e8c24a}
  #conn.down{color:var(--warn)} #conn.down::before{background:var(--warn)}
  #wins{gap:6px} #wins .c b{color:var(--frost)} #wins .t b{color:var(--warn)} #wins s{color:var(--dim);text-decoration:none}
  /* footer — brand · links · share, dim with a frost hover (uniform across all Artel worlds) */
  #foot{position:fixed;left:0;right:0;bottom:0;z-index:8;display:flex;gap:16px;justify-content:center;
    align-items:center;flex-wrap:wrap;padding:9px 14px calc(9px + env(safe-area-inset-bottom));
    font-size:11px;color:var(--dim);background:linear-gradient(#060a1200,#060a12d9);pointer-events:none}
  #foot>*{pointer-events:auto}
  #foot .fbrand{white-space:nowrap;letter-spacing:.3px}
  #foot .fbrand b{color:var(--frost);font-weight:800;letter-spacing:.14em}
  #foot a,.share button{color:var(--dim);text-decoration:none;background:none;border:0;padding:0;font:inherit;
    cursor:pointer;white-space:nowrap;display:inline-flex;align-items:center;gap:5px;transition:color .15s}
  #foot a:hover,.share button:hover{color:var(--frost)}
  .share{position:relative}
  #sharepop[hidden]{display:none}
  #sharepop{position:absolute;bottom:150%;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;
    background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden;backdrop-filter:blur(10px)}
  #sharepop a,#sharepop button{background:none;border:0;border-bottom:1px solid var(--line);color:var(--dim);
    padding:9px 18px;font-size:12px;white-space:nowrap;text-align:left;cursor:pointer;font:inherit}
  #sharepop a:last-child,#sharepop button:last-child{border-bottom:0}
  #sharepop a:hover,#sharepop button:hover{background:rgba(120,160,220,.12);color:var(--ink)}
  /* ---- mobile: portrait AND landscape are both first-class ---- */
  @media (max-width:820px){ .hint{display:none} .hud{gap:8px;padding:0 10px} .pill{padding:4px 9px;font-size:11.5px}
    #wins{display:none} #foot{gap:13px;font-size:10px} #foot .fbrand{display:none} }
  /* phone portrait: chat is a bottom sheet, roster a slim scrollable strip up top-left */
  @media (orientation:portrait) and (max-width:760px){
    #chat{ left:8px; right:8px; width:auto; max-width:none; top:auto; bottom:8px; height:44vh; }
    .roster{ top:58px; width:auto; left:8px; right:8px; flex-direction:row; overflow-x:auto; gap:6px;
      padding-bottom:2px; -webkit-overflow-scrolling:touch; }
    .who{ flex:0 0 auto; } .who .md{ display:none; }
    .brand small{ display:none; }
  }
  /* phone landscape: chat docks right (narrow), roster left, both short */
  @media (orientation:landscape) and (max-height:560px){
    .hud{ height:42px; } .roster{ top:48px; width:138px; max-height:calc(100% - 56px); overflow-y:auto; }
    .who{ padding:4px 7px; } .who .md{ font-size:8.5px; }
    #chat{ top:48px; bottom:8px; right:8px; left:auto; width:300px; max-width:44vw; height:auto; }
  }
</style>
</head>
<body>
<div id="stage"><canvas id="map"></canvas></div>
<div class="hud">
  <div class="brand">ALIBI <small>· OUTPOST <b id="hud-outpost">31</b></small></div>
  <div class="pill">Round <b id="hud-round">1</b></div>
  <div class="pill">Tasks <div class="taskbar"><i id="hud-tasks" style="width:30%"></i></div></div>
  <div class="pill">Alive <b id="hud-alive">10</b>/<b id="hud-total">10</b></div>
  <div class="spacer"></div>
  <div class="pill" id="wins" title="games won — crew vs the Thing"><span class="c">CREW <b id="w-crew">0</b></span><s>·</s><span class="t"><b id="w-thing">0</b> THING</span></div>
  <div class="pill"><span id="conn" class="live">live</span></div>
</div>
<div class="roster" id="roster"></div>
<div id="chat">
  <div class="ch"><span class="dot"></span> <span id="chat-title">EMERGENCY MEETING</span></div>
  <div class="lede" id="chat-lede">—</div>
  <ul id="clog"></ul>
  <div class="verdict" id="chat-verdict" style="display:none"></div>
</div>
<footer id="foot">
  <a href="https://artel.run/ui?project=alibi#dashboard" target="_blank" rel="noopener">Artel</a>
  <a href="https://github.com/NicolasPrimeau/artel-worlds" target="_blank" rel="noopener">Source</a>
  <a href="https://worlds.artel.run/" target="_blank" rel="noopener">All worlds</a>
  <span class="share"><button id="sharebtn" type="button" aria-label="share">
    <svg viewBox="0 0 16 16" width="11" height="11" fill="currentColor"><path d="M11 2.5a2.5 2.5 0 1 1 .603 1.628l-6.718 3.12a2.499 2.499 0 0 1 0 1.504l6.718 3.12a2.5 2.5 0 1 1-.488.876l-6.718-3.12a2.5 2.5 0 1 1 0-3.256l6.718-3.12A2.5 2.5 0 0 1 11 2.5z"/></svg> Share</button>
    <div id="sharepop" hidden><button id="sharecopy" type="button">copy link</button>
      <a id="shareli" target="_blank" rel="noopener">LinkedIn</a><a id="sharex" target="_blank" rel="noopener">X</a></div></span>
</footer>

<script>
const $ = id => document.getElementById(id);
const TAU = Math.PI*2;

// ---- station layout: BUILT PER GAME from the server's generated cluster (different every game).
// connections come from grid-adjacent rooms, so every door is a short threshold — no long halls.
const HUB="Mess Hall", WALLW=9;  // wall stroke (world px)
// each room TYPE gets a steel/teal tint so the organic regions read distinctly
const ROOM_TINT={ "Mess Hall":[70,92,128],"Lab":[58,100,108],"Comms":[86,78,116],"Bunks":[104,78,78],
  "Storage":[86,90,60],"Generator":[112,84,52],"Reactor":[58,100,78],"Garage":[74,84,104],
  "Greenhouse":[58,112,76],"Infirmary":[96,104,116],"Drill Site":[80,80,96],"Freezer":[70,96,120] };
const COLORS=["#ff6a6a","#54a8ff","#46e0a0","#ffcf5a","#c98bff","#ff9f4a","#7ce0ff","#ff7ab8","#9be86a","#e0e0e0"];
const SCALE=26;  // tile → world px; camera auto-fits
function tint(n){ return ROOM_TINT[n]||[80,90,110]; }
let ROOMS={}, CORRSET=new Set(), CORRTILES=[], DOORS={}, VENTS=[], OUTPOST=31, stationSig="", TB={x0:0,y0:0,x1:1248,y1:884}, OPEN={};
function inRoomTile(tx,ty){ for(const r of Object.values(ROOMS)){ if(tx>=r.tx&&tx<r.tx+r.tw&&ty>=r.ty&&ty<r.ty+r.th)return r; } return null; }
// BSP rooms (rectangles) scattered + linked by corridor TILES — a building floor plan
function buildStation(st){
  const sig=st.outpost+'|'+JSON.stringify(st.rects||{}); if(sig===stationSig)return; stationSig=sig;
  OUTPOST=st.outpost||31; const bb=$('hud-outpost'); if(bb)bb.textContent=OUTPOST;
  ROOMS={}; let x0=1e9,y0=1e9,x1=-1e9,y1=-1e9;
  for(const [n,[rx,ry,rw,rh]] of Object.entries(st.rects||{})){
    const cx=(rx+rw/2)*SCALE, cy=(ry+rh/2)*SCALE;
    ROOMS[n]={x:cx,y:cy,w:rw*SCALE,h:rh*SCALE,cx,cy,rad:Math.min(rw,rh)*SCALE*0.5,hub:n===HUB,c:tint(n),tx:rx,ty:ry,tw:rw,th:rh};
    x0=Math.min(x0,rx);y0=Math.min(y0,ry);x1=Math.max(x1,rx+rw);y1=Math.max(y1,ry+rh); }
  CORRTILES=st.corridor||[]; CORRSET=new Set(CORRTILES.map(t=>t[0]+'|'+t[1]));
  for(const [cx,cy] of CORRTILES){ x0=Math.min(x0,cx);y0=Math.min(y0,cy);x1=Math.max(x1,cx+1);y1=Math.max(y1,cy+1); }
  TB={x0:x0*SCALE,y0:y0*SCALE,x1:x1*SCALE,y1:y1*SCALE};
  DOORS={}; for(const [a,b,dx,dy] of (st.doors||[])){ (DOORS[a]=DOORS[a]||{})[b]={x:dx*SCALE,y:dy*SCALE}; (DOORS[b]=DOORS[b]||{})[a]={x:dx*SCALE,y:dy*SCALE}; }
  VENTS=(st.vents||[]).filter(([a,b])=>ROOMS[a]&&ROOMS[b]);
  for(const a of STATE.agents){ a.wx=null; a.prevRoom=null; a.path=null; }
  userMoved=false; if(typeof cv!=='undefined'&&cv.width) fit();
}
// a baked BSP-ish station so the page renders before the socket connects (live server sends the real one)
const STATION0=(()=>{
  const names=["Mess Hall","Garage","Drill Site","Greenhouse","Bunks","Lab","Reactor","Storage","Generator","Infirmary","Comms","Freezer"];
  const rects={},centers={},cw=11,chh=10;
  names.forEach((n,i)=>{ const c=i%4,r=(i/4)|0, rw=cw-2-(i%3), rh=chh-2-(i%2), x=2+c*cw, y=2+r*chh; rects[n]=[x,y,rw,rh]; centers[n]=[x+rw/2,y+rh/2]; });
  const corr=new Set(), doors=[], add=(x,y)=>corr.add(x+'|'+y);
  for(let i=0;i<names.length-1;i++){ const a=centers[names[i]],b=centers[names[i+1]], ax=a[0]|0,ay=a[1]|0,bx=b[0]|0,by=b[1]|0;
    for(let x=Math.min(ax,bx);x<=Math.max(ax,bx);x++)add(x,ay); for(let y=Math.min(ay,by);y<=Math.max(ay,by);y++)add(bx,y);
    doors.push([names[i],names[i+1],bx+0.5,ay+0.5]); }
  const inroom=(x,y)=>names.some(n=>{const[rx,ry,rw,rh]=rects[n];return x>=rx&&x<rx+rw&&y>=ry&&y<ry+rh;});
  const tiles=[...corr].map(s=>s.split('|').map(Number)).filter(([x,y])=>!inroom(x,y));
  return {outpost:31, rects, corridor:tiles, centers, doors, vents:[["Freezer","Bunks"]]};
})();

let STATE={ round:1, tasksDone:7, tasksTotal:40, phase:"task", scores:{crew:0,thing:0}, agents:[] };
let lastKillTick=-1, fx=[], ejecting=null, mouse={x:-1,y:-1}, userMoved=false, HILITE=null, meet=null;
const EJECT_MS=3600;  // how long the ejected researcher takes to trudge off into the storm
(function seed(){ const names=["Softmaxwell","Overfitz","Hallucinov","Frostbyte","ReLuther","Quantz","Attenborough","Embeddington","Adamson","Tokarev"];
  const rk=Object.keys(STATION0.rects);
  STATE.agents=names.map((n,i)=>({id:i,name:n,model:"gpt-oss-120b",room:rk[i%rk.length],alive:i!==5,task:i%3===0,body:i===5,c:i})); })();

const cv=$('map'), ctx=cv.getContext('2d');
let cam={x:0,y:0,z:1}, DPR=Math.min(1.75,window.devicePixelRatio||1);
function resize(){ cv.width=innerWidth*DPR; cv.height=innerHeight*DPR; if(!userMoved) fit(); }  // rotate → refit
function bounds(){ return {x0:TB.x0-50,y0:TB.y0-50,x1:TB.x1+50,y1:TB.y1+60}; }
function fit(){ if(!Object.keys(ROOMS).length)return; const b=bounds(),ww=b.x1-b.x0,wh=b.y1-b.y0;
  cam.z=Math.min(cv.width/DPR/ww,cv.height/DPR/wh)*0.95; cam.x=(b.x0+b.x1)/2; cam.y=(b.y0+b.y1)/2; }
function toScreen(wx,wy){ return [(wx-cam.x)*cam.z+cv.width/2,(wy-cam.y)*cam.z+cv.height/2]; }

let drag=null;
cv.addEventListener('mousedown',e=>drag={x:e.clientX,y:e.clientY});
addEventListener('mouseup',()=>drag=null);
addEventListener('mousemove',e=>{ mouse.x=e.clientX*DPR; mouse.y=e.clientY*DPR; if(!drag)return; userMoved=true;
  cam.x-=(e.clientX-drag.x)/cam.z; cam.y-=(e.clientY-drag.y)/cam.z; drag={x:e.clientX,y:e.clientY}; });
cv.addEventListener('wheel',e=>{ e.preventDefault(); userMoved=true; cam.z=Math.max(0.25,Math.min(2.8,cam.z*Math.exp(-e.deltaY*0.0012))); },{passive:false});
let pinch=null; const tdist=e=>{const a=e.touches[0],b=e.touches[1];return Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY);};
cv.addEventListener('touchstart',e=>{ e.preventDefault(); if(e.touches.length===1){drag={x:e.touches[0].clientX,y:e.touches[0].clientY};pinch=null;} else if(e.touches.length>=2){pinch=tdist(e);drag=null;} },{passive:false});
cv.addEventListener('touchmove',e=>{ e.preventDefault(); userMoved=true; if(e.touches.length===1&&drag){const t=e.touches[0];
  cam.x-=(t.clientX-drag.x)/cam.z; cam.y-=(t.clientY-drag.y)/cam.z; drag={x:t.clientX,y:t.clientY};}
  else if(e.touches.length>=2){const d=tdist(e); if(pinch)cam.z=Math.max(0.25,Math.min(2.8,cam.z*(d/pinch))); pinch=d;} },{passive:false});
cv.addEventListener('touchend',e=>{ if(e.touches.length===0){drag=null;pinch=null;} else if(e.touches.length===1){drag={x:e.touches[0].clientX,y:e.touches[0].clientY};pinch=null;} },{passive:false});
addEventListener('orientationchange',()=>{ userMoved=false; setTimeout(resize,120); });

function rr(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
function shade(hex,d){ if(hex[0]!=="#")return hex; const n=parseInt(hex.slice(1),16); const c=v=>Math.max(0,Math.min(255,v));
  return `rgb(${c((n>>16)+d)},${c(((n>>8)&255)+d)},${c((n&255)+d)})`; }
function lerpA(a,b,t){ const d=((b-a+Math.PI*3)%TAU)-Math.PI; return a+d*t; }

// ---- exterior backdrop: night sky, aurora, ridge, snowfield (screen-fixed, gentle parallax) ----
const stars=[...Array(90)].map(()=>({x:Math.random(),y:Math.random()*0.55,r:Math.random()*1.3+0.3}));
function backdrop(t){
  const sky=ctx.createLinearGradient(0,0,0,cv.height); sky.addColorStop(0,"#070d1c"); sky.addColorStop(.5,"#0a1020"); sky.addColorStop(1,"#0c1626");
  ctx.fillStyle=sky; ctx.fillRect(0,0,cv.width,cv.height);
  const px=-cam.x*0.015, py=-cam.y*0.015;
  ctx.save(); ctx.fillStyle="#cfe3ff"; for(const s of stars){ ctx.globalAlpha=0.4+0.4*Math.sin(t*0.001+s.x*30);
    ctx.beginPath(); ctx.arc(s.x*cv.width+px*0.5,s.y*cv.height+py*0.5,s.r*DPR,0,TAU); ctx.fill(); } ctx.restore();
  // aurora — bigger, brighter, more bands (curtains of light)
  ctx.save(); ctx.globalCompositeOperation="lighter";
  for(let b=0;b<5;b++){ const cy=cv.height*(0.12+b*0.055), col=["94,255,180","120,180,255","150,255,210","90,200,255","180,150,255"][b];
    const band=130*DPR, g=ctx.createLinearGradient(0,cy-band,0,cy+band); g.addColorStop(0,`rgba(${col},0)`); g.addColorStop(.5,`rgba(${col},.30)`); g.addColorStop(1,`rgba(${col},0)`);
    ctx.fillStyle=g; ctx.beginPath(); ctx.moveTo(0,cv.height);
    for(let x=0;x<=cv.width;x+=20){ const y=cy+Math.sin(x*0.004+t*0.00045+b)*52*DPR+Math.sin(x*0.012+t*0.0008)*22*DPR; ctx.lineTo(x,y); }
    ctx.lineTo(cv.width,cv.height); ctx.closePath(); ctx.fill(); } ctx.restore();
  // distant ridge
  ctx.save(); ctx.translate(px,py); ctx.fillStyle="#0e1726"; const ry=cv.height*0.52; ctx.beginPath(); ctx.moveTo(-20,cv.height);
  let h=ry; for(let x=-20;x<=cv.width+20;x+=70*DPR){ h=ry+Math.sin(x*0.7)*0+ (Math.sin(x*0.013)*0.5+0.5)*60*DPR - 30*DPR*Math.random()*0; ctx.lineTo(x,ry-Math.abs(Math.sin(x*0.006))*90*DPR); }
  ctx.lineTo(cv.width+20,cv.height); ctx.closePath(); ctx.fill();
  ctx.fillStyle="rgba(190,224,255,.05)"; ctx.fill(); ctx.restore();
  // snowfield foreground
  const sf=ctx.createLinearGradient(0,cv.height*0.55,0,cv.height); sf.addColorStop(0,"rgba(150,180,220,0)"); sf.addColorStop(1,"rgba(120,150,195,.10)");
  ctx.fillStyle=sf; ctx.fillRect(0,cv.height*0.55,cv.width,cv.height*0.45);
}

// ---- station: rectangular pods on a corridor spine, with cladding + interiors ----
const DOORW=30;
// furniture per room type [dx,dy,w,h,kind] in pod fractions — makes each pod read as that room
const FURN={
  "Mess Hall":[[-.18,0,.5,.16,'table'],[-.18,-.26,.5,.09,'bench'],[-.18,.26,.5,.09,'bench']],
  "Lab":[[-.28,-.18,.5,.13,'bench'],[.26,.18,.2,.2,'machine']],
  "Comms":[[-.3,-.05,.16,.62,'rack'],[.22,.26,.4,.13,'desk']],
  "Bunks":[[-.26,-.22,.46,.12,'bed'],[-.26,.02,.46,.12,'bed'],[-.26,.26,.46,.12,'bed']],
  "Storage":[[-.3,0,.16,.66,'shelf'],[.22,0,.16,.66,'shelf']],
  "Generator":[[-.08,.05,.36,.4,'machine'],[.34,-.1,.12,.5,'pipe']],

const FURN_COL={bed:'#cdd6e2',table:'#48586f',bench:'#3e4d63',desk:'#48586f',shelf:'#5a6678',rack:'#2c3a4e',
  machine:'#36424f',pipe:'#3a4658',core:'#6a5238',vehicle:'#5a5048',plant:'#3f8a54',cabinet:'#7886a0',rig:'#4a4232',crate:'#4b5566'};
function furnCol(k){ return FURN_COL[k]||'#48586f'; }
function drawStation(t){
  const TS=SCALE*cam.z;  // one floor tile, in screen px
  // 1) drop shadows on the snow so the station sits on the landscape
  ctx.save(); ctx.fillStyle="rgba(0,0,0,.4)";
  for(const r of Object.values(ROOMS)){ const [sx,sy]=toScreen(r.x,r.y),w=r.w*cam.z,h=r.h*cam.z; rr(sx-w/2+8*cam.z,sy-h/2+10*cam.z,w,h,6*cam.z); ctx.fill(); }
  for(const [cx,cy] of CORRTILES){ const p=toScreen((cx)*SCALE,(cy)*SCALE); ctx.fillRect(p[0]+8*cam.z,p[1]+10*cam.z,TS+1,TS+1); } ctx.restore();
  // 2) corridors — steel-walkway floor tiles, with walls only on edges that face the void (open into rooms)
  for(const [cx,cy] of CORRTILES){ const p=toScreen(cx*SCALE,cy*SCALE);
    const g=ctx.createLinearGradient(0,p[1],0,p[1]+TS); g.addColorStop(0,"#27313f"); g.addColorStop(.5,"#1b2531"); g.addColorStop(1,"#27313f");
    ctx.fillStyle=g; ctx.fillRect(p[0],p[1],TS+1,TS+1); }
  ctx.strokeStyle="#3d4b60"; ctx.lineWidth=Math.max(1.2,WALLW*0.7*cam.z); ctx.lineCap="round";
  const edge=(x0,y0,x1,y1)=>{ const a=toScreen(x0*SCALE,y0*SCALE),b=toScreen(x1*SCALE,y1*SCALE); ctx.beginPath(); ctx.moveTo(a[0],a[1]); ctx.lineTo(b[0],b[1]); ctx.stroke(); };
  const wall=(cx,cy,dx,dy)=>!CORRSET.has((cx+dx)+'|'+(cy+dy)) && !inRoomTile(cx+dx,cy+dy);
  for(const [cx,cy] of CORRTILES){
    if(wall(cx,cy,1,0)) edge(cx+1,cy,cx+1,cy+1);
    if(wall(cx,cy,-1,0)) edge(cx,cy,cx,cy+1);
    if(wall(cx,cy,0,1)) edge(cx,cy+1,cx+1,cy+1);
    if(wall(cx,cy,0,-1)) edge(cx,cy,cx+1,cy); }
  // 3) pods
  for(const [n,r] of Object.entries(ROOMS)){ const [sx,sy]=toScreen(r.x,r.y), w=r.w*cam.z, h=r.h*cam.z, c=r.c, L=sx-w/2, T=sy-h/2;
    ctx.save(); rr(L,T,w,h,6*cam.z); ctx.clip();
    const fg=ctx.createLinearGradient(0,T,0,T+h); fg.addColorStop(0,"#1e2937"); fg.addColorStop(1,"#131c29");  // uniform steel interior
    ctx.fillStyle=fg; ctx.fillRect(L,T,w,h);
    ctx.strokeStyle="rgba(110,140,190,.05)"; ctx.lineWidth=1; for(let yy=T+18*cam.z; yy<T+h; yy+=18*cam.z){ ctx.beginPath(); ctx.moveTo(L,yy); ctx.lineTo(L+w,yy); ctx.stroke(); }
    ctx.fillStyle=`rgba(${c[0]},${c[1]},${c[2]},.12)`; ctx.fillRect(L,T,w,h);  // faint room-accent wash
    for(const [dx,dy,fw,fh,k] of (FURN[n]||[[-.1,0,.5,.4,'machine']])){ const px=sx+dx*w,py=sy+dy*h,ww=fw*w,hh=fh*h,col=furnCol(k);
      ctx.fillStyle=col; rr(px-ww/2,py-hh/2,ww,hh,3*cam.z); ctx.fill();
      ctx.fillStyle="rgba(255,255,255,.12)"; rr(px-ww/2,py-hh/2,ww,hh*0.34,3*cam.z); ctx.fill();
      ctx.strokeStyle="rgba(0,0,0,.4)"; ctx.lineWidth=1*cam.z; rr(px-ww/2,py-hh/2,ww,hh,3*cam.z); ctx.stroke(); }
    // task consoles — set against the lower wall (corners, not the middle). Bigger rooms hold more, so
    // we draw a row of them; a console beacons cyan while its task is open to claim, dim once it's done.
    const cnt=OPEN[n]||0, cs=8*cam.z, slots=Math.max(1,Math.min(cnt||1,Math.floor((w-WALLW*2*cam.z)/(cs*2.6))||1));
    for(let si=0; si<slots; si++){ const tx=L+WALLW*cam.z+cs*1.4+si*cs*2.6, ty=T+h-cs*1.9, lit=si<cnt;
      ctx.fillStyle="#0c1622"; rr(tx-cs,ty-cs*0.8,cs*2,cs*1.7,2*cam.z); ctx.fill();
      ctx.strokeStyle="rgba(0,0,0,.4)"; ctx.lineWidth=1*cam.z; rr(tx-cs,ty-cs*0.8,cs*2,cs*1.7,2*cam.z); ctx.stroke();
      if(lit){ const p=0.55+0.45*Math.sin(t*0.006+r.x+si);
        ctx.fillStyle=`rgba(90,220,255,${p})`; rr(tx-cs*0.7,ty-cs*0.5,cs*1.4,cs*1.0,1.5*cam.z); ctx.fill();
        ctx.strokeStyle=`rgba(90,220,255,${0.45*p})`; ctx.lineWidth=2*cam.z;
        ctx.beginPath(); ctx.arc(tx,ty-cs*2.6,(0.7+0.4*Math.sin(t*0.006+r.x+si))*cs*1.4,0,TAU); ctx.stroke();
        ctx.fillStyle=`rgba(150,235,255,${p})`; ctx.beginPath(); ctx.arc(tx,ty-cs*2.6,cs*0.45,0,TAU); ctx.fill();
      } else { ctx.fillStyle="rgba(60,90,120,.35)"; rr(tx-cs*0.7,ty-cs*0.5,cs*1.4,cs*1.0,1.5*cam.z); ctx.fill(); } }
    ctx.restore();
    // exterior cladding: dark base, steel face, top-rim highlight, accent trim
    ctx.strokeStyle="#1d2734"; ctx.lineWidth=(WALLW+3)*cam.z; rr(L,T,w,h,6*cam.z); ctx.stroke();
    ctx.strokeStyle="#3d4b60"; ctx.lineWidth=WALLW*cam.z; rr(L,T,w,h,6*cam.z); ctx.stroke();
    ctx.strokeStyle="rgba(175,205,245,.35)"; ctx.lineWidth=2*cam.z; ctx.beginPath(); ctx.moveTo(L+7*cam.z,T+WALLW*0.3*cam.z); ctx.lineTo(L+w-7*cam.z,T+WALLW*0.3*cam.z); ctx.stroke();
    ctx.strokeStyle=`rgba(${c[0]+50},${c[1]+50},${c[2]+50},.55)`; ctx.lineWidth=1.5*cam.z; rr(L+WALLW*0.7*cam.z,T+WALLW*0.7*cam.z,w-WALLW*1.4*cam.z,h-WALLW*1.4*cam.z,4*cam.z); ctx.stroke();
    // label plate
    ctx.fillStyle="rgba(185,210,245,.75)"; ctx.font=`800 ${8.5*cam.z}px Inter`; ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText(n.toUpperCase(), sx, T+10*cam.z);
  }
  // 4) doorways — wherever a corridor tile abuts a room, carve a gap through that room's wall
  const thick=(WALLW+5)*cam.z;
  for(const [cx,cy] of CORRTILES){ for(const [dx,dy] of [[1,0],[-1,0],[0,1],[0,-1]]){ if(!inRoomTile(cx+dx,cy+dy))continue;
    ctx.fillStyle="#27313f";
    if(dx){ const tl=toScreen((cx+(dx>0?1:0))*SCALE,cy*SCALE); ctx.fillRect(tl[0]-thick/2,tl[1]+TS*0.12,thick,TS*0.76); }
    else  { const tl=toScreen(cx*SCALE,(cy+(dy>0?1:0))*SCALE); ctx.fillRect(tl[0]+TS*0.12,tl[1]-thick/2,TS*0.76,thick); } } }
  for(const [a,b] of VENTS){ for(const room of [a,b]){ const r=ROOMS[room],o=ROOMS[room===a?b:a]; if(!r||!o)continue;
    const p=toScreen(r.cx+(o.cx-r.cx)*0.2,r.cy+(o.cy-r.cy)*0.2), s=9*cam.z;
    ctx.fillStyle="#241f33"; ctx.fillRect(p[0]-s,p[1]-s,s*2,s*2); ctx.strokeStyle="rgba(170,140,220,.5)"; ctx.lineWidth=1.3*cam.z;
    for(let i=-1;i<=1;i++){ctx.beginPath();ctx.moveTo(p[0]-s+3,p[1]+i*s*0.6);ctx.lineTo(p[0]+s-3,p[1]+i*s*0.6);ctx.stroke();} } }
}

// ---- lighting ----
// warm light spilling from each room's ceiling lamp + station glow (drawn additively, before darkness)
function drawAmbient(t){ ctx.save(); ctx.globalCompositeOperation="lighter";
  for(const r of Object.values(ROOMS)){ if(r.cx==null)continue; const [sx,sy]=toScreen(r.cx,r.cy), rad=r.rad*1.6*cam.z;
    const g=ctx.createRadialGradient(sx,sy,2,sx,sy,rad); g.addColorStop(0,"rgba(255,205,140,.15)"); g.addColorStop(1,"rgba(255,205,140,0)");
    ctx.fillStyle=g; ctx.fillRect(sx-rad,sy-rad,rad*2,rad*2); }
  ctx.restore();
}
let lcv;
function applyLighting(){ if(!lcv)lcv=document.createElement('canvas'); if(lcv.width!==cv.width||lcv.height!==cv.height){lcv.width=cv.width;lcv.height=cv.height;}
  const lx=lcv.getContext('2d'); lx.setTransform(1,0,0,1,0,0); lx.clearRect(0,0,lcv.width,lcv.height);
  lx.fillStyle="rgba(4,8,16,0.42)"; lx.fillRect(0,0,lcv.width,lcv.height); lx.globalCompositeOperation="destination-out";
  const soft=(x,y,r,a)=>{ const g=lx.createRadialGradient(x,y,0,x,y,r); g.addColorStop(0,`rgba(255,255,255,${a})`); g.addColorStop(.65,`rgba(255,255,255,${a*0.55})`); g.addColorStop(1,"rgba(255,255,255,0)"); lx.fillStyle=g; lx.beginPath(); lx.arc(x,y,r,0,TAU); lx.fill(); };
  for(const r of Object.values(ROOMS)){ if(r.cx==null)continue; const [sx,sy]=toScreen(r.cx,r.cy); soft(sx,sy,r.rad*1.7*cam.z,0.86); }
  for(const a of STATE.agents){ if(a.wx==null)continue; const [sx,sy]=toScreen(a.wx,a.wy); soft(sx,sy,66*cam.z,a.alive?0.95:0.5);
    if(a.alive){ const len=230*cam.z; const cg=lx.createRadialGradient(sx,sy,0,sx,sy,len); cg.addColorStop(0,"rgba(255,255,255,.95)"); cg.addColorStop(1,"rgba(255,255,255,0)");
      lx.fillStyle=cg; lx.beginPath(); lx.moveTo(sx,sy); lx.arc(sx,sy,len,a.face-0.6,a.face+0.6); lx.closePath(); lx.fill(); } }
  lx.globalCompositeOperation="source-over"; ctx.drawImage(lcv,0,0);
}

// ---- agents ----
function layoutAgents(){ const byRoom={}; for(const a of STATE.agents){ if(!a.alive&&!a.body)continue; (byRoom[a.room]=byRoom[a.room]||[]).push(a); }
  for(const [room,list] of Object.entries(byRoom)){ const r=ROOMS[room]; if(!r)continue; const n=list.length;
    const cols=Math.ceil(Math.sqrt(n)), rows=Math.ceil(n/cols), sp=Math.min(28,r.rad*0.6);
    list.forEach((a,i)=>{ const cxi=i%cols, cyi=Math.floor(i/cols);
      a.tx=r.cx+(cxi-(cols-1)/2)*sp; a.ty=r.cy+(cyi-(rows-1)/2)*sp;
      // changed room → walk out through the shared doorway (corridor bend) before crossing to the new room
      if(a.prevRoom && a.prevRoom!==room && ROOMS[a.prevRoom]){
        const d=(DOORS[a.prevRoom]||{})[room]; a.path=d?[{x:d.x,y:d.y}]:null; }
      a.prevRoom=room; }); }
}
// move STRAIGHT toward the next waypoint, clamped so a step can never overshoot it — so an agent
// converges and stops instead of skidding past and snapping back (which read as spinning). The heading
// is purely cosmetic (it aims the headlamp cone) and only eases toward the direction of actual motion.
const WALK=2.6;
function moveAgents(){ for(const a of STATE.agents){ if(a.tx==null)continue;
  if(a.wx==null){a.wx=a.tx;a.wy=a.ty;a.face=1.57;a.spd=0;}
  const tgt=(a.path&&a.path.length)?a.path[0]:{x:a.tx,y:a.ty};   // follow the corridor waypoints first
  const dx=tgt.x-a.wx, dy=tgt.y-a.wy, d=Math.hypot(dx,dy);
  if(d<1.5){  // arrived: snap to the slot, stop, leave the heading alone (no idle spin)
    a.wx=tgt.x; a.wy=tgt.y; a.spd=0; a.moving=false;
    if(a.path&&a.path.length) a.path.shift(); continue; }
  const step=Math.min(WALK, d*0.5, d);   // ease in near the start, never step past the target
  if(a.alive) a.face=lerpA(a.face,Math.atan2(dy,dx),0.18);  // cone follows the walk, eased
  a.wx+=dx/d*step; a.wy+=dy/d*step; a.moving=step>0.4; } }
// each agent gets a stable randomized "look" from its name hash — a parka'd researcher, not an eyeball
const LOOKS={};
function look(name){ if(LOOKS[name])return LOOKS[name]; let h=2166136261;
  for(let i=0;i<name.length;i++) h=((h^name.charCodeAt(i))*16777619)>>>0;
  LOOKS[name]={ hat:h%5,
    goggle:["#bfe9ff","#ffd27f","#9affd0","#ff9fb0","#c9b3ff"][(h>>>4)%5],
    skin:["#e3c2a3","#caa07e","#8f6f52","#f0d6bd"][(h>>>8)%4],
    accent:["#eef3f7","#ffcf5a","#5ab0ff","#46e0a0","#ff7ab8","#ff9f4a"][(h>>>12)%6] };
  return LOOKS[name]; }
// a clean parka-researcher token: team-coloured coat, fur hood ring, goggled face, a cosmetic hat from
// the name hash. Reads as a tidy avatar at the meeting table and as a small dot on the map.
function figure(sx,sy,s,col,alive,working,t,lk){
  ctx.fillStyle="rgba(0,0,0,.42)"; ctx.beginPath(); ctx.ellipse(sx,sy+s*0.64,s*0.6,s*0.2,0,0,TAU); ctx.fill();
  if(!alive){ ctx.save(); ctx.translate(sx,sy+s*0.2); ctx.rotate(0.7); ctx.globalAlpha=.85;
    ctx.fillStyle=shade(col,-40); rr(-s*0.55,-s*0.22,s*1.1,s*0.62,s*0.3); ctx.fill();
    ctx.strokeStyle="rgba(255,140,140,.9)"; ctx.lineWidth=s*0.12; ctx.lineCap="round";
    ctx.beginPath(); ctx.moveTo(-s*0.16,-s*0.04); ctx.lineTo(s*0.06,s*0.16); ctx.moveTo(s*0.06,-s*0.04); ctx.lineTo(-s*0.16,s*0.16); ctx.stroke();
    ctx.restore(); return; }
  const hy=sy-s*0.3;
  if(working){ ctx.strokeStyle=`rgba(57,217,138,${0.6+0.4*Math.sin(t*0.006)})`; ctx.lineWidth=s*0.12;
    ctx.beginPath(); ctx.arc(sx,sy+s*0.05,s*1.02,-1.6,-1.6+(t*0.004%TAU)); ctx.stroke(); }

  const bg=ctx.createLinearGradient(0,bodyTop,0,sy+s*0.62); bg.addColorStop(0,shade(col,22)); bg.addColorStop(1,shade(col,-30));
  ctx.fillStyle=bg; rr(sx-s*0.6,bodyTop,s*1.2,s*0.8,s*0.36); ctx.fill();
  ctx.strokeStyle=shade(col,-52); ctx.lineWidth=s*0.07; rr(sx-s*0.6,bodyTop,s*1.2,s*0.8,s*0.36); ctx.stroke();
  ctx.strokeStyle="rgba(0,0,0,.22)"; ctx.lineWidth=s*0.05; ctx.beginPath(); ctx.moveTo(sx,bodyTop+s*0.08); ctx.lineTo(sx,sy+s*0.52); ctx.stroke();
  // fur hood ring behind the head
  ctx.fillStyle=shade(col,-12); ctx.beginPath(); ctx.arc(sx,hy,s*0.6,0,TAU); ctx.fill();
  ctx.fillStyle="rgba(236,242,252,.16)"; ctx.beginPath(); ctx.arc(sx,hy,s*0.6,Math.PI*0.85,Math.PI*2.15); ctx.fill();
  // face
  ctx.fillStyle=lk.skin; ctx.beginPath(); ctx.arc(sx,hy,s*0.43,0,TAU); ctx.fill();
  // goggles: dark band + two tinted lenses + glint
  ctx.fillStyle="rgba(18,26,38,.92)"; rr(sx-s*0.4,hy-s*0.14,s*0.8,s*0.25,s*0.11); ctx.fill();
  ctx.fillStyle=lk.goggle; rr(sx-s*0.34,hy-s*0.1,s*0.28,s*0.17,s*0.08); ctx.fill(); rr(sx+s*0.06,hy-s*0.1,s*0.28,s*0.17,s*0.08); ctx.fill();
  ctx.fillStyle="rgba(255,255,255,.55)"; rr(sx-s*0.3,hy-s*0.07,s*0.1,s*0.05,2); ctx.fill();
  // a hat from the look hash
  if(lk.hat===0||lk.hat===4){ ctx.fillStyle=shade(col,34); rr(sx-s*0.48,hy-s*0.64,s*0.96,s*0.3,s*0.13); ctx.fill(); }
  if(lk.hat===1){ ctx.fillStyle=lk.accent; ctx.beginPath(); ctx.arc(sx,hy-s*0.16,s*0.5,Math.PI,TAU); ctx.fill();
    ctx.beginPath(); ctx.arc(sx,hy-s*0.66,s*0.1,0,TAU); ctx.fill(); }
  if(lk.hat===2){ ctx.strokeStyle=lk.accent; ctx.lineWidth=s*0.1; ctx.beginPath(); ctx.arc(sx,hy-s*0.16,s*0.5,Math.PI*1.05,Math.PI*1.95); ctx.stroke(); }
  if(lk.hat===3){ ctx.fillStyle=lk.accent; ctx.beginPath(); ctx.arc(sx,hy-s*0.16,s*0.52,Math.PI,TAU); ctx.fill();
    ctx.beginPath(); ctx.ellipse(sx-s*0.5,hy-s*0.06,s*0.12,s*0.2,0,0,TAU); ctx.fill(); ctx.beginPath(); ctx.ellipse(sx+s*0.5,hy-s*0.06,s*0.12,s*0.2,0,0,TAU); ctx.fill(); }
  ctx.fillStyle="rgba(255,255,255,.1)"; ctx.beginPath(); ctx.ellipse(sx-s*0.16,hy-s*0.26,s*0.18,s*0.1,-0.5,0,TAU); ctx.fill();
}
function drawAgents(t){
  const list=STATE.agents.filter(a=>a.wx!=null && !(ejecting&&a.name===ejecting.name));
  for(const a of [...list].sort((x,y)=>x.wy-y.wy)){ const [sx,sy]=toScreen(a.wx,a.wy), s=22*cam.z, col=COLORS[a.c%COLORS.length];
    const working=a.task&&a.alive&&!a.moving;
    if(a.id===HILITE){ const pr=s*1.0+Math.sin(t*0.006)*2.2*cam.z;   // pulsing ring on the rostered pick
      ctx.strokeStyle="rgba(120,200,255,.32)"; ctx.lineWidth=7*cam.z; ctx.beginPath(); ctx.arc(sx,sy,pr,0,TAU); ctx.stroke();
      ctx.strokeStyle="rgba(150,215,255,.95)"; ctx.lineWidth=2.4*cam.z; ctx.beginPath(); ctx.arc(sx,sy,pr,0,TAU); ctx.stroke(); }
    figure(sx,sy,s,col,a.alive,working,t,look(a.name));
    const near=Math.hypot(mouse.x-sx,mouse.y-sy)<40*cam.z;
    if(cam.z>1.05||near||a.id===HILITE){ ctx.textAlign="center"; ctx.font=`700 ${9.5*cam.z}px Inter`;
      ctx.fillStyle=a.alive?"rgba(231,238,252,.95)":"rgba(170,130,130,.8)"; ctx.fillText(a.name,sx,sy+s*1.3); } }
  // ejection walk-off into the snow
  if(ejecting){ const k=Math.min(1,(performance.now()-ejecting.t0)/4500); const a=STATE.agents.find(x=>x.name===ejecting.name);
    if(a&&a.wx!=null){ const [bx,by]=toScreen(a.wx,a.wy); const sx=bx, sy=by+ k*cv.height*0.7; const s=22*cam.z;
      ctx.save(); ctx.globalAlpha=1-k; figure(sx,sy,s,COLORS[a.c%COLORS.length],true,false,t,look(a.name));
      ctx.globalAlpha=(1-k)*0.9; ctx.textAlign="center"; ctx.font=`700 ${9.5*cam.z}px Inter`; ctx.fillStyle="#cfe3ff";
      ctx.fillText(a.name+" → ejected",sx,sy-s*1.2); ctx.restore(); } }
}

// ---- fx: kill flash, snow, vignette ----
function pushKill(room){ const r=ROOMS[room]; if(!r||r.cx==null)return; fx.push({x:r.cx,y:r.cy,t0:performance.now()}); }
function drawFx(){ const now=performance.now(); fx=fx.filter(f=>now-f.t0<900);
  for(const f of fx){ const k=(now-f.t0)/900, [sx,sy]=toScreen(f.x,f.y);
    ctx.save(); ctx.globalAlpha=(1-k)*0.8; ctx.strokeStyle="#ff4040"; ctx.lineWidth=(3+6*(1-k))*cam.z;
    ctx.beginPath(); ctx.arc(sx,sy,(20+80*k)*cam.z,0,TAU); ctx.stroke();
    ctx.strokeStyle="rgba(255,90,90,.9)"; ctx.lineWidth=4*cam.z; const a=k*3;
    ctx.beginPath(); ctx.moveTo(sx-Math.cos(a)*26*cam.z,sy-Math.sin(a)*26*cam.z); ctx.lineTo(sx+Math.cos(a)*26*cam.z,sy+Math.sin(a)*26*cam.z); ctx.stroke(); ctx.restore(); }
}
// heavy, wind-blown snow — two layers (far fine + near fat) sweeping across on a gust
const snow=[...Array(260)].map((_,i)=>({x:Math.random(),y:Math.random(),s:Math.random()*2.2+0.5,d:Math.random()*0.7+0.3,near:i%3===0}));
function drawSnow(t){ ctx.save(); ctx.fillStyle="#eaf3ff"; const gust=Math.sin(t*0.0003)*0.10+0.16;
  for(const f of snow){ const drift=(f.x + t*0.00007*f.d + Math.sin(t*0.0006+f.y*7)*0.02 + (f.y)*gust)%1;
    const x=drift*cv.width, y=((f.y+t*(f.near?0.00013:0.00007)*f.d)%1)*cv.height;
    ctx.globalAlpha=(f.near?0.28:0.13)+0.18*f.s/2.7; const r=(f.near?f.s*1.6:f.s)*DPR;
    ctx.beginPath(); ctx.arc(x,y,r,0,TAU); ctx.fill(); } ctx.restore(); }
function vignette(){ const g=ctx.createRadialGradient(cv.width/2,cv.height*0.46,cv.height*0.28,cv.width/2,cv.height*0.5,cv.height*0.9);
  g.addColorStop(0,"rgba(0,0,0,0)"); g.addColorStop(.7,"rgba(4,10,22,.18)"); g.addColorStop(1,"rgba(2,6,16,.62)"); ctx.fillStyle=g; ctx.fillRect(0,0,cv.width,cv.height);
  // cold blue cast over the whole frame
  ctx.fillStyle="rgba(40,80,140,.05)"; ctx.fillRect(0,0,cv.width,cv.height); }

// real CC0 Antarctic-aurora wallpaper (NASA/CC0) as the backdrop, cover-fit, lightly dimmed
// a generated bleak Antarctic landscape (The Thing): cold twilight sky, low sun haze, dark snow-capped
// peaks on the horizon, a vast pale snow plain, blizzard fog. Screen-fixed with a hint of parallax.
const ridge=[...Array(60)].map((_,i)=>({h:0.30+0.5*Math.abs(Math.sin(i*1.7)*Math.sin(i*0.6+1.3)), x:i/59}));
function drawSky(t){
  const sky=ctx.createLinearGradient(0,0,0,cv.height*0.62);
  sky.addColorStop(0,"#0a1422"); sky.addColorStop(.55,"#16273a"); sky.addColorStop(1,"#3a4a5c");
  ctx.fillStyle=sky; ctx.fillRect(0,0,cv.width,cv.height);
  // low arctic sun glow on the horizon
  const hx=cv.width*0.5, hy=cv.height*0.6;
  const sun=ctx.createRadialGradient(hx,hy,2,hx,hy,cv.height*0.6);
  sun.addColorStop(0,"rgba(255,224,180,.22)"); sun.addColorStop(.4,"rgba(180,150,150,.10)"); sun.addColorStop(1,"rgba(0,0,0,0)");
  ctx.fillStyle=sun; ctx.fillRect(0,0,cv.width,cv.height*0.62);
  const px=-cam.x*0.012;
  // distant snow-capped peaks
  const hz=cv.height*0.6;
  ctx.save(); ctx.translate(px,0);
  ctx.beginPath(); ctx.moveTo(-40,hz);
  for(const r of ridge) ctx.lineTo(r.x*(cv.width+80)-40, hz - r.h*cv.height*0.30);
  ctx.lineTo(cv.width+40,hz); ctx.closePath();
  ctx.fillStyle="#202d3e"; ctx.fill();
  ctx.fillStyle="rgba(230,240,255,.10)"; ctx.fill();  // snow sheen on peaks
  ctx.restore();
  // snow plain foreground with drifts
  const plain=ctx.createLinearGradient(0,hz,0,cv.height);
  plain.addColorStop(0,"#5a6c80"); plain.addColorStop(.4,"#43576c"); plain.addColorStop(1,"#2b3a4c");
  ctx.fillStyle=plain; ctx.fillRect(0,hz-1,cv.width,cv.height-hz+1);
  ctx.save(); ctx.globalAlpha=.5;
  for(let i=0;i<4;i++){ const dy=hz+ (cv.height-hz)*(0.2+i*0.22); ctx.fillStyle=`rgba(${i%2?20:210},${i%2?30:225},${i%2?44:255},${i%2?0.18:0.05})`;
    ctx.beginPath(); ctx.moveTo(0,dy); for(let x=0;x<=cv.width;x+=60){ ctx.lineTo(x,dy+Math.sin(x*0.01+i*2+px*0.02)*8); } ctx.lineTo(cv.width,cv.height); ctx.lineTo(0,cv.height); ctx.closePath(); ctx.fill(); }
  ctx.restore();
  // blizzard haze
  ctx.fillStyle="rgba(150,170,195,.06)"; ctx.fillRect(0,0,cv.width,cv.height);
}
// ---- the emergency meeting: a dedicated scene. The map drops away and the survivors ring a table in
// the Mess Hall; each spoken line pops a bubble over its speaker, votes land one by one as chips, and
// the ejected researcher is walked out into the storm before we cut back to the station. ----
function meetLede(){ const m=STATE.meeting||{}; if(m.victim) return `${m.reporter} found ${m.victim} dead in the ${m.room}`;
  return m.reporter?`${m.reporter} called everyone in`:`emergency meeting`; }
function bubble(x,y,text,kind){ const f=12*DPR; ctx.font=`600 ${f}px Inter`;
  const maxw=190*DPR, words=(text||'').split(' '), lines=[]; let ln='';
  for(const w of words){ const tryln=ln?ln+' '+w:w; if(ctx.measureText(tryln).width>maxw&&ln){ lines.push(ln); ln=w; } else ln=tryln; }
  if(ln)lines.push(ln); const lh=f*1.28, pad=9*DPR;
  const bw=Math.min(maxw,Math.max(...lines.map(l=>ctx.measureText(l).width)))+pad*2, bh=lines.length*lh+pad*1.6;
  let bx=x-bw/2, by=y-bh; bx=Math.max(6*DPR,Math.min(cv.width-bw-6*DPR,bx)); by=Math.max((meet&&meet.top||56*DPR)+40*DPR,by);
  ctx.save();
  ctx.fillStyle= kind==='vote' ? "rgba(34,24,30,.95)" : "rgba(16,24,38,.95)";
  ctx.strokeStyle= kind==='vote' ? "rgba(255,120,120,.6)" : "rgba(130,170,225,.55)"; ctx.lineWidth=1.4*DPR;
  rr(bx,by,bw,bh,9*DPR); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x-6*DPR,by+bh); ctx.lineTo(x+6*DPR,by+bh); ctx.lineTo(x,by+bh+9*DPR); ctx.closePath(); ctx.fill();
  ctx.fillStyle=kind==='vote'?"#ffd7d7":"#e7eefc"; ctx.textAlign="center"; ctx.textBaseline="middle";
  lines.forEach((l,i)=>ctx.fillText(l,bx+bw/2,by+pad*0.8+lh*(i+0.5)));
  ctx.restore(); }
function drawMeeting(t){
  const W=cv.width, H=cv.height, narrow=W/DPR<=820, fade=Math.min(1,(performance.now()-meet.t0)/450);
  ctx.fillStyle=`rgba(4,9,18,${0.62*fade})`; ctx.fillRect(0,0,W,H);  // dim the world to a dark room
  // fit the table into the space the chat log doesn't use: a right rail on desktop, a bottom sheet on
  // phones. Reserve the header/roster up top too, so seats + bubbles never collide with the chrome.
  const rightRes=narrow?0:342*DPR, botRes=narrow?Math.round(H*0.48):0, topRes=(narrow?96:46)*DPR;
  const aw=W-rightRes, ah=H-topRes-botRes, cx=aw/2, cy=topRes+ah/2;
  const Rx=Math.min(aw*0.32,ah*0.40), Ry=Rx*0.58; meet.top=topRes;
  const s=(narrow?14:23)*DPR;
  ctx.save(); ctx.globalAlpha=fade;
  // the table
  const tg=ctx.createRadialGradient(cx,cy-Ry*0.3,4,cx,cy,Rx*1.1); tg.addColorStop(0,"#38475f"); tg.addColorStop(1,"#19222e");
  ctx.fillStyle=tg; ctx.beginPath(); ctx.ellipse(cx,cy,Rx,Ry,0,0,TAU); ctx.fill();
  ctx.lineWidth=3*DPR; ctx.strokeStyle="rgba(150,185,235,.22)"; ctx.beginPath(); ctx.ellipse(cx,cy,Rx,Ry,0,0,TAU); ctx.stroke();
  ctx.lineWidth=1.4*DPR; ctx.strokeStyle="rgba(120,160,220,.12)"; ctx.beginPath(); ctx.ellipse(cx,cy,Rx*0.72,Ry*0.72,0,0,TAU); ctx.stroke();
  // header
  ctx.textAlign="center"; ctx.fillStyle="rgba(191,224,255,.92)"; ctx.font=`800 ${13*DPR}px Inter`;
  ctx.fillText("EMERGENCY MEETING", cx, topRes+15*DPR);  // pinned under the chrome, clear of bubbles
  ctx.fillStyle="rgba(160,185,220,.7)"; ctx.font=`600 ${10.5*DPR}px Inter`; ctx.fillText(meetLede(), cx, topRes+31*DPR);
  // seats around the table
  const ids=meet.ids, n=Math.max(1,ids.length), seats={};
  ids.forEach((id,i)=>{ const ang=-Math.PI/2+i/n*TAU; seats[id]={x:cx+Math.cos(ang)*Rx*1.12, y:cy+Math.sin(ang)*Ry*1.22}; });
  for(const id of [...ids].sort((a,b)=>seats[a].y-seats[b].y)){ const a=STATE.agents.find(x=>x.id===id); if(!a)continue; const p=seats[id];
    let dy=0,al=1; const out=ejecting&&a.name===ejecting.name;
    if(out){ const k=Math.min(1,(performance.now()-ejecting.t0)/EJECT_MS); dy=k*H*0.62; al=1-k; }
    ctx.save(); ctx.globalAlpha=fade*al;
    if(id===HILITE){ ctx.strokeStyle="rgba(150,215,255,.9)"; ctx.lineWidth=2.4*DPR; ctx.beginPath(); ctx.arc(p.x,p.y,s*1.05,0,TAU); ctx.stroke(); }
    figure(p.x,p.y+dy,s,COLORS[a.c%COLORS.length],a.alive||out,false,t,look(a.name));
    ctx.fillStyle="rgba(231,238,252,.95)"; ctx.textAlign="center"; ctx.font=`700 ${9.5*DPR}px Inter`;
    ctx.fillText(a.name,p.x,p.y+dy+s*1.5); ctx.restore();
    const vt=meet.votes&&meet.votes[a.name];
    if(vt!==undefined&&!out){ ctx.globalAlpha=fade; bubble(p.x,p.y-s*1.25,vt==='skip'?'skips':'→ '+vt,'vote'); ctx.globalAlpha=1; }
  }
  // the speaker's live line
  if(meet.bubble){ const sp=seats[meet.bubble.id]; if(sp){ ctx.globalAlpha=fade; bubble(sp.x,sp.y-s*1.5,meet.bubble.text,'say'); ctx.globalAlpha=1; } }
  ctx.restore();
}
function frame(t){
  if(meet){ drawSky(); drawMeeting(t); drawSnow(t); vignette(); requestAnimationFrame(frame); return; }
  drawSky(); drawAmbient(t); drawStation(t); layoutAgents(); moveAgents(); drawAgents(t); applyLighting(); drawFx(); drawSnow(t); vignette(); requestAnimationFrame(frame); }

function syncHud(){ $('hud-round').textContent=STATE.round; $('hud-tasks').style.width=(100*STATE.tasksDone/Math.max(1,STATE.tasksTotal))+'%';
  $('hud-alive').textContent=STATE.agents.filter(a=>a.alive).length; $('hud-total').textContent=STATE.agents.length;
  const sc=STATE.scores||{}; $('w-crew').textContent=sc.crew||0; $('w-thing').textContent=sc.thing||0;
  const ros=$('roster'); ros.innerHTML=''; for(const a of STATE.agents){ const d=document.createElement('div'); d.className='who'+(a.alive?'':' dead')+(a.id===HILITE?' sel':'');
    d.innerHTML=`<span class="dot" style="color:${COLORS[a.c%COLORS.length]};background:${COLORS[a.c%COLORS.length]}"></span><span><div class="nm">${a.name}</div><div class="md">${a.model}</div></span>`;
    d.onclick=()=>{ HILITE=(HILITE===a.id?null:a.id); syncHud(); }; ros.appendChild(d); } }

// ---- live data ----
const esc=s=>(s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
function nameColor(n){ const a=STATE.agents.find(x=>x.name===n); return a?COLORS[a.c%COLORS.length]:'#cfe3ff'; }
function applyAgents(arr){ const byId={}; for(const a of STATE.agents)byId[a.id]=a;
  STATE.agents=arr.map(s=>{ const a=byId[s.id]||{id:s.id}; a.name=s.name; a.model=s.model; a.room=s.room; a.alive=s.alive; a.task=s.tasking; a.body=s.body; a.c=s.color; a.thing=s.thing; return a; }); }
function renderChat(s){ const chat=$('chat'), inMeet=['meeting','vote','ejection'].includes(s.phase)&&s.meeting;
  if(inMeet){ chat.classList.add('show'); const m=s.meeting; $('chat-title').textContent='EMERGENCY MEETING';
    $('chat-lede').textContent=m.victim?`${m.reporter} found ${m.victim} dead in ${m.room}`:`${m.reporter} sounded the alarm`;
    $('clog').innerHTML=(m.transcript||[]).map(l=>`<li><span class="who" style="color:${nameColor(l.name)}">${l.name}</span><span class="md">${(l.model||'').split('/').pop()}</span><span class="tx">${esc(l.text)}</span></li>`).join('');
    const log=$('clog'); log.scrollTop=log.scrollHeight; const v=$('chat-verdict');
    if(s.phase==='ejection'){ const tally=Object.entries(m.votes||{}).map(([a,b])=>`${a}→${b}`).join(' · ');
      v.style.display=''; if(m.ejected){ const th=m.ejected_was_thing; v.innerHTML=`<div class="big ${th?'thing':'clear'}">${m.ejected} ejected — ${th?'WAS the Thing':'was innocent'}</div><div class="tally">${tally}</div>`; }
      else v.innerHTML=`<div class="big">No one ejected (skipped)</div><div class="tally">${tally}</div>`;
      if(m.ejected && (!ejecting||ejecting.name!==m.ejected)) ejecting={name:m.ejected,t0:performance.now()};
    } else { v.style.display='none'; }
  } else if(s.phase==='gameover'){ chat.classList.add('show'); $('clog').innerHTML=''; $('chat-lede').textContent='';
    const crew=s.winner==='crew', things=(s.agents||[]).filter(a=>a.thing).map(a=>a.name).join(', ');
    $('chat-title').textContent=crew?'CASE CLOSED':'OUTPOST LOST'; const v=$('chat-verdict'); v.style.display='';
    v.innerHTML=`<div class="big ${crew?'clear':'thing'}">${crew?'THE CREW SURVIVE':'THE THING WINS'} — ${s.win_by||''}</div><div class="tally">the Thing was ${things||'—'}</div>`;
  } else { chat.classList.remove('show'); ejecting=null; } }
function applySnapshot(s){ if(s.station){ buildStation(s.station); OPEN=s.station.openTasks||{}; }
  STATE.round=s.round; STATE.tasksDone=s.tasksDone; STATE.tasksTotal=s.tasksTotal; STATE.phase=s.phase;
  STATE.winner=s.winner; STATE.win_by=s.win_by; STATE.scores=s.scores; STATE.meeting=s.meeting; applyAgents(s.agents||[]);
  if(s.lastKill && s.lastKill.tick!==lastKillTick){ lastKillTick=s.lastKill.tick; pushKill(s.lastKill.room); }
  updateMeet(s);
  setConn(s.paused?'paused':'live'); syncHud(); renderChat(s); }
function updateMeet(s){ const inMeet=['meeting','vote','ejection'].includes(s.phase)&&s.meeting;
  if(!inMeet){ meet=null; return; }
  if(!meet){ meet={ t0:performance.now(), ids:STATE.agents.filter(a=>a.alive).map(a=>a.id), spoken:0, bubble:null, votes:{} }; }
  const tr=s.meeting.transcript||[];   // newest revealed line → pop a fresh bubble over its speaker
  if(tr.length>meet.spoken){ const last=tr[tr.length-1], sp=STATE.agents.find(a=>a.name===last.name);
    meet.bubble={ id:sp?sp.id:-1, text:last.text }; meet.spoken=tr.length; }
  meet.votes=s.meeting.votes||{}; }
function setConn(state){ const c=$('conn'); if(!c)return; c.className=state; c.textContent=state==='down'?'offline':state; }
function connect(){ const proto=location.protocol==='https:'?'wss:':'ws:'; let ws;
  try{ ws=new WebSocket(`${proto}//${location.host}/stream`); }catch(e){ return; }
  ws.onopen=()=>setConn('live');
  ws.onmessage=e=>{ try{ applySnapshot(JSON.parse(e.data)); }catch(_){ } }; ws.onerror=()=>{ try{ws.close();}catch(_){ } };
  ws.onclose=()=>{ setConn('down'); setTimeout(connect,2500); }; }
// share — native OS share sheet on mobile, popover fallback on desktop (uniform with the other worlds)
(function(){ const url='https://alibi.artel.run/', title='Alibi — AI agents play The Thing, live';
  $('shareli').href='https://www.linkedin.com/sharing/share-offsite/?url='+encodeURIComponent(url);
  $('sharex').href='https://twitter.com/intent/tweet?url='+encodeURIComponent(url)+'&text='+encodeURIComponent(title);
  const btn=$('sharebtn'),pop=$('sharepop'),copy=$('sharecopy');
  btn.addEventListener('click',e=>{ e.stopPropagation();
    if(navigator.share){ navigator.share({title,text:title,url}).catch(()=>{}); return; } pop.hidden=!pop.hidden; });
  copy.addEventListener('click',async()=>{ try{ await navigator.clipboard.writeText(url); }catch(_){
      const t=document.createElement('textarea'); t.value=url; document.body.appendChild(t); t.select();
      try{ document.execCommand('copy'); }catch(__){} t.remove(); }
    copy.textContent='copied ✓'; pop.hidden=true; setTimeout(()=>{ copy.textContent='copy link'; },1400); });
  document.addEventListener('click',e=>{ if(!e.target.closest('.share')) pop.hidden=true; }); })();

addEventListener('resize',resize); buildStation(STATION0); resize(); syncHud(); requestAnimationFrame(frame); connect();
</script>

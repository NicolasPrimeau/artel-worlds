<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Herald</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Spectral:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#faf6f0;--ink:#1a1428;--ink2:#5a4e6a;
    --rose:#d83c38;--rose2:#c03030;--mint:#3a8c6e;--sage2:#2d7a5e;
    --sand:#e8dcc8;--gold:#b8942a;--lavender:#8874a8;--coral:#d4604a;
    --card-h:140px;--card-w:100px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--cream);color:var(--ink);font-family:"Courier Prime",monospace;min-height:100vh;display:flex;flex-direction:column}

  /* ── header ── */
  #header{display:flex;align-items:center;justify-content:space-between;padding:10px 18px;border-bottom:2px solid var(--ink);background:var(--ink)}
  #header-title{font-family:"Spectral",serif;font-size:clamp(14px,2.5vw,20px);color:var(--cream);letter-spacing:.1em}
  #header-meta{font-size:clamp(8px,1.4vw,11px);color:rgba(250,246,240,.5);letter-spacing:.2em;text-transform:uppercase}
  #viewers{font-size:clamp(8px,1.3vw,10px);color:rgba(250,246,240,.4);letter-spacing:.15em}

  /* ── layout ── */
  #main{display:grid;grid-template-columns:220px 1fr;flex:1;min-height:0;gap:0}

  /* ── sidebar: quest + party ── */
  #sidebar{border-right:1px solid var(--sand);display:flex;flex-direction:column;padding:14px 12px;gap:12px;overflow-y:auto}
  #quest-card{background:white;border:1px solid var(--sand);border-radius:4px;padding:10px}
  #quest-title{font-family:"Spectral",serif;font-size:clamp(11px,1.8vw,14px);font-weight:600;margin-bottom:4px;line-height:1.3}
  #quest-hook{font-size:clamp(8px,1.3vw,10px);color:var(--ink2);line-height:1.5;margin-bottom:6px}
  #quest-complication{font-size:clamp(7px,1.2vw,9px);color:var(--rose2);background:rgba(216,60,56,.07);padding:4px 6px;border-radius:3px;border-left:2px solid var(--rose2);margin-bottom:6px;display:none}
  #objectives{list-style:none}
  #objectives li{font-size:clamp(8px,1.3vw,10px);color:var(--ink2);padding:2px 0;display:flex;gap:5px;align-items:flex-start}
  #objectives li .ob{flex-shrink:0;color:var(--ink);font-weight:700}
  #objectives li.done{opacity:.4;text-decoration:line-through}
  .morale-row{display:flex;align-items:center;gap:5px;margin-top:6px;border-top:1px solid var(--sand);padding-top:5px}
  .morale-lbl{font-size:clamp(6px,1.2vw,7px);letter-spacing:.3em;text-transform:uppercase;color:var(--ink2);flex-shrink:0}
  .morale-bar{flex:1;height:4px;background:rgba(26,20,40,.12);border-radius:2px;overflow:hidden}
  .morale-fill{height:100%;border-radius:2px;transition:width .4s,background .4s}
  .morale-val{font-size:clamp(8px,1.5vw,9px);font-family:"Courier Prime",monospace;min-width:22px;text-align:right;flex-shrink:0}
  .pressure-badge{font-size:clamp(6px,1.2vw,7px);letter-spacing:.15em;text-transform:uppercase;color:var(--coral);background:rgba(212,96,74,.1);padding:1px 5px;border-radius:10px;flex-shrink:0}

  #party-section{display:flex;flex-direction:column;gap:6px}
  #party-label{font-size:clamp(7px,1.2vw,8px);letter-spacing:.3em;text-transform:uppercase;color:var(--ink2)}
  .member-card{background:white;border:1px solid var(--sand);border-radius:4px;padding:8px;display:flex;gap:8px;align-items:flex-start}
  .member-sprite{width:28px;height:28px;border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;background:var(--sand)}
  .member-info{flex:1;min-width:0}
  .member-name{font-size:clamp(8px,1.4vw,10px);font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .member-cls{font-size:clamp(7px,1.2vw,8px);color:var(--lavender);letter-spacing:.1em;text-transform:uppercase}
  .member-hp{font-size:clamp(7px,1.1vw,8px);color:var(--ink2);margin-top:1px}
  .member-status{font-size:clamp(6px,1.1vw,7px);color:var(--rose2);margin-top:1px}

  /* ── narrative column ── */
  #narrative-col{display:flex;flex-direction:column;overflow:hidden}
  #narrative-scroll{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:8px}
  .beat{font-family:"Spectral",serif;font-size:clamp(10px,1.6vw,13px);line-height:1.7;color:var(--ink);padding:8px 0;border-bottom:1px solid rgba(26,20,40,.06)}
  .beat.scene-beat{color:var(--rose2);font-style:italic}
  .reactions{display:flex;flex-direction:column;gap:3px;margin-top:4px}
  .reaction{font-size:clamp(8px,1.3vw,10px);color:var(--ink2);padding-left:10px;border-left:2px solid var(--sand)}
  .reaction .who{font-weight:700;color:var(--lavender)}
  .card-resolved-header{font-size:clamp(8px,1.3vw,10px);letter-spacing:.1em;text-transform:uppercase;display:flex;align-items:center;gap:6px;margin-bottom:3px}
  .dice-badge{padding:1px 7px;border-radius:10px;font-weight:700;font-size:clamp(8px,1.4vw,10px)}
  .dice-hit{background:rgba(58,140,110,.12);color:var(--mint)}
  .dice-mid{background:rgba(184,148,42,.12);color:var(--gold)}
  .dice-miss{background:rgba(216,60,56,.12);color:var(--rose)}
  .nat20{background:var(--mint);color:white}
  .nat1{background:var(--rose);color:white}

  /* ── bottom: window + hand ── */
  #bottom{border-top:2px solid var(--ink);background:var(--ink);padding:10px 14px;display:flex;gap:14px;align-items:flex-start}
  #window-info{color:rgba(250,246,240,.5);font-size:clamp(8px,1.2vw,9px);letter-spacing:.15em;text-transform:uppercase;min-width:80px}
  #window-bar{width:80px;height:3px;background:rgba(250,246,240,.15);border-radius:2px;margin-top:3px;overflow:hidden}
  #window-fill{height:100%;background:var(--lavender);border-radius:2px;transition:width .5s linear}
  #window-count{color:var(--lavender);font-size:clamp(9px,1.5vw,11px);margin-top:3px}
  #hand{display:flex;gap:8px;flex-wrap:nowrap;overflow-x:auto;flex:1}
  .card{width:var(--card-w);height:var(--card-h);background:white;border-radius:6px;padding:8px;cursor:pointer;display:flex;flex-direction:column;flex-shrink:0;transition:transform .15s,box-shadow .15s;position:relative;user-select:none}
  .card:hover{transform:translateY(-6px);box-shadow:0 8px 20px rgba(0,0,0,.2)}
  .card:active{transform:translateY(-3px)}
  .card-type-tag{font-size:7px;letter-spacing:.2em;text-transform:uppercase;font-weight:700;margin-bottom:4px}
  .card-name{font-family:"Spectral",serif;font-size:clamp(9px,1.5vw,11px);font-weight:600;line-height:1.2;flex:1}
  .card-desc{font-size:7px;color:var(--ink2);line-height:1.4;margin-top:auto}
  .card.action .card-type-tag{color:var(--rose)}
  .card.accumulate .card-type-tag{color:var(--gold)}
  .card.chaos .card-type-tag{color:var(--lavender)}
  .card.tweak .card-type-tag{color:var(--mint)}
  .card.played{opacity:.35;pointer-events:none;transform:none!important}

  /* ── typewriter overlay ── */
  #scene-overlay{position:fixed;inset:0;background:rgba(26,20,40,.75);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .3s}
  #scene-overlay.visible{opacity:1;pointer-events:all}
  #scene-box{background:var(--cream);border:2px solid var(--ink);border-radius:6px;max-width:460px;width:90%;padding:24px;font-family:"Spectral",serif;font-size:clamp(12px,2vw,15px);line-height:1.8;color:var(--ink);position:relative}
  #scene-who{font-size:clamp(9px,1.5vw,11px);letter-spacing:.2em;text-transform:uppercase;color:var(--lavender);margin-bottom:8px}
  #scene-text{min-height:50px}
  #scene-dismiss{font-size:clamp(8px,1.3vw,10px);color:var(--ink2);margin-top:12px;text-align:right;letter-spacing:.1em;text-transform:uppercase;cursor:pointer}

  /* ── status bar ── */
  #statusbar{background:var(--sand);border-top:1px solid rgba(26,20,40,.1);padding:4px 14px;font-size:clamp(7px,1.1vw,9px);color:var(--ink2);letter-spacing:.1em;display:flex;gap:12px}
  #phase-tag{text-transform:uppercase;font-weight:700}
  #spend-tag{margin-left:auto}
  #phase-tag.resolving{color:var(--rose)}
  #phase-tag.ended{color:var(--mint)}
</style>
</head>
<body>

<div id="header">
  <div>
    <div id="header-title">Herald</div>
    <div id="header-meta">Multiplayer DM — card-driven institutional adventure</div>
  </div>
  <div id="viewers">— viewers</div>
</div>

<div id="main">
  <!-- sidebar -->
  <div id="sidebar">
    <div id="quest-card">
      <div id="quest-title">—</div>
      <div id="quest-hook"></div>
      <div id="quest-complication"></div>
      <ul id="objectives" class="objectives"></ul>
      <div class="morale-row">
        <span class="morale-lbl">morale</span>
        <div class="morale-bar"><div class="morale-fill" id="morale-fill"></div></div>
        <span class="morale-val" id="morale-val">0</span>
        <span class="pressure-badge" id="pressure-badge" style="display:none"></span>
      </div>
    </div>
    <div id="party-section">
      <div id="party-label">The Party</div>
      <div id="party-members"></div>
    </div>
  </div>

  <!-- narrative -->
  <div id="narrative-col">
    <div id="narrative-scroll"></div>
  </div>
</div>

<!-- bottom bar -->
<div id="bottom">
  <div>
    <div id="window-info">window</div>
    <div id="window-bar"><div id="window-fill" style="width:100%"></div></div>
    <div id="window-count">0 cards</div>
  </div>
  <div id="hand"></div>
</div>

<div id="statusbar">
  <span id="phase-tag">connecting</span>
  <span id="run-tag"></span>
  <span id="spend-tag">$0.0000</span>
</div>

<!-- scene overlay -->
<div id="scene-overlay">
  <div id="scene-box">
    <div id="scene-who"></div>
    <div id="scene-text"></div>
    <div id="scene-dismiss" onclick="dismissScene()">dismiss ↵</div>
  </div>
</div>

<script>
const SPRITES = ["📋","⚔️","🎵","🔮","🗡️","🌿","🛡️","✨"];
let _ws, _hand=[], _playedThisWindow=new Set(), _windowClose=0, _windowOpen=0;
let _typeTimer=null, _sceneQueue=[];

function $(id){return document.getElementById(id);}

function typewriter(el, text, speed=22, cb){
  el.textContent="";
  let i=0;
  clearInterval(_typeTimer);
  _typeTimer=setInterval(()=>{
    el.textContent+=text[i++]||"";
    if(i>=text.length){clearInterval(_typeTimer);if(cb)cb();}
  },speed);
}

function showSceneBeat(text,who){
  _sceneQueue.push({text,who});
  if(_sceneQueue.length===1) _flushScene();
}

function _flushScene(){
  if(!_sceneQueue.length) return;
  const {text,who}=_sceneQueue[0];
  $("scene-who").textContent=who||"";
  $("scene-overlay").classList.add("visible");
  typewriter($("scene-text"),text,20,()=>{});
}

function dismissScene(){
  $("scene-overlay").classList.remove("visible");
  _sceneQueue.shift();
  if(_sceneQueue.length) setTimeout(_flushScene,200);
}

document.addEventListener("keydown",e=>{if(e.key==="Enter"||e.key===" "||e.key==="Escape") dismissScene();});

function setHud(snap){
  const q=snap.quest;
  $("quest-title").textContent=q.title||"Herald";
  $("quest-hook").textContent=q.hook||"";

  const comp=$("quest-complication");
  if(q.complication){comp.textContent=q.complication;comp.style.display="";}
  else{comp.style.display="none";}

  const ol=$("objectives"); ol.innerHTML="";
  const done=q.outcome?q.objectives.length:q.resolution_count||0;
  (q.objectives||[]).forEach((obj,i)=>{
    const li=document.createElement("li");
    const box=document.createElement("span"); box.className="ob";
    box.textContent=i<done?"✓":"□";
    li.appendChild(box); li.appendChild(document.createTextNode(" "+obj));
    if(i<done) li.classList.add("done");
    ol.appendChild(li);
  });

  const momentum=q.momentum||0;
  const pct=Math.max(0,Math.min(100,(momentum+10)/20*100));
  const fill=$("morale-fill"),val=$("morale-val"),badge=$("pressure-badge");
  if(fill){fill.style.width=pct+"%";fill.style.background=momentum>=0?"var(--mint)":"var(--coral)";}
  if(val){val.textContent=(momentum>=0?"+":"")+momentum;val.style.color=momentum>=0?"var(--sage2)":"var(--rose2)";}
  const pc=q.pressure_count||0;
  if(badge){badge.textContent=pc>0?pc+" pressure":"";badge.style.display=pc>0?"":"none";}
}

function setParty(members){
  const el=$("party-members"); el.innerHTML="";
  (members||[]).forEach((m,i)=>{
    const div=document.createElement("div"); div.className="member-card"; div.id="member-"+m.id;
    const sprite=SPRITES[(m.sprite-1)%SPRITES.length];
    div.innerHTML=`<div class="member-sprite">${sprite}</div>
<div class="member-info">
  <div class="member-name">${m.name}</div>
  <div class="member-cls">${m.cls}</div>
  <div class="member-hp">HP ${m.hp}/10</div>
  ${m.status?`<div class="member-status">${m.status}</div>`:""}
</div>`;
    el.appendChild(div);
  });
}

function addNarrativeBeat(html){
  const scroll=$("narrative-scroll");
  const div=document.createElement("div"); div.className="beat";
  div.innerHTML=html;
  scroll.appendChild(div);
  scroll.scrollTop=scroll.scrollHeight;
}

function renderCardResolved(m){
  const dice=m.dice||0;
  const isNat20=dice===20,isNat1=dice===1;
  const dcls=isNat20?"nat20":isNat1?"nat1":m.result==="hit"?"dice-hit":m.result==="mid"?"dice-mid":"dice-miss";
  const dlbl=isNat20?"NAT 20":isNat1?"NAT 1":`${dice}/20`;
  const typeLbl=m.card_type||"";

  let html=`<div class="card-resolved-header">
    <span>${m.card_name||"?"}</span>
    <span class="dice-badge ${dcls}">${dlbl}</span>
    <span style="color:var(--ink2);font-size:8px;letter-spacing:.1em">${typeLbl.toUpperCase()}</span>
  </div>`;
  if(m.narrative) html+=`<div>${m.narrative}</div>`;
  if(m.reactions&&m.reactions.length){
    html+=`<div class="reactions">`;
    m.reactions.forEach(r=>{
      html+=`<div class="reaction"><span class="who">${r.name||""}</span>${r.line?" — "+r.line:""}</div>`;
    });
    html+="</div>";
  }
  addNarrativeBeat(html);
}

function updateWindowBar(){
  const now=Date.now()/1000;
  const total=_windowClose-_windowOpen;
  const remaining=Math.max(0,_windowClose-now);
  const pct=total>0?Math.round(remaining/total*100):0;
  const fill=$("window-fill"); if(fill) fill.style.width=pct+"%";
  if(remaining<=0) return;
  setTimeout(updateWindowBar,500);
}

function dealHand(){
  fetch("/hand").then(r=>r.json()).then(cards=>{
    _hand=cards; _playedThisWindow=new Set(); renderHand();
  });
}

function renderHand(){
  const el=$("hand"); el.innerHTML="";
  _hand.forEach(c=>{
    const div=document.createElement("div");
    div.className="card "+c.type+((_playedThisWindow.has(c.id))?" played":"");
    div.innerHTML=`<div class="card-type-tag">${c.type}</div>
<div class="card-name">${c.name}</div>
<div class="card-desc">${c.description}</div>`;
    div.onclick=()=>playCard(c.id,div);
    el.appendChild(div);
  });
}

function playCard(cardId,el){
  if(_playedThisWindow.has(cardId)||el.classList.contains("played")) return;
  el.classList.add("played");
  _playedThisWindow.add(cardId);
  fetch("/play",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({card_id:cardId,player_id:"viewer"})})
    .then(r=>r.json()).then(d=>{
      if(d.error) el.classList.remove("played");
    }).catch(()=>el.classList.remove("played"));
}

function connect(){
  const proto=location.protocol==="https:"?"wss:":"ws:";
  _ws=new WebSocket(`${proto}//${location.host}/ws`);
  _ws.onopen=()=>{setStatus("active");dealHand();};
  _ws.onclose=()=>{setStatus("disconnected");setTimeout(connect,3000);};
  _ws.onmessage=e=>{
    const m=JSON.parse(e.data);
    switch(m.type){
      case "state":
        setHud(m); setParty(m.party);
        $("viewers").textContent=(m.viewers||1)+" viewer"+(m.viewers!==1?"s":"");
        $("run-tag").textContent="run "+m.run_id;
        setPhase(m.phase);
        if(m.window){
          _windowOpen=m.window.opened_at; _windowClose=m.window.closes_at;
          $("window-count").textContent=m.window.card_count+" card"+(m.window.card_count!==1?"s":"");
          updateWindowBar();
        }
        break;
      case "card_resolved": renderCardResolved(m); setHud(m); break;
      case "scene_beat": showSceneBeat(m.text,m.who); break;
      case "window_closing":
        _playedThisWindow=new Set(); dealHand();
        addNarrativeBeat(`<span style="color:var(--ink2);font-size:9px;letter-spacing:.2em">— WINDOW CLOSED — ${m.card_count} card${m.card_count!==1?"s":""} resolving —</span>`);
        break;
      case "window_reset":
        _windowClose=m.closes_at; _windowOpen=Date.now()/1000;
        _playedThisWindow=new Set(); dealHand(); updateWindowBar();
        break;
      case "new_quest":
        $("narrative-scroll").innerHTML="";
        setHud(m); setParty(m.party);
        $("run-tag").textContent="run "+m.run_id;
        dealHand();
        addNarrativeBeat(`<span style="font-family:'Spectral',serif;font-size:15px;font-weight:600">${m.quest?.title||"New Quest"}</span><br>${m.quest?.hook||""}`);
        break;
      case "quest_ended":
        setPhase("ended");
        showSceneBeat(
          `Quest complete — ${m.outcome}.\n${m.title} resolved after ${m.resolution_count} scene${m.resolution_count!==1?"s":""}. Final morale: ${m.momentum>=0?"+":""}${m.momentum}.`,
          "Herald"
        );
        break;
      case "crit_moment":
        if(m.crit==="nat_20") showSceneBeat("Critical. Something just specifically worked.","");
        else if(m.crit==="nat_1") showSceneBeat("Critical failure. Something has gone specifically wrong.","");
        break;
      case "card_played":
        $("window-count").textContent=m.card_count+" card"+(m.card_count!==1?"s":"");
        break;
    }
  };
}

function setPhase(p){
  const el=$("phase-tag"); el.textContent=p||""; el.className="";
  if(p==="resolving") el.classList.add("resolving");
  if(p==="ended") el.classList.add("ended");
}

function setStatus(s){$("phase-tag").textContent=s;}

setInterval(()=>{
  fetch("/spend").then(r=>r.json()).then(d=>{
    $("spend-tag").textContent="$"+d.spend.toFixed(4);
  }).catch(()=>{});
},15000);

connect();
</script>
</body>
</html>

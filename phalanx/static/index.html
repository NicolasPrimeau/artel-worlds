<style>
  :root {
    --bg:#090a0e; --panel:rgba(18,20,27,.72); --line:#1b212b; --fg:#e6eaf1; --dim:#79839a;
    --gold:#d4af37; --artel:#3d8bff; --artel-soft:#7fb0ff; --red:#ff4d4d; --red-soft:#ff8a8a;
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; height:100%; }
  body {
    background:var(--bg); color:var(--fg); overflow:hidden; position:relative;
    font:13px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    display:flex; flex-direction:column; height:100dvh;
  }
  header {
    flex:0 0 auto; display:flex; flex-wrap:wrap; align-items:center; gap:6px 18px;
    padding:11px 16px; border-bottom:1px solid var(--line); position:relative; z-index:3;
    padding-top:max(11px, env(safe-area-inset-top));
    background:linear-gradient(180deg, rgba(14,16,22,.9), rgba(14,16,22,.45));
  }
  .brand { display:flex; align-items:center; gap:8px; }
  .brand svg { display:block; }
  .brand h1 { font-size:14px; margin:0; letter-spacing:3px; font-weight:800; color:#fff; }
  .brand span { color:var(--dim); font-weight:400; letter-spacing:1px; font-size:12px; }
  .tagline { color:var(--dim); font-size:12px; }
  .tagline b { color:var(--artel-soft); font-weight:600; }
  .spacer { margin-left:auto; }
  .tick { color:var(--dim); font-variant-numeric:tabular-nums; } .tick b { color:#fff; }
  #conn { color:var(--dim); display:inline-flex; align-items:center; gap:5px; }
  #conn::before { content:""; width:7px; height:7px; border-radius:50%; background:var(--dim); }
  #conn.live { color:#6ee7a8; } #conn.live::before { background:#6ee7a8; box-shadow:0 0 8px #6ee7a8; }
  #wrap { position:relative; flex:1 1 auto; min-height:0; }
  canvas#c { display:block; width:100%; height:100%; touch-action:none; }
  /* scoreboard */
  #score {
    position:absolute; right:14px; top:14px; z-index:2; min-width:236px;
    background:var(--panel); border:1px solid var(--line); border-radius:13px;
    padding:12px 14px; backdrop-filter:blur(12px); box-shadow:0 10px 34px rgba(0,0,0,.45);
  }
  #score .ttl { color:var(--dim); font-size:10px; letter-spacing:1.5px; text-transform:uppercase; margin-bottom:9px; }
  .team { margin:7px 0; }
  .team .top { display:flex; align-items:center; gap:8px; }
  .team .dot { width:10px; height:10px; border-radius:50%; flex:0 0 auto; }
  .team .nm { color:#fff; font-weight:700; } .team .nm small { color:var(--dim); font-weight:400; letter-spacing:.2px; }
  .team .n { margin-left:auto; font-weight:800; font-size:17px; color:#fff; font-variant-numeric:tabular-nums; }
  .team .bar { height:4px; border-radius:3px; background:#222833; margin-top:6px; overflow:hidden; }
  .team .bar i { display:block; height:100%; width:0; border-radius:3px; transition:width .5s ease; }
  /* legend + cta */
  #hud {
    position:absolute; left:14px; bottom:calc(14px + env(safe-area-inset-bottom)); z-index:2;
    background:var(--panel); border:1px solid var(--line); border-radius:13px;
    padding:11px 13px; backdrop-filter:blur(12px); box-shadow:0 10px 34px rgba(0,0,0,.45); max-width:300px;
  }
  #hud .leg { display:flex; flex-wrap:wrap; gap:6px 14px; color:var(--dim); font-size:11px; margin-bottom:9px; }
  #hud .leg span { display:inline-flex; align-items:center; gap:5px; }
  #hud .sw { width:11px; height:11px; border-radius:3px; flex:0 0 auto; }
  #hud .sw.ring { border-radius:50%; border:2px solid var(--artel); background:transparent; }
  #hud .sw.beam { background:linear-gradient(90deg, transparent, var(--artel-soft)); height:3px; border-radius:2px; width:16px; }
  #hud .sw.zone { background:transparent; border:1.5px dashed var(--red); border-radius:50%; }
  #hud .cta { display:flex; gap:8px; flex-wrap:wrap; }
  #hud .cta a.primary { flex-basis:100%; }
  #hud .cta a {
    flex:1; text-align:center; text-decoration:none; font-weight:600; font-size:11px;
    color:var(--fg); background:#1a2230; border:1px solid var(--line); border-radius:8px; padding:6px 8px;
  }
  #hud .cta a:hover { border-color:#2f3a4c; color:#fff; }
  #hud .cta a.gh { display:inline-flex; align-items:center; justify-content:center; gap:6px; white-space:nowrap; }
  #hud .cta a.primary { background:linear-gradient(180deg, #1d3a66, #142a4d); border-color:#2b4d80; color:#cfe2ff; }
  #hud .cta a b { color:var(--gold); }
  #winner {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); z-index:4;
    display:none; align-items:center; gap:11px; padding:13px 24px; border-radius:13px;
    background:var(--panel); border:1px solid var(--line); backdrop-filter:blur(12px);
    font-size:20px; font-weight:800; letter-spacing:2px; white-space:nowrap;
    box-shadow:0 14px 44px rgba(0,0,0,.6);
  }
  #winner.show { display:flex; animation:pop .35s ease; }
  #winner .dot { width:13px; height:13px; border-radius:50%; }
  @keyframes pop { from { transform:translate(-50%,-50%) scale(.8); opacity:0; } }
  /* mobile: slim full-width panels, winner overlay stays mid-arena and unobstructed */
  @media (max-width:640px) {
    header { gap:4px 10px; padding:9px 12px; padding-top:max(9px, env(safe-area-inset-top)); }
    .tagline { font-size:11px; flex-basis:100%; }
    .tagline .tl1, .tagline .tl2 { display:block; line-height:1.4; }
    #score {
      left:10px; right:10px; top:10px; min-width:0;
      display:flex; gap:14px; padding:9px 12px;
    }
    #score .ttl { display:none; }
    #score .team { flex:1; margin:0; }
    #score .nm small { display:none; }
    #hud { left:10px; right:10px; bottom:calc(10px + env(safe-area-inset-bottom)); max-width:none; }
    #hud .leg { display:none; }
    #winner { font-size:17px; padding:11px 18px; }
  }
  #tip {
    position:fixed; z-index:10; pointer-events:none; opacity:0; transition:opacity .08s;
    background:var(--panel); border:1px solid #2b323d; border-radius:9px; padding:8px 10px;
    backdrop-filter:blur(10px); font-size:12px; box-shadow:0 8px 26px rgba(0,0,0,.55);
  }
  #tip.show { opacity:1; }
  #tip .hd { font-weight:700; color:#fff; display:flex; align-items:center; gap:6px; margin-bottom:4px; }
  #tip .dot { width:9px; height:9px; border-radius:50%; }
  #tip table td { color:var(--dim); padding:0; } #tip td.v { color:var(--fg); text-align:right; padding-left:14px; }
</style>

<script>
const $ = id => document.getElementById(id);
const cv = $('c'), ctx = cv.getContext('2d'), tip = $('tip');
const SQRT3 = Math.sqrt(3);
const TEAM = {
  artel: { h:[61,139,255], soft:'#7fb0ff', solid:'#3d8bff' },
  red:   { h:[255,77,77],  soft:'#ff8a8a', solid:'#ff4d4d' },
};
const teamRGB = t => (TEAM[t] || TEAM.red).h;
const rgba = (c,a) => `rgba(${c[0]},${c[1]},${c[2]},${a})`;
const esc = s => String(s).replace(/[<>&]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));
const MAXE = 90, ANIM = 900, BEAM_MS = 1000, TRAVEL_MS = 250, FLASH_MS = 900, DEATH_MS = 620;
// The engine resolves each tick in phases — everyone turns, everyone moves, THEN everyone
// fires (from post-move cells), then deaths. Replay it in that order: glide first, the
// volley fires once tanks settle, impacts land on beam arrival, deaths burst last.
const FIRE_AT = ANIM, IMPACT_AT = ANIM + TRAVEL_MS, DEATH_AT = ANIM + TRAVEL_MS + 200;

let snap=null, dpr=1, cssW=0, cssH=0, L=null, hits=[], hoverId=null, winnerTimer=0;
let anim={}, t0=0, meta={}, prevTick=null; // smooth interpolation + per-tank team/coord
let beams=[], deaths=[], flashes=[], ghosts=[], gains=[]; // transient effects (born may be in the future)
let prevIds=new Set();

const hexDist=(aq,ar,bq,br)=>{const dq=aq-bq,dr=ar-br;return (Math.abs(dq)+Math.abs(dq+dr)+Math.abs(dr))/2;};
const ease=t=>t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;
const lerp=(a,b,t)=>a+(b-a)*t;

function resize(){
  dpr=Math.min(window.devicePixelRatio||1,2);
  const w=$('wrap'); cssW=w.clientWidth; cssH=w.clientHeight;
  cv.width=Math.round(cssW*dpr); cv.height=Math.round(cssH*dpr);
  cv.style.width=cssW+'px'; cv.style.height=cssH+'px';
  if(snap){ layout(); for(const id in anim){ const a=anim[id]; const p=pix(a.q,a.r); a.fromX=a.toX=p.x; a.fromY=a.toY=p.y; } }
}
function mapR(){ return snap.map_radius!=null?snap.map_radius:Math.floor((snap.width-1)/2); }
function onMap(q,r){ const R=mapR(); return hexDist(q,r,R,R)<=R; }
function layout(){
  // TRUE AXIAL projection (every row shifts r/2), and the arena itself is a HEXAGON of
  // radius R: x spans from R/2 to 2.5R in cell units, so the screen extent is 2R+1 cells.
  const rows=snap.height, R=Math.floor((rows-1)/2), pad=26;
  const size=Math.max(1,Math.min((cssW-pad*2)/(SQRT3*(2*R+1.5)), (cssH-pad*2)/(1.5*rows+0.5)));
  const gw=SQRT3*size*(2*R+1.5), gh=(1.5*rows+0.5)*size;
  L={ size, offX:(cssW-gw)/2 - SQRT3*size*(R/2), offY:(cssH-gh)/2 };
}
function center(q,r){ return [L.offX+SQRT3*L.size*(q+r/2+0.5), L.offY+L.size*(1.5*r+1)]; }
function pix(q,r){ const c=center(q,r); return {x:c[0], y:c[1]}; }
function hexPath(x,y,s){ ctx.beginPath(); for(let i=0;i<6;i++){ const a=(Math.PI/180)*(60*i-90); const px=x+s*Math.cos(a), py=y+s*Math.sin(a); i?ctx.lineTo(px,py):ctx.moveTo(px,py);} ctx.closePath(); }
function curPos(a,now){ const f=ease(Math.min(1,(now-t0)/ANIM)); return { x:lerp(a.fromX,a.toX,f), y:lerp(a.fromY,a.toY,f) }; }

const HEXANG=[0,-Math.PI/3,-2*Math.PI/3,Math.PI,2*Math.PI/3,Math.PI/3];
function drawTank(x,y,hullDir,aim,energy,team,coord){
  // Everything fits inside the hex inradius (~0.87*size) so neighbouring tanks — barrels
  // included — can never overlap. Hull 0.42, rings to ~0.61, barrel tip at 0.84.
  // hullDir is the 6-way movement facing; aim is the turret angle in radians (360°).
  const c=teamRGB(team), s=L.size, rad=s*0.42;
  // shadow
  ctx.beginPath(); ctx.ellipse(x,y+rad*0.45,rad*0.95,rad*0.5,0,0,7); ctx.fillStyle='rgba(0,0,0,.35)'; ctx.fill();
  // body with radial shading
  const bg=ctx.createRadialGradient(x-rad*0.35,y-rad*0.4,rad*0.2,x,y,rad);
  bg.addColorStop(0,rgba(c,1)); bg.addColorStop(1,rgba([c[0]*0.45,c[1]*0.45,c[2]*0.45],1));
  ctx.beginPath(); ctx.arc(x,y,rad,0,7); ctx.fillStyle=bg; ctx.fill();
  ctx.lineWidth=1.5; ctx.strokeStyle='rgba(0,0,0,.35)'; ctx.stroke();
  // hull nose: a dark wedge showing the MOVEMENT facing (fwd goes this way)
  const hd=HEXANG[hullDir]??0;
  ctx.beginPath(); ctx.moveTo(x,y);
  ctx.arc(x,y,rad*0.92,hd-0.45,hd+0.45); ctx.closePath();
  ctx.fillStyle='rgba(0,0,0,.38)'; ctx.fill();
  // energy gauge: a traffic-light arc (green -> amber -> red as health drops) over a faint
  // full track — readable at a glance even at phone sizes, unmistakable as a gauge
  const ef=Math.max(0.02,Math.min(1,energy/MAXE));
  const ec=ef>0.5?[110,231,168]:ef>0.25?[250,200,80]:[255,95,95];
  ctx.lineCap='round';
  ctx.beginPath(); ctx.arc(x,y,rad*1.24,0,7);
  ctx.strokeStyle='rgba(255,255,255,.12)'; ctx.lineWidth=Math.max(2.2,rad*0.2); ctx.stroke();
  ctx.beginPath(); ctx.arc(x,y,rad*1.24,-Math.PI/2,-Math.PI/2+2*Math.PI*ef);
  ctx.strokeStyle=rgba(ec,.95); ctx.lineWidth=Math.max(2.2,rad*0.2); ctx.stroke();
  // Artel-coordinated tanks wear a thin gold ring (the Artel mark)
  if(coord){ ctx.beginPath(); ctx.arc(x,y,rad*1.45,0,7); ctx.strokeStyle='rgba(212,175,55,.85)'; ctx.lineWidth=Math.max(1.2,rad*0.1); ctx.stroke(); }
  // turret + barrel ON TOP at the smooth aim angle — the cannon traverses 360°,
  // independent of the hull, and visibly tracks the tank's current target
  const bx=Math.cos(aim), by=Math.sin(aim);
  ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x+bx*s*0.84,y+by*s*0.84);
  ctx.strokeStyle='#0b0d12'; ctx.lineWidth=Math.max(3.5,rad*0.52); ctx.stroke();   // dark outline
  ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x+bx*s*0.8,y+by*s*0.8);
  ctx.strokeStyle=rgba([Math.min(255,c[0]+60),Math.min(255,c[1]+60),Math.min(255,c[2]+60)],1);
  ctx.lineWidth=Math.max(2,rad*0.3); ctx.stroke();                                 // bright bore
  ctx.beginPath(); ctx.arc(x,y,rad*0.45,0,7); ctx.fillStyle='#10141b'; ctx.fill(); // turret hub
  ctx.beginPath(); ctx.arc(x,y,rad*0.45,0,7); ctx.strokeStyle=rgba(c,.9); ctx.lineWidth=1.5; ctx.stroke();
}

function render(now){
  if(!snap||!L) return;
  ctx.setTransform(dpr,0,0,dpr,0,0);
  // backdrop with a soft vignette
  ctx.fillStyle='#070809'; ctx.fillRect(0,0,cssW,cssH);
  const g=ctx.createRadialGradient(cssW/2,cssH/2,Math.min(cssW,cssH)*0.2,cssW/2,cssH/2,Math.max(cssW,cssH)*0.7);
  g.addColorStop(0,'#0d1016'); g.addColorStop(1,'#070809'); ctx.fillStyle=g; ctx.fillRect(0,0,cssW,cssH);
  const s=L.size, z=snap.zone||{q:snap.width/2,r:snap.height/2,radius:snap.width};

  // grid + closing zone (cells outside the safe radius glow danger-red)
  for(let r=0;r<snap.height;r++) for(let q=0;q<snap.width;q++){
    if(!onMap(q,r)) continue;
    const [x,y]=center(q,r); const outside=hexDist(q,r,z.q,z.r)>z.radius;
    hexPath(x,y,s*0.93);
    ctx.fillStyle = outside ? 'rgba(70,18,22,.5)' : '#0e1218';
    ctx.fill();
    ctx.lineWidth=1; ctx.strokeStyle = outside ? 'rgba(255,77,77,.16)' : '#161c25'; ctx.stroke();
  }
  // zone boundary ring (cells right at the edge)
  for(let r=0;r<snap.height;r++) for(let q=0;q<snap.width;q++){
    if(!onMap(q,r)) continue;
    if(Math.abs(hexDist(q,r,z.q,z.r)-z.radius)<0.6 && z.radius<snap.width-0.5){
      const [x,y]=center(q,r); hexPath(x,y,s*0.93);
      ctx.lineWidth=2; ctx.strokeStyle='rgba(255,90,90,.5)'; ctx.stroke();
    }
  }
  const floatTexts=[];
  // beams — a straight shot from shooter to target with a travelling pulse head (the
  // engine's hex-line LOS check approximates exactly this segment, so straight is honest)
  beams=beams.filter(b=>now-b.born<BEAM_MS);
  ctx.save(); ctx.lineCap='round'; ctx.lineJoin='round';
  for(const b of beams){ if(now<b.born) continue;
    const age=now-b.born, fade=1-age/BEAM_MS, c=teamRGB(b.team);
    const pts=b.pts; if(!pts||pts.length<2) continue;
    const head=Math.min(1,age/TRAVEL_MS)*(pts.length-1);
    const hi=Math.floor(head), hf=head-hi;
    ctx.shadowColor=rgba(c,.9); ctx.shadowBlur=12;
    ctx.beginPath(); ctx.moveTo(pts[0][0],pts[0][1]);
    for(let i=1;i<=hi;i++) ctx.lineTo(pts[i][0],pts[i][1]);
    if(hi<pts.length-1) ctx.lineTo(lerp(pts[hi][0],pts[hi+1][0],hf), lerp(pts[hi][1],pts[hi+1][1],hf));
    const pw=b.pw||2;
    ctx.strokeStyle=rgba(c,fade*.85); ctx.lineWidth=(1+0.7*pw)+(1.2*pw)*fade*0.8; ctx.stroke();
    // bright head while travelling
    if(age<TRAVEL_MS){ const hx=hi<pts.length-1?lerp(pts[hi][0],pts[hi+1][0],hf):pts[pts.length-1][0];
      const hy=hi<pts.length-1?lerp(pts[hi][1],pts[hi+1][1],hf):pts[pts.length-1][1];
      ctx.beginPath(); ctx.arc(hx,hy,3.2,0,7); ctx.fillStyle='#fff'; ctx.fill(); }
  }
  ctx.restore();
  // impact: a ring + the damage number rising off the tank that was hit
  flashes=flashes.filter(f=>now-f.born<FLASH_MS);
  for(const f of flashes){ if(now<f.born) continue;
    const t=(now-f.born)/FLASH_MS, a=1-t, c=teamRGB(f.team);
    const e=(f.tg&&anim[f.tg])?curPos(anim[f.tg],now):{x:f.x,y:f.y};
    ctx.beginPath(); ctx.arc(e.x,e.y,3+ease(Math.min(1,t*2.5))*s*0.75,0,7);
    ctx.strokeStyle=rgba(c,a); ctx.lineWidth=2.5; ctx.stroke();
    if(f.dmg){ const fs=Math.max(13,Math.round(s*0.55));
      const tx=Math.max(16,Math.min(cssW-16,e.x+(f.jx||0)));
      const ty=Math.max(14,Math.min(cssH-6,e.y-s*0.8-t*s*0.9+(f.jy||0)));
      floatTexts.push({s:`-${f.dmg}`,x:tx,y:ty,fs,fill:`rgba(255,235,235,${a})`,a}); }
  }

  // energy gained by the shooter when a hit lands — the other half of the -12 story
  gains=gains.filter(g=>now-g.born<FLASH_MS);
  for(const g of gains){ if(now<g.born) continue;
    const t=(now-g.born)/FLASH_MS, a=1-t;
    const e=(g.tg&&anim[g.tg])?curPos(anim[g.tg],now):{x:g.x,y:g.y};
    const fs=Math.max(12,Math.round(s*0.45));
    const tx=Math.max(16,Math.min(cssW-16,e.x+(g.jx||0)));
    const ty=Math.max(14,Math.min(cssH-6,e.y-s*0.8-t*s*0.9+(g.jy||0)));
    floatTexts.push({s:`+${g.amt}`,x:tx,y:ty,fs,fill:`rgba(140,240,170,${a})`,a});
  }

  // death bursts (scheduled after the killing impact lands)
  deaths=deaths.filter(d=>now-d.born<DEATH_MS);
  for(const d of deaths){ if(now<d.born) continue;
    const t=(now-d.born)/DEATH_MS, a=1-t, c=teamRGB(d.team);
    ctx.beginPath(); ctx.arc(d.x,d.y,t*s*1.3,0,7); ctx.strokeStyle=rgba(c,a*.8); ctx.lineWidth=2.5; ctx.stroke();
    for(let i=0;i<6;i++){ const ang=i*Math.PI/3; const rr=t*s*1.5;
      ctx.beginPath(); ctx.arc(d.x+Math.cos(ang)*rr, d.y+Math.sin(ang)*rr, Math.max(.5,(1-t)*2.5),0,7);
      ctx.fillStyle=rgba(c,a); ctx.fill(); }
  }

  // ghosts: tanks that died this tick stay on the field — gliding their last move — until
  // the volley lands and their burst fires, so a kill reads as shot -> impact -> gone
  ghosts=ghosts.filter(g=>now<g.until);
  for(const g of ghosts){ const f=ease(Math.min(1,(now-t0)/ANIM));
    drawTank(lerp(g.fromX,g.toX,f), lerp(g.fromY,g.toY,f), g.heading, g.aim??(HEXANG[g.heading]??0), g.energy, g.team, g.coord);
  }

  // tanks (interpolated; energy display holds until this tick's impacts land)
  hits=[];
  for(const t of snap.tank_list){
    const a=anim[t.id]; if(!a) continue; const {x,y}=curPos(a,now);
    const m=meta[t.id]||{};
    // turret traverse: aim smoothly tracks the live target (any angle), falling back to
    // the hull facing when there's nothing to shoot — the cannon visibly swings 360°
    let des=HEXANG[t.heading]??0;
    if(m.aimUntil&&now<m.aimUntil&&m.aimX!=null){ des=Math.atan2(m.aimY-y,m.aimX-x); }
    else if(t.target&&anim[t.target]){ const tp=curPos(anim[t.target],now); des=Math.atan2(tp.y-y,tp.x-x); }
    let cur=(m.aim===undefined)?des:m.aim;
    let dlt=des-cur; while(dlt>Math.PI)dlt-=2*Math.PI; while(dlt<-Math.PI)dlt+=2*Math.PI;
    cur+=dlt*0.25; m.aim=cur; meta[t.id]=m;
    drawTank(x,y,t.heading,cur,(m.eAt&&now<m.eAt)?m.e0:t.energy,t.team,t.coord);
    if(t.id===hoverId){ ctx.beginPath(); ctx.arc(x,y,s*0.7,0,7); ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.stroke(); }
    hits.push({x,y,r:s*0.55,t});
  }

  // cover (walls) drawn LAST so it occludes tanks behind it — obstacles read as cover,
  // never as something a tank is sitting on top of
  for(const w of snap.wall_list){ const [x,y]=center(w.q,w.r);
    hexPath(x,y,s*0.93); ctx.fillStyle='#27303b'; ctx.fill();
    hexPath(x,y,s*0.93); ctx.lineWidth=1; ctx.strokeStyle='rgba(255,255,255,.08)'; ctx.stroke();
  }

  // floating numbers go ABOVE everything — cover must never hide the scorekeeping
  ctx.textAlign='center'; ctx.lineJoin='round';
  for(const ft of floatTexts){
    ctx.font=`bold ${ft.fs}px ui-monospace,monospace`;
    ctx.strokeStyle=`rgba(0,0,0,${ft.a*.8})`; ctx.lineWidth=Math.max(1.5,ft.fs*0.16);
    ctx.fillStyle=ft.fill;
    ctx.strokeText(ft.s,ft.x,ft.y); ctx.fillText(ft.s,ft.x,ft.y);
  }
}
function loop(now){ try{ render(now); }catch(e){ /* never let one bad frame kill the loop */ } requestAnimationFrame(loop); }

function apply(snp){
  const now=performance.now();
  const first=!snap||snap.width!==snp.width;
  if(!L||first){ snap=snp; layout(); }
  // new match: drop every scheduled effect from the old one
  if(prevTick!=null && snp.tick<prevTick){ beams=[]; flashes=[]; deaths=[]; ghosts=[]; gains=[]; anim={}; meta={}; prevIds=new Set(); }
  prevTick=snp.tick;
  // this tick's volley — scheduled to fire only after the glide settles, because the engine
  // fires AFTER moves (tracer cells are post-move). Beams track the live tanks regardless.
  const aims={};
  if(L) for(const tc of (snp.tracer_list||[])){ const a=pix(tc.q,tc.r), b=pix(tc.tq,tc.tr);
    const tg=snp.tank_list.find(t=>t.q===tc.tq&&t.r===tc.tr);
    const sh=snp.tank_list.find(t=>t.q===tc.q&&t.r===tc.r);
    if(sh) aims[sh.id]={x:b.x,y:b.y,until:now+FIRE_AT+BEAM_MS};
    beams.push({pts:[[a.x,a.y],[b.x,b.y]],team:tc.team,born:now+FIRE_AT,pw:tc.power||2});
    const jx=()=> (Math.random()-0.5)*L.size*1.2, jy=()=> (Math.random()-0.5)*L.size*0.7;
    flashes.push({x:b.x,y:b.y,team:tc.team,born:now+IMPACT_AT,tg:tg&&tg.id,dmg:Math.round(tc.dmg||0),jx:jx(),jy:jy()});
    if(tc.reward) gains.push({x:a.x,y:a.y,tg:sh&&sh.id,amt:Math.round(tc.reward),born:now+IMPACT_AT,jx:jx(),jy:jy()}); }
  // retarget interpolation: glide from current rendered pos to the new hex. Hold the energy
  // display at its pre-volley value until this tick's impacts land.
  const A={};
  for(const t of snp.tank_list){ const old=anim[t.id]; const from=old?curPos(old,now):pix(t.q,t.r); const to=pix(t.q,t.r);
    A[t.id]={fromX:from.x,fromY:from.y,toX:to.x,toY:to.y,q:t.q,r:t.r};
    const pe=meta[t.id]?meta[t.id].e1:t.energy;
    meta[t.id]={team:t.team,coord:t.coord,heading:t.heading,e0:pe,e1:t.energy,eAt:now+IMPACT_AT,
      aim:meta[t.id]&&meta[t.id].aim,
      aimX:aims[t.id]&&aims[t.id].x,aimY:aims[t.id]&&aims[t.id].y,
      aimUntil:aims[t.id]&&aims[t.id].until}; }
  // deaths: keep the fallen tank on the field as a ghost gliding its last move (to the cell
  // the killing shot actually hit, if one matches), then burst once the volley lands
  const ids=new Set(snp.tank_list.map(t=>t.id));
  const orphanHits=(snp.tracer_list||[]).filter(tc=>!snp.tank_list.some(t=>t.q===tc.tq&&t.r===tc.tr));
  for(const id of prevIds){ if(!ids.has(id) && anim[id]){ const p=curPos(anim[id],now); const m=meta[id]||{};
    let dx=p.x, dy=p.y, best=Infinity;
    for(const tc of orphanHits){ const c2=pix(tc.tq,tc.tr); const d=(c2.x-p.x)**2+(c2.y-p.y)**2;
      if(d<best){ best=d; dx=c2.x; dy=c2.y; } }
    ghosts.push({fromX:p.x,fromY:p.y,toX:dx,toY:dy,team:m.team||'red',coord:m.coord,heading:m.heading||0,aim:m.aim,energy:m.e1||2,until:now+DEATH_AT});
    deaths.push({x:dx,y:dy,team:m.team||'red',born:now+DEATH_AT}); } }
  prevIds=ids; anim=A; t0=now; snap=snp;

  $('s_tick').textContent=snp.tick;
  const a=(snp.scores&&snp.scores.artel)||0, rd=(snp.scores&&snp.scores.red)||0, tot=a+rd||1;
  const setScore=()=>{
    $('sc_artel').textContent=a; $('sc_red').textContent=rd;
    $('t_artel').querySelector('.bar i').style.width=(100*a/tot)+'%';
    $('t_red').querySelector('.bar i').style.width=(100*rd/tot)+'%';
  };
  const w=$('winner');
  clearTimeout(winnerTimer);
  if(snp.winner){
    // hold the announcement AND the score tick until the final volley, impact, and death
    // burst have played out — updating either while the losing tank still stands spoils it
    winnerTimer=setTimeout(()=>{ const c=TEAM[snp.winner]||TEAM.red;
      $('winner_txt').textContent=snp.winner.toUpperCase()+' WINS';
      w.querySelector('.dot').style.background=c.solid;
      w.querySelector('#winner_txt').style.color=c.soft;
      w.classList.add('show'); setScore(); }, DEATH_AT+DEATH_MS*0.6);
  } else { w.classList.remove('show'); setScore(); }
}

function pick(px,py){ let best=null,bd=Infinity; for(const h of hits){ const dx=px-h.x,dy=py-h.y,d=dx*dx+dy*dy,reach=Math.max(h.r+5,14);
  if(d<reach*reach&&d<bd){bd=d;best=h;} } return best; }
function showTip(h,X,Y){ const t=h.t; const c=TEAM[t.team]||TEAM.red;
  tip.innerHTML=`<div class="hd"><span class="dot" style="background:${c.solid}"></span>tank #${t.id} · ${esc(t.team)}${t.coord?' · ⬡ Artel':''}</div>`
    +`<table><tr><td>energy</td><td class="v">${t.energy}</td></tr><tr><td>hex</td><td class="v">${t.q}, ${t.r}</td></tr></table>`;
  tip.classList.add('show'); const rc=tip.getBoundingClientRect();
  let tx=X+15,ty=Y+15; if(tx+rc.width>innerWidth-8)tx=X-rc.width-15; if(ty+rc.height>innerHeight-8)ty=Y-rc.height-15;
  tip.style.left=Math.max(8,tx)+'px'; tip.style.top=Math.max(8,ty)+'px';
}
function onMove(e){ const rect=cv.getBoundingClientRect(); const h=pick(e.clientX-rect.left,e.clientY-rect.top);
  if(h){ hoverId=h.t.id; showTip(h,e.clientX,e.clientY); } else if(hoverId!=null){ hoverId=null; tip.classList.remove('show'); } }
cv.addEventListener('pointermove',onMove);
cv.addEventListener('pointerleave',()=>{ hoverId=null; tip.classList.remove('show'); });

function connect(){ const proto=location.protocol==='https:'?'wss':'ws'; const ws=new WebSocket(`${proto}://${location.host}/stream`);
  ws.onopen=()=>{ $('conn').textContent='live'; $('conn').className='live'; };
  ws.onmessage=e=>apply(JSON.parse(e.data));
  ws.onclose=()=>{ $('conn').textContent='reconnecting…'; $('conn').className=''; setTimeout(connect,1500); };
  ws.onerror=()=>ws.close();
}
new ResizeObserver(resize).observe($('wrap'));
resize(); connect(); requestAnimationFrame(loop);
</script>
</body>

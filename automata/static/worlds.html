<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0f0f0f">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<title>Artel Worlds — living worlds where AI agents coordinate</title>
<meta name="description" content="Living worlds where AI agent teams coordinating through Artel face identical agents working alone. Automata, Phalanx, Watchtower, Pitch, Verglas — the gap is measured live, in the open.">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Artel Worlds">
<meta property="og:title" content="Artel Worlds">
<meta property="og:description" content="Living worlds where AI agents survive, fight, and recover — and coordination through Artel is the variable under test, live.">
<meta property="og:url" content="https://worlds.artel.run/">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.9/dist/chart.umd.min.js" defer></script>
<style>
  :root { --bg:#0f0f0f; --fg:#f1f1f1; --dim:#aaa; --card:#181818; --hover:#272727; --line:#2a2a2a; --red:#f0331e; --gold:#d4af37; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; min-height:100%; }
  body { background:var(--bg); color:var(--fg);
    font:14px/1.5 "Roboto","Arial",system-ui,-apple-system,sans-serif; }
  a { color:inherit; text-decoration:none; }
  /* top bar */
  .bar { position:sticky; top:0; z-index:10; display:flex; align-items:center; justify-content:space-between;
    gap:14px; height:56px; padding:0 22px; background:rgba(15,15,15,.94); backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line); }
  .brand { display:flex; align-items:center; gap:10px; font-size:18px; font-weight:700; letter-spacing:.3px; color:#fff; }
  .brand svg { display:block; }
  .nav { display:flex; gap:18px; font-size:13px; color:var(--dim); }
  .nav a:hover { color:#fff; }
  .search { flex:1 1 auto; max-width:480px; margin:0 8px; height:38px; padding:0 14px; border-radius:19px;
    border:1px solid var(--line); background:#121212; color:var(--fg); font:inherit; font-size:14px; outline:none; }
  .search:focus { border-color:#3d6; }
  .search::placeholder { color:#777; }
  #noresults { display:none; color:var(--dim); padding:8px 24px 60px; }
  @media (max-width:620px){ .search { max-width:none; } .nav { display:none; } }
  /* featured showcase hero */
  .featured { padding:22px 24px 8px; max-width:1700px; }
  .hero { display:grid; grid-template-columns:minmax(0,1.6fr) minmax(260px,1fr); gap:26px; align-items:center; }
  .hero-thumb { position:relative; aspect-ratio:16/9; border-radius:16px; overflow:hidden; background:#181818; }
  .hero-thumb img { width:100%; height:100%; object-fit:cover; display:block; transition:transform .4s ease; }
  .hero:hover .hero-thumb img { transform:scale(1.03); }
  .hero-thumb .gl { display:grid; place-items:center; width:100%; height:100%; font-size:84px; }
  .hero-eyebrow { color:var(--gold); font-size:12px; font-weight:700; letter-spacing:1.2px; text-transform:uppercase; }
  .hero-title { font-size:clamp(26px,4vw,38px); font-weight:800; color:#fff; margin:8px 0 12px; letter-spacing:.3px; }
  .hero-blurb { color:var(--dim); font-size:14.5px; line-height:1.65; margin:0; }
  .hero-cta { display:inline-block; margin-top:18px; background:var(--gold); color:#15130a; font-weight:700;
    font-size:13.5px; padding:10px 18px; border-radius:9px; }
  .hero:hover .hero-cta { filter:brightness(1.08); }
  @media (max-width:760px){ .hero { grid-template-columns:1fr; gap:14px; } }
  .section-h { padding:10px 24px 0; max-width:1700px; font-size:15px; font-weight:700; color:#f1f1f1; }
  /* youtube-style responsive thumbnail grid */
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(330px,1fr));
    gap:30px 16px; padding:18px 24px 56px; max-width:1700px; }
  .ytcard { display:block; }
  .thumb { position:relative; aspect-ratio:16/9; background:#181818; border-radius:12px; overflow:hidden; }
  .thumb img { width:100%; height:100%; object-fit:cover; display:block; transition:transform .3s ease; }
  .ytcard:hover .thumb img { transform:scale(1.04); }
  .thumb canvas { position:absolute; inset:0; width:100%; height:100%; padding:12px 10px 6px; background:#0d1016; }
  .thumb .gl { display:grid; place-items:center; width:100%; height:100%; font-size:56px; }
  /* the LIVE badge — bottom-left, like a YouTube live chip */
  .st { position:absolute; bottom:9px; left:9px; font-size:11px; font-weight:700; letter-spacing:.4px;
    text-transform:uppercase; padding:3px 7px; border-radius:4px; display:inline-flex; align-items:center; gap:5px;
    background:var(--red); color:#fff; }
  .st::before { content:""; width:6px; height:6px; border-radius:50%; background:#fff; }
  .st.paused { background:var(--gold); color:#1a1500; }
  .st:not(.live):not(.paused) { background:#555; }   /* offline */
  /* meta row under the thumbnail */
  .meta { display:flex; gap:12px; margin-top:11px; align-items:flex-start; }
  .ava { flex:0 0 auto; width:36px; height:36px; border-radius:50%; display:grid; place-items:center;
    background:var(--hover); font-size:18px; font-weight:700; color:#fff; }
  .info { min-width:0; }
  .info .title { font-size:15px; font-weight:600; color:#f1f1f1; line-height:1.3; }
  .info .sub { font-size:13px; color:var(--dim); margin-top:3px; }
  .foot { color:var(--dim); font-size:12.5px; border-top:1px solid var(--line); margin:0 24px;
    padding:18px 0 40px; }
  .foot a { margin-right:18px; } .foot a:hover { color:#fff; }
</style>
</head>
<body>
<header class="bar">
  <div class="brand">
    <svg viewBox="0 0 400 400" width="24" height="24" aria-hidden="true"><polygon points="200,40 360,200 200,360 40,200" fill="none" stroke="#D4AF37" stroke-width="30" stroke-linejoin="round"/><circle cx="200" cy="200" r="46" fill="#D4AF37"/></svg>
    Artel Worlds
  </div>
  <input id="search" class="search" type="search" placeholder="Search worlds — name or kind" aria-label="Search worlds" autocomplete="off">
  <nav class="nav">
    <a href="/ui">Operations</a>
    <a href="https://artel.run/ui" target="_blank" rel="noopener">Artel</a>
    <a href="https://github.com/NicolasPrimeau/artel-worlds" target="_blank" rel="noopener">Source</a>
  </nav>
</header>
<section class="featured">
    <!--FEATURED-->
</section>

<h2 class="section-h">More worlds</h2>
<main class="grid">
    <!--WORLDS-->
</main>
<p id="noresults">No worlds match that search.</p>

<div class="foot">
  <a href="/ui">Operations &amp; cost →</a>
  <a href="https://github.com/NicolasPrimeau/artel-worlds" target="_blank" rel="noopener">Source ↗</a>
  <a href="https://github.com/NicolasPrimeau/artel" target="_blank" rel="noopener">Artel core ↗</a>
</div>
<script>
// status badges reflect REAL world state (live / paused / offline), proxied server-side to dodge CORS
async function refreshStatus() {
  try {
    const r = await fetch("/hub/status.json");
    if (!r.ok) return;
    const d = await r.json();
    for (const key of Object.keys(d)) {
      const s = d[key], el = document.getElementById("st-" + key);
      if (!el || !s) continue;
      if (s.up === false) { el.textContent = "OFFLINE"; el.className = "st"; }
      else if (s.paused) { el.textContent = "PAUSED"; el.className = "st paused"; }
      else { el.textContent = "LIVE"; el.className = "st live"; }
      const card = document.querySelector('.ytcard[data-key="' + key + '"]');
      if (card) card.dataset.views = (s.up === false ? -1 : (s.viewers || 0));
    }
    sortGrid();
  } catch (e) { /* leave the static badges */ }
}
// popularity sort: most viewers first; offline last; curated rank breaks ties
function sortGrid() {
  const grid = document.querySelector(".grid");
  if (!grid) return;
  [...grid.querySelectorAll(".ytcard")]
    .sort((a, b) => (+b.dataset.views - +a.dataset.views) || (+a.dataset.rank - +b.dataset.rank))
    .forEach(c => grid.appendChild(c));
}
refreshStatus();
setInterval(refreshStatus, 30000);

// search: filter the hero + grid by name/kind; hide the framing while a query is active
const search = document.getElementById("search");
function applySearch() {
  const q = (search.value || "").trim().toLowerCase();
  let any = false;
  document.querySelectorAll("[data-q]").forEach(el => {
    const show = !q || el.dataset.q.includes(q);
    el.style.display = show ? "" : "none";
    if (show) any = true;
  });
  const hero = document.querySelector(".hero");
  const heroOn = hero && hero.style.display !== "none";
  const feat = document.querySelector(".featured");
  if (feat) feat.style.display = (!q || heroOn) ? "" : "none";
  document.querySelectorAll(".section-h").forEach(h => h.style.display = q ? "none" : "");
  const nr = document.getElementById("noresults");
  if (nr) nr.style.display = any ? "none" : "";
}
if (search) search.addEventListener("input", applySearch);

// the Watchtower card is not a screenshot — it draws the experiment's REAL live curve,
// and keeps it live: refetched every minute while the page is open
let wtChart = null;
async function drawWatchtower() {
  try {
    if (!window.Chart || document.hidden) return;
    const r = await fetch("/hub/watchtower.json");
    if (!r.ok) return;
    const d = await r.json();
    const pts = (d.wedge || []).filter(w => w.artel_mttr != null || w.solo_mttr != null);
    if (pts.length < 2) return;
    const cv = document.getElementById("wt-live");
    if (!cv) return;
    cv.hidden = false;
    const img = document.querySelector("#wt-thumb img"); if (img) img.style.visibility = "hidden";
    if (wtChart) {
      wtChart.data.labels = pts.map(w => w.from_seq);
      wtChart.data.datasets[0].data = pts.map(w => w.solo_mttr);
      wtChart.data.datasets[1].data = pts.map(w => w.artel_mttr);
      wtChart.update("none");
      return;
    }
    const secs = v => v >= 60 ? +(v/60).toFixed(1) + "m" : v + "s";
    Chart.defaults.color = "#aaa";
    Chart.defaults.borderColor = "#2a2a2a";
    Chart.defaults.font.family = "Roboto, Arial, sans-serif";
    Chart.defaults.font.size = 9;
    wtChart = new Chart(cv, { type: "line",
      data: { labels: pts.map(w => w.from_seq), datasets: [
        { label: "Solo (alone)", data: pts.map(w => w.solo_mttr), borderColor: "#ffae42",
          pointRadius: 2, borderWidth: 2, tension: .3, spanGaps: true },
        { label: "Artel (shared)", data: pts.map(w => w.artel_mttr), borderColor: "#3d8bff",
          backgroundColor: "rgba(61,139,255,.10)", fill: "-1", pointRadius: 2, borderWidth: 2,
          tension: .3, spanGaps: true },
      ]},
      options: { animation: false, maintainAspectRatio: false, events: [],
        scales: { x: { grid: { display: false }, title: { display: true, text: "incident #" } },
                  y: { beginAtZero: true, ticks: { callback: secs, maxTicksLimit: 5 } } },
        plugins: { legend: { display: true, position: "top", labels: { boxWidth: 8, boxHeight: 8 } } } }
    });
  } catch (_) {}
}
addEventListener("load", () => { drawWatchtower(); setInterval(drawWatchtower, 60000); });
addEventListener("visibilitychange", () => { if (!document.hidden) drawWatchtower(); });
</script>
</body>
</html>

app = "artel-worlds"
primary_region = "yyz"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 200
    soft_limit = 150

[mounts]
  source = "worlds_data"
  destination = "/data"  # persists only the operator pause flag; the world stays in-memory

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"  # Claude CLI genome-authoring for LLM tribes (claude-sdk provider)

[checks]
  [checks.health]
    grace_period = "15s"
    interval = "10s"
    method = "GET"
    path = "/health"
    port = 8000
    timeout = "5s"
    type = "http"

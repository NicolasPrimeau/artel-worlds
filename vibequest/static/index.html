<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VibeQuest</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎲</text></svg>">
<style>
:root {
  --cream:   #FAF6EE;
  --rose:    #E8B4A8;
  --gold:    #D4A843;
  --sage:    #A8C5B0;
  --lavender:#C4B0D4;
  --ink:     #2C1A12;
  --muted:   #7A6558;
  --line:    #D9CFC0;
  --panel:   rgba(250,246,238,0.92);
  --card-acc:#F2D0C0;
  --card-act:#F5E6B0;
  --card-cha:#DDD0EF;
  --card-twk:#C8DDD0;
  --shadow:  0 2px 16px rgba(44,26,18,0.10);
  --shadow-h:0 8px 32px rgba(44,26,18,0.18);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--cream);
  color: var(--ink);
  font-family: Georgia, 'Times New Roman', serif;
  overflow: hidden;
}

/* ── Typography ── */
.label {
  font-family: 'Courier New', monospace;
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
}

.serif { font-family: Georgia, serif; }
.mono  { font-family: 'Courier New', monospace; }

/* ── Header ── */
#hdr {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  background: var(--panel);
  border-bottom: 1px solid var(--line);
  backdrop-filter: blur(12px);
  z-index: 100;
}

#brand {
  font-size: 17px;
  font-weight: 700;
  letter-spacing: 0.06em;
  color: var(--ink);
}
#brand span { color: var(--gold); }

.hdr-pills { display: flex; gap: 8px; align-items: center; }

.pill {
  display: flex;
  align-items: center;
  gap: 6px;
  height: 28px;
  padding: 0 12px;
  background: var(--cream);
  border: 1px solid var(--line);
  border-radius: 999px;
  font-family: 'Courier New', monospace;
  font-size: 11px;
  color: var(--muted);
  white-space: nowrap;
}

.pill-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--sage);
}
.pill-dot.warn { background: var(--gold); }
.pill-dot.danger { background: var(--rose); }

/* ── Main layout ── */
#main {
  position: fixed;
  top: 52px; bottom: 144px;
  left: 0; right: 0;
  display: grid;
  grid-template-columns: 340px 1fr;
  overflow: hidden;
}

/* ── Left panel ── */
#left {
  border-right: 1px solid var(--line);
  overflow-y: auto;
  padding: 20px 18px;
  display: flex;
  flex-direction: column;
  gap: 18px;
}

.section-head {
  font-family: 'Courier New', monospace;
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 8px;
  border-bottom: 1px solid var(--line);
  padding-bottom: 4px;
}

/* Quest block */
#quest-title {
  font-size: 20px;
  font-weight: 700;
  line-height: 1.2;
  color: var(--ink);
  margin-bottom: 8px;
}

#quest-hook {
  font-size: 13px;
  line-height: 1.6;
  color: var(--ink);
  margin-bottom: 6px;
}

#quest-complication {
  font-size: 12px;
  line-height: 1.5;
  color: var(--muted);
  font-style: italic;
}

/* Steps progress */
#steps-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.step {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  font-family: 'Courier New', monospace;
  color: var(--muted);
  transition: all 0.3s;
}

.step.done {
  color: var(--sage);
  text-decoration: line-through;
  text-decoration-color: var(--sage);
}

.step-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  border: 1.5px solid var(--line);
  flex-shrink: 0;
  transition: all 0.3s;
}

.step.done .step-dot {
  background: var(--sage);
  border-color: var(--sage);
}

.step.active .step-dot {
  border-color: var(--gold);
  background: var(--gold);
}

/* Momentum */
#momentum-wrap {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

#momentum-bar-bg {
  width: 100%;
  height: 8px;
  background: var(--line);
  border-radius: 999px;
  overflow: hidden;
  position: relative;
}

#momentum-bar-fill {
  position: absolute;
  top: 0; bottom: 0;
  left: 50%;
  width: 0;
  border-radius: 999px;
  transition: width 0.6s ease, background 0.4s;
}

#momentum-label {
  font-family: 'Courier New', monospace;
  font-size: 11px;
  color: var(--muted);
  text-align: center;
}

/* Party */
#party-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.portrait {
  background: white;
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 10px 10px 8px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  transition: box-shadow 0.2s;
}

.portrait:hover { box-shadow: var(--shadow); }

.portrait-icon {
  font-size: 22px;
  line-height: 1;
}

.portrait-name {
  font-size: 11px;
  font-weight: 700;
  color: var(--ink);
  text-align: center;
}

.portrait-role {
  font-family: 'Courier New', monospace;
  font-size: 9px;
  letter-spacing: 0.1em;
  color: var(--muted);
  text-transform: uppercase;
}

.portrait-hp {
  width: 100%;
  height: 3px;
  background: var(--line);
  border-radius: 999px;
  overflow: hidden;
  margin-top: 4px;
}

.portrait-hp-fill {
  height: 100%;
  background: var(--sage);
  border-radius: 999px;
  transition: width 0.4s;
}

/* ── Right panel (narrative log) ── */
#right {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  padding: 20px 24px;
  position: relative;
}

#log-scroll {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 14px;
  padding-right: 4px;
}

#log-scroll::-webkit-scrollbar { width: 4px; }
#log-scroll::-webkit-scrollbar-track { background: transparent; }
#log-scroll::-webkit-scrollbar-thumb { background: var(--line); border-radius: 999px; }

.log-entry {
  opacity: 0;
  transform: translateY(6px);
  animation: entry-in 0.4s forwards;
  padding: 12px 14px;
  border-radius: 10px;
  border: 1px solid var(--line);
  background: white;
}

@keyframes entry-in {
  to { opacity: 1; transform: none; }
}

.log-entry.kind-quest_start,
.log-entry.kind-opening {
  background: linear-gradient(135deg, #FFF8F0 0%, white 100%);
  border-color: var(--gold);
}

.log-entry.kind-complication {
  background: white;
  border-color: var(--rose);
}

.log-entry.kind-resolution {
  background: white;
  border-color: var(--sage);
}

.log-entry.kind-quest_end {
  background: linear-gradient(135deg, #F0FFF4 0%, white 100%);
  border-color: var(--sage);
}

.log-meta {
  font-family: 'Courier New', monospace;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 4px;
}

.log-text {
  font-size: 13px;
  line-height: 1.65;
  color: var(--ink);
}

.log-consequence {
  font-size: 12px;
  color: var(--muted);
  font-style: italic;
  margin-top: 4px;
}

.reactions-wrap {
  margin-top: 10px;
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.reaction {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  font-size: 12px;
  color: var(--muted);
}

.reaction-name {
  font-weight: 700;
  color: var(--ink);
  white-space: nowrap;
  font-size: 11px;
  font-family: 'Courier New', monospace;
}

.reaction-line { font-style: italic; }

/* ── Card tray ── */
#tray {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 144px;
  background: var(--panel);
  border-top: 1px solid var(--line);
  backdrop-filter: blur(12px);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 12px 24px;
  z-index: 50;
}

.card {
  position: relative;
  width: 100px;
  height: 116px;
  border-radius: 12px;
  border: 1px solid var(--line);
  padding: 10px 9px 8px;
  cursor: pointer;
  user-select: none;
  display: flex;
  flex-direction: column;
  transition: transform 0.18s ease, box-shadow 0.18s ease;
  box-shadow: 0 1px 6px rgba(44,26,18,0.08);
}

.card:hover {
  transform: translateY(-8px) scale(1.04);
  box-shadow: var(--shadow-h);
}

.card:active { transform: translateY(-4px) scale(1.01); }

.card.played {
  opacity: 0.4;
  pointer-events: none;
  transform: scale(0.96);
}

.card.type-accumulate { background: var(--card-acc); }
.card.type-action      { background: var(--card-act); }
.card.type-chaos       { background: var(--card-cha); }
.card.type-tweak       { background: var(--card-twk); }

.card-corner {
  font-family: 'Courier New', monospace;
  font-size: 8px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--muted);
  opacity: 0.7;
}

.card-icon {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
}

.card-name {
  font-size: 10px;
  font-weight: 700;
  color: var(--ink);
  text-align: center;
  line-height: 1.25;
}

.card-flavor {
  font-size: 9px;
  color: var(--muted);
  font-style: italic;
  text-align: center;
  margin-top: 2px;
}

/* Tray locked state */
#tray.resolving {
  pointer-events: none;
  opacity: 0.5;
}

/* ── Timer ring ── */
#timer-ring {
  position: relative;
  width: 28px;
  height: 28px;
  flex-shrink: 0;
}

#timer-ring canvas {
  position: absolute;
  inset: 0;
}

/* ── Dice overlay ── */
#dice-overlay {
  position: fixed;
  inset: 0;
  z-index: 200;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s;
}

#dice-overlay.visible { opacity: 1; pointer-events: auto; }

#dice-backdrop {
  position: absolute;
  inset: 0;
  background: rgba(44,26,18,0.38);
  backdrop-filter: blur(4px);
}

#dice-box {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
}

#dice-card-label {
  font-family: 'Courier New', monospace;
  font-size: 12px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: rgba(250,246,238,0.8);
}

#dice-canvas {
  width: 140px;
  height: 140px;
}

#dice-value-label {
  font-size: 44px;
  font-weight: 700;
  color: var(--cream);
  letter-spacing: -0.02em;
  text-shadow: 0 2px 16px rgba(0,0,0,0.4);
  transition: color 0.3s;
}

#dice-result-label {
  font-family: 'Courier New', monospace;
  font-size: 14px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: rgba(250,246,238,0.7);
}

/* ── Window closing banner ── */
#window-banner {
  position: fixed;
  top: 62px;
  left: 50%;
  transform: translateX(-50%) translateY(-8px);
  background: var(--gold);
  color: var(--ink);
  font-family: 'Courier New', monospace;
  font-size: 11px;
  letter-spacing: 0.1em;
  padding: 6px 18px;
  border-radius: 999px;
  box-shadow: var(--shadow);
  opacity: 0;
  transition: opacity 0.3s, transform 0.3s;
  z-index: 150;
  white-space: nowrap;
}
#window-banner.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── Toast ── */
#toast {
  position: fixed;
  bottom: 160px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--ink);
  color: var(--cream);
  font-family: 'Courier New', monospace;
  font-size: 11px;
  letter-spacing: 0.08em;
  padding: 8px 18px;
  border-radius: 999px;
  z-index: 500;
  opacity: 0;
  transition: opacity 0.25s;
  pointer-events: none;
}
#toast.show { opacity: 1; }

/* ── Phase overlay (quest complete / intro) ── */
#phase-overlay {
  position: fixed;
  inset: 52px 0 144px;
  z-index: 180;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(250,246,238,0.9);
  backdrop-filter: blur(8px);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.5s;
}
#phase-overlay.show { opacity: 1; pointer-events: auto; }

#phase-box {
  text-align: center;
  padding: 40px;
  max-width: 440px;
}

#phase-title {
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 10px;
}

#phase-subtitle {
  font-size: 14px;
  color: var(--muted);
  line-height: 1.6;
}

/* ── Window timer bar ── */
#win-bar {
  position: fixed;
  top: 52px;
  left: 0; right: 0;
  height: 3px;
  background: var(--line);
  z-index: 99;
}
#win-bar-fill {
  height: 100%;
  background: var(--gold);
  transition: width 0.5s linear, background 0.3s;
  border-radius: 0 999px 999px 0;
}

/* ── Scrollbar polish ── */
#left::-webkit-scrollbar { width: 4px; }
#left::-webkit-scrollbar-track { background: transparent; }
#left::-webkit-scrollbar-thumb { background: var(--line); border-radius: 999px; }

/* ── Responsive ── */
@media (max-width: 700px) {
  #main { grid-template-columns: 1fr; }
  #left { display: none; }
}
</style>
</head>
<body>

<div id="hdr">
  <div id="brand">Vibe<span>Quest</span></div>
  <div class="hdr-pills">
    <div class="pill" id="pill-phase"><div class="pill-dot" id="phase-dot"></div><span id="phase-text">Loading…</span></div>
    <div class="pill" id="pill-window">⏳ <span id="win-time">—</span></div>
    <div class="pill">👁 <span id="viewers">—</span></div>
  </div>
</div>

<div id="win-bar"><div id="win-bar-fill" style="width:100%"></div></div>

<div id="main">
  <div id="left">
    <div>
      <div class="section-head">Quest</div>
      <div id="quest-title">—</div>
      <div id="quest-hook"></div>
      <div id="quest-complication" style="margin-top:6px"></div>
    </div>
    <div>
      <div class="section-head">Progress</div>
      <ul id="steps-list"></ul>
    </div>
    <div id="momentum-wrap">
      <div class="section-head">Momentum</div>
      <div id="momentum-bar-bg">
        <div id="momentum-bar-fill"></div>
      </div>
      <div id="momentum-label">—</div>
    </div>
    <div>
      <div class="section-head">The Party</div>
      <div id="party-grid"></div>
    </div>
  </div>

  <div id="right">
    <div class="section-head" style="margin-bottom:12px">Narrative</div>
    <div id="log-scroll"></div>
  </div>
</div>

<div id="tray" role="region" aria-label="Card hand">
  <div class="label" style="position:absolute;top:7px;left:50%;transform:translateX(-50%)">Your hand — play a card to influence the quest</div>
</div>

<!-- Dice overlay -->
<div id="dice-overlay">
  <div id="dice-backdrop"></div>
  <div id="dice-box">
    <div id="dice-card-label"></div>
    <canvas id="dice-canvas" width="280" height="280"></canvas>
    <div id="dice-value-label"></div>
    <div id="dice-result-label"></div>
  </div>
</div>

<!-- Window closing banner -->
<div id="window-banner">Window closing — resolving cards</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Phase overlay -->
<div id="phase-overlay">
  <div id="phase-box">
    <div id="phase-title"></div>
    <div id="phase-subtitle"></div>
  </div>
</div>

<script>
const ROLE_ICONS = {
  Paladin: '⚔️', Wizard: '🔮', Rogue: '🗡️', Bard: '🎭', Ranger: '🏹', Cleric: '✨'
};
const CARD_ICONS = {
  accumulate: '📈', action: '⚡', chaos: '🌀', tweak: '🔮'
};
const RESULT_LABELS = {
  nat_1: 'CRITICAL FAILURE', low: 'FAILURE', mid: 'PARTIAL', high: 'SUCCESS', nat_20: 'NATURAL 20'
};
const RESULT_COLORS = {
  nat_1: '#C44444', low: '#C88855', mid: '#C4A843', high: '#5BAA78', nat_20: '#D4A843'
};

let state = null;
let hand = [];
let playedSet = new Set();
let playerId = localStorage.getItem('vq_player') || (localStorage.setItem('vq_player', Math.random().toString(36).slice(2)), localStorage.getItem('vq_player'));

// ── WebSocket ──
const proto = location.protocol === 'https:' ? 'wss' : 'ws';
let ws = null;

function connect() {
  ws = new WebSocket(`${proto}://${location.host}/ws`);
  ws.onopen = () => console.log('connected');
  ws.onclose = () => setTimeout(connect, 2000);
  ws.onmessage = e => handle(JSON.parse(e.data));
}

connect();

function handle(msg) {
  switch (msg.type) {
    case 'state':
    case 'new_quest':
    case 'card_resolved':
      state = msg.state;
      render();
      break;
    case 'hand':
      hand = msg.cards;
      playedSet.clear();
      renderHand();
      break;
    case 'card_played':
      toast(`Card played — ${msg.card_count} in window`);
      updateWindowPill(msg.card_count);
      break;
    case 'window_closing':
      showBanner(`Resolving ${msg.card_count} card${msg.card_count===1?'':'s'}…`);
      setTrayLocked(true);
      break;
    case 'window_empty':
      hideBanner();
      setTrayLocked(false);
      break;
    case 'dice_roll':
      showDice(msg.dice_value, msg.dice_result, msg.card_name);
      break;
    case 'quest_complete':
      hideDice();
      hideBanner();
      setTrayLocked(false);
      state = msg.state;
      render();
      showPhase(msg.outcome);
      break;
  }
}

// ── Render ──
function render() {
  if (!state) return;
  const q = state.quest;

  // Header phase
  document.getElementById('phase-text').textContent = state.phase;
  document.getElementById('phase-dot').className = 'pill-dot' + (state.phase === 'resolving' ? ' warn' : state.phase === 'complete' ? ' danger' : '');
  document.getElementById('viewers').textContent = state.viewers;

  // Timer
  renderTimer();

  // Quest
  document.getElementById('quest-title').textContent = q.title;
  document.getElementById('quest-hook').textContent = q.hook;
  document.getElementById('quest-complication').textContent = q.complication;

  // Steps
  const sl = document.getElementById('steps-list');
  sl.innerHTML = '';
  q.completed_steps.forEach(s => {
    const li = document.createElement('li');
    li.className = 'step done';
    li.innerHTML = `<div class="step-dot"></div><span>${esc(s)}</span>`;
    sl.appendChild(li);
  });
  q.steps.forEach((s, i) => {
    const li = document.createElement('li');
    li.className = 'step' + (i===0?' active':'');
    li.innerHTML = `<div class="step-dot"></div><span>${esc(s)}</span>`;
    sl.appendChild(li);
  });

  // Momentum
  const m = q.momentum;
  const pct = Math.abs(m) / 10 * 50;
  const fill = document.getElementById('momentum-bar-fill');
  if (m >= 0) {
    fill.style.left = '50%';
    fill.style.right = 'auto';
    fill.style.width = pct + '%';
    fill.style.background = m > 5 ? '#4B8' : '#A8C5B0';
  } else {
    fill.style.right = '50%';
    fill.style.left = 'auto';
    fill.style.width = pct + '%';
    fill.style.background = m < -5 ? '#C44' : '#E8B4A8';
  }
  document.getElementById('momentum-label').textContent =
    m === 0 ? 'Balanced' : m > 0 ? `+${m} Momentum` : `${m} Momentum`;

  // Party
  const pg = document.getElementById('party-grid');
  pg.innerHTML = '';
  state.party.forEach(p => {
    const el = document.createElement('div');
    el.className = 'portrait';
    el.innerHTML = `
      <div class="portrait-icon">${ROLE_ICONS[p.role] || '🧙'}</div>
      <div class="portrait-name">${esc(p.name)}</div>
      <div class="portrait-role">${esc(p.role)}</div>
      <div class="portrait-hp"><div class="portrait-hp-fill" style="width:${(p.hp/20*100)}%"></div></div>
    `;
    pg.appendChild(el);
  });

  // Log
  renderLog(state.log);

  // Phase overlay
  if (state.phase === 'complete') {
    showPhase(state.quest.outcome);
  } else {
    hidePhase();
  }

  // Tray locked
  setTrayLocked(state.phase === 'resolving');
}

// ── Log ──
let renderedLogLen = 0;

function renderLog(entries) {
  const scroll = document.getElementById('log-scroll');
  // only append new entries
  const toAdd = entries.slice(renderedLogLen);
  toAdd.forEach(e => {
    const div = document.createElement('div');
    div.className = `log-entry kind-${e.kind}`;
    const kindLabel = (e.kind || '').replace(/_/g,' ').toUpperCase();
    let inner = `<div class="log-meta">${kindLabel}</div><div class="log-text">${esc(e.text)}</div>`;
    if (e.consequence) {
      inner += `<div class="log-consequence">${esc(e.consequence)}</div>`;
    }
    if (e.reactions && e.reactions.length) {
      inner += '<div class="reactions-wrap">';
      e.reactions.forEach(r => {
        inner += `<div class="reaction"><span class="reaction-name">${esc(r.name)}</span><span class="reaction-line">"${esc(r.line)}"</span></div>`;
      });
      inner += '</div>';
    }
    div.innerHTML = inner;
    scroll.appendChild(div);
  });
  renderedLogLen = entries.length;
  if (toAdd.length) {
    scroll.scrollTop = scroll.scrollHeight;
  }
}

// ── Hand ──
function renderHand() {
  const tray = document.getElementById('tray');
  const old = tray.querySelectorAll('.card');
  old.forEach(c => c.remove());

  hand.forEach(card => {
    const el = document.createElement('div');
    el.className = `card type-${card.type}${playedSet.has(card.id) ? ' played' : ''}`;
    el.innerHTML = `
      <div class="card-corner">${card.type.slice(0,3)}</div>
      <div class="card-icon">${CARD_ICONS[card.type] || '?'}</div>
      <div class="card-name">${esc(card.name)}</div>
      <div class="card-flavor">${esc(card.flavor)}</div>
    `;
    el.addEventListener('click', () => playCard(card));
    el.title = card.description;
    tray.appendChild(el);
  });
}

async function playCard(card) {
  if (playedSet.has(card.id)) return;
  if (state && state.phase !== 'active') { toast('Wait for the current resolution to finish'); return; }
  playedSet.add(card.id);
  renderHand();
  try {
    const r = await fetch('/play', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({card_id: card.id, player_id: playerId}),
    });
    const data = await r.json();
    if (!data.ok) { playedSet.delete(card.id); renderHand(); toast(data.error || 'Error'); }
    else toast(`${card.name} played — ${data.card_count} card${data.card_count===1?'':'s'} in window`);
  } catch {
    playedSet.delete(card.id); renderHand(); toast('Connection error');
  }
}

// ── Timer ──
function renderTimer() {
  if (!state) return;
  const w = state.window;
  const now = Date.now() / 1000;
  const total = w.closes_at - w.opened_at;
  const left = Math.max(0, w.closes_at - now);
  const pct = total > 0 ? (left / total) : 1;

  const fill = document.getElementById('win-bar-fill');
  fill.style.width = (pct * 100) + '%';
  fill.style.background = pct < 0.2 ? 'var(--rose)' : pct < 0.5 ? 'var(--gold)' : 'var(--sage)';

  const secs = Math.ceil(left);
  document.getElementById('win-time').textContent = `${secs}s`;
}

setInterval(() => { if (state) renderTimer(); }, 500);

function updateWindowPill(count) {
  document.getElementById('win-time').textContent = `${count} card${count===1?'':'s'}`;
}

// ── Banner ──
function showBanner(text) {
  const b = document.getElementById('window-banner');
  b.textContent = text;
  b.classList.add('show');
}
function hideBanner() {
  document.getElementById('window-banner').classList.remove('show');
}

// ── Toast ──
let _toastT = null;
function toast(text) {
  const el = document.getElementById('toast');

  el.classList.add('show');

  _toastT = setTimeout(() => el.classList.remove('show'), 2200);

// ── Tray lock ──
function setTrayLocked(locked) {

}

// ── Phase overlay ──
function showPhase(outcome) {
  const el = document.getElementById('phase-overlay');
  document.getElementById('phase-title').textContent = outcome === 'success' ? 'Quest Complete.' : 'Quest Failed.';
  const hook = state?.quest?.hook || '';
  document.getElementById('phase-subtitle').textContent = outcome === 'success'
    ? `The fellowship prevailed. A new quest begins shortly.`
    : `The fellowship fell short. A new quest begins shortly.`;
  el.classList.add('show');
}
function hidePhase() {
  document.getElementById('phase-overlay').classList.remove('show');
}

// ── Dice overlay ──
const diceCanvas = document.getElementById('dice-canvas');
const diceCtx = diceCanvas.getContext('2d');
let _diceAnim = null;

function showDice(value, result, cardName) {
  const overlay = document.getElementById('dice-overlay');
  const valEl = document.getElementById('dice-value-label');
  const resEl = document.getElementById('dice-result-label');
  document.getElementById('dice-card-label').textContent = cardName || '';
  valEl.textContent = value;
  valEl.style.color = RESULT_COLORS[result] || '#fff';
  resEl.textContent = RESULT_LABELS[result] || result;
  valEl.style.opacity = '0';
  resEl.style.opacity = '0';
  valEl.style.transition = 'opacity 0.4s';
  resEl.style.transition = 'opacity 0.4s';
  overlay.classList.add('visible');
  animateDice(value, result, () => {
    valEl.style.opacity = '1';
    resEl.style.opacity = '1';
  });
  setTimeout(hideDice, 4500);
}

function hideDice() {
  document.getElementById('dice-overlay').classList.remove('visible');
  if (_diceAnim) { cancelAnimationFrame(_diceAnim); _diceAnim = null; }
}

function animateDice(finalValue, result, onReveal) {
  const W = diceCanvas.width, H = diceCanvas.height;
  const cx = W/2, cy = H/2;
  const color = RESULT_COLORS[result] || '#fff';
  let t = 0;
  const totalFrames = 80;

  function frame() {
    diceCtx.clearRect(0, 0, W, H);

    // spin fake value early on
    const displaying = t < 55
      ? (Math.floor(Math.random() * 20) + 1)
      : finalValue;

    const spin = t < 55 ? (t / 55) * Math.PI * 4 : Math.PI * 4;
    const scale = t < 55 ? 0.6 + 0.4 * (t / 55) : 1;
    const alpha = t < 55 ? 0.6 + 0.4 * (t / 55) : 1;

    diceCtx.save();
    diceCtx.globalAlpha = alpha;
    diceCtx.translate(cx, cy);
    diceCtx.rotate(t < 55 ? spin * 0.08 : 0);
    diceCtx.scale(scale, scale);

    // d20 shape (icosahedron face = triangle)
    const R = 95;
    diceCtx.beginPath();
    for (let i = 0; i < 3; i++) {
      const angle = (i * Math.PI * 2 / 3) - Math.PI / 2;
      i === 0 ? diceCtx.moveTo(Math.cos(angle)*R, Math.sin(angle)*R)
               : diceCtx.lineTo(Math.cos(angle)*R, Math.sin(angle)*R);
    }
    diceCtx.closePath();

    const grad = diceCtx.createRadialGradient(0, -20, 10, 0, 0, R);
    grad.addColorStop(0, 'rgba(255,255,255,0.12)');
    grad.addColorStop(1, 'rgba(0,0,0,0.18)');
    diceCtx.fillStyle = color + '22';
    diceCtx.fill();
    diceCtx.strokeStyle = color;
    diceCtx.lineWidth = 2;
    diceCtx.stroke();

    // inner triangle
    const r = R * 0.55;
    diceCtx.beginPath();
    for (let i = 0; i < 3; i++) {
      const angle = (i * Math.PI * 2 / 3) - Math.PI / 2 + Math.PI;
      i === 0 ? diceCtx.moveTo(Math.cos(angle)*r, Math.sin(angle)*r)
               : diceCtx.lineTo(Math.cos(angle)*r, Math.sin(angle)*r);
    }
    diceCtx.closePath();
    diceCtx.strokeStyle = color + '66';
    diceCtx.lineWidth = 1;
    diceCtx.stroke();

    // Number
    diceCtx.font = `bold ${t<55?36:44}px Georgia`;
    diceCtx.fillStyle = t < 55 ? 'rgba(255,255,255,0.7)' : '#fff';
    diceCtx.textAlign = 'center';
    diceCtx.textBaseline = 'middle';
    diceCtx.fillText(displaying, 0, 8);

    diceCtx.restore();
    if (t === 55 && onReveal) onReveal();
    t++;
    if (t < totalFrames) _diceAnim = requestAnimationFrame(frame);
  }
  frame();
}

// ── Fetch initial hand if WS doesn't send it ──
async function maybeGetHand() {
  if (hand.length === 0) {
    const r = await fetch('/hand');
    const data = await r.json();
    hand = data;
    renderHand();
  }
}
setTimeout(maybeGetHand, 2000);

function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

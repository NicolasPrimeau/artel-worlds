<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#0a0f0a">
<title>Pitch — Artel Worlds</title>
<meta property="og:title" content="Pitch — the AI World Cup">
<meta property="og:description" content="AI teams play live soccer. One side coordinates through Artel; the rest go it alone.">
<meta property="og:url" content="https://pitch.artel.run/">
<style>
  :root { --bg:#0a0f0a; --home:#3d8bff; --away:#ff6a3d; --dim:#7d8a80; --green:#6ee7a8; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { margin:0; height:100%; background:var(--bg); color:#eafff0; overflow:hidden;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
  #app { display:flex; flex-direction:column; height:100vh; height:100dvh; position:relative; }
  #bar { display:flex; justify-content:center; align-items:center; gap:8px;
    padding:calc(6px + env(safe-area-inset-top)) 12px 6px; flex:0 0 auto; }
  /* TV broadcast score bug: clock pill + colour caps + 3-letter codes over full club names */
  #bar .center { display:flex; flex-direction:column; align-items:center; gap:4px; min-width:0; }
  #bug { display:inline-flex; align-items:stretch; border-radius:7px; overflow:hidden;
    font-variant-numeric:tabular-nums; box-shadow:0 1px 8px rgba(0,0,0,.45); border:1px solid #000; }
  #clock { background:#101a10; color:#bfe8cb; padding:0 9px; font-weight:700; font-size:13px;
    letter-spacing:.5px; border-right:1px solid #000; min-width:48px; display:flex; align-items:center;
    justify-content:center; }
  .side { background:#0b0f0b; display:flex; align-items:stretch; }
  .side .sw { width:5px; }
  .side.h .sw { background:var(--home); } .side.a .sw { background:var(--away); }
  .stack { display:flex; flex-direction:column; justify-content:center; padding:3px 9px; line-height:1.1;
    max-width:34vw; }
  .side.h .stack { align-items:flex-end; } .side.a .stack { align-items:flex-start; }
  .abbr { font-weight:800; font-size:14px; letter-spacing:1px; }
  .side.h .abbr { color:var(--home); } .side.a .abbr { color:var(--away); }
  .fullnm { font-size:9px; color:var(--dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    max-width:100%; }
  #score { background:#161d16; padding:0 12px; font-weight:800; font-size:18px; white-space:nowrap;
    display:flex; align-items:center; }
  /* tournament strip — tappable, lives right in the scoreboard so the cup is front-and-centre */
  #tourbar { background:none; border:0; cursor:pointer; display:flex; flex-direction:column;
    align-items:center; gap:1px; padding:1px 8px; border-radius:6px; }
  #tourbar:hover { background:#10160f; }
  #round { font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:#cdebd7; font-weight:800; }
  #upnext { font-size:10px; color:var(--dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    max-width:74vw; }
  /* connection status — a badge built into the round line, centred with the scoreboard so it can
     never overlap or push the score bug. green = live, amber = paused, red = offline. */
  .rline { display:flex; align-items:center; justify-content:center; gap:7px; }
  #conn { font-size:10px; color:var(--dim); white-space:nowrap; letter-spacing:.5px;
    text-transform:uppercase; display:inline-flex; align-items:center; gap:4px; }
  #conn::before { content:""; width:7px; height:7px; border-radius:50%; background:var(--dim); }
  #conn.live { color:var(--green); } #conn.live::before { background:var(--green); box-shadow:0 0 8px var(--green); }
  #conn.paused { color:#d4af37; } #conn.paused::before { background:#d4af37; }
  #conn.down { color:#d98a8a; }
  #wrap { position:relative; flex:1 1 auto; min-height:0; }
  canvas { position:absolute; inset:0; width:100%; height:100%; display:block; }
  #banner { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center;
    justify-content:center; pointer-events:none; opacity:0; transition:opacity .18s; gap:6px; }
  #banner.show { opacity:1; }
  #banner .big { font-weight:900; letter-spacing:3px; font-size:clamp(40px,13vw,96px);
    text-shadow:0 2px 36px rgba(0,0,0,.7); }
  #banner .sub { font-weight:700; font-size:clamp(14px,4vw,22px); color:#fff; text-shadow:0 2px 14px rgba(0,0,0,.7); }
  #toast { position:absolute; left:50%; bottom:10px; transform:translateX(-50%);
    font-size:11px; color:var(--dim); background:#0a0f0acc; padding:3px 10px; border-radius:20px;
    opacity:0; transition:opacity .2s; pointer-events:none; }
  #toast.show { opacity:1; }
  #foot { flex:0 0 auto; display:flex; gap:12px; justify-content:center; align-items:center; flex-wrap:wrap;
    padding:6px 12px calc(6px + env(safe-area-inset-bottom)); font-size:11px; color:var(--dim); }
  #foot a { color:var(--green); text-decoration:none; }
  #foot .gh { color:var(--dim); display:inline-flex; align-items:center; gap:4px; }
  .share { position:relative; }
  .share button { background:#10160f; border:1px solid #20271f; color:var(--dim); border-radius:7px;
    padding:4px 9px; font-size:11px; cursor:pointer; display:inline-flex; align-items:center; gap:5px; }
  .share button:hover { border-color:#2f3a30; color:#fff; }
  #sharepop[hidden] { display:none; }
  #sharepop { position:absolute; bottom:130%; left:50%; transform:translateX(-50%); display:flex;
    flex-direction:column; background:#10160f; border:1px solid #20271f; border-radius:8px; overflow:hidden; }
  #sharepop a, #sharepop button { background:none; border:0; border-bottom:1px solid #1a201a; color:var(--dim);
    padding:8px 16px; font-size:12px; white-space:nowrap; text-align:left; }
  #sharepop a:hover, #sharepop button:hover { background:#1a201a; color:#fff; }
  #cup[hidden] { display:none; }
  #cup { position:fixed; inset:0; z-index:20; background:#05080699; backdrop-filter:blur(3px);
    display:flex; align-items:center; justify-content:center; padding:14px; }
  .cup-box { background:#0c1110; border:1px solid #20271f; border-radius:14px; width:min(760px,100%);
    max-height:92dvh; display:flex; flex-direction:column; overflow:hidden;
    box-shadow:0 20px 60px rgba(0,0,0,.6); }
  .cup-head { display:flex; align-items:center; justify-content:space-between; padding:12px 16px;
    border-bottom:1px solid #1a201a; }
  .cup-head b { font-size:15px; } .cup-head .ed { color:var(--dim); font-weight:400; font-size:12px; }
  #cupClose { background:none; border:0; color:var(--dim); font-size:20px; cursor:pointer; line-height:1; }
  #cupClose:hover { color:#fff; }
  .cup-tabs { display:flex; gap:4px; padding:8px 12px; border-bottom:1px solid #1a201a; flex-wrap:wrap; }
  .cup-tabs button { background:none; border:1px solid #20271f; color:var(--dim); border-radius:20px;
    padding:5px 12px; font-size:12px; cursor:pointer; }
  .cup-tabs button.on { background:var(--green); border-color:var(--green); color:#04140a; font-weight:700; }
  .cup-body { overflow:auto; padding:14px 16px; }
  .tab { display:none; } .tab.on { display:block; }
  #tab-bracket svg { display:block; height:auto; width:1132px; max-width:none; }
  .bracket-scroll { overflow-x:auto; overflow-y:hidden; -webkit-overflow-scrolling:touch;
    touch-action:pan-x; overscroll-behavior-x:contain; }
  .bracket-hint { text-align:center; color:var(--dim); font-size:10px; margin-top:6px; }
  .champ { text-align:center; font-size:13px; color:#d4af37; font-weight:700; margin-bottom:10px; }
  table.cup { width:100%; border-collapse:collapse; font-size:13px; }
  table.cup th { text-align:left; color:var(--dim); font-weight:600; font-size:11px;
    text-transform:uppercase; letter-spacing:.5px; padding:6px 6px; border-bottom:1px solid #1a201a; }
  table.cup td { padding:7px 6px; border-bottom:1px solid #12170f; }
  table.cup td.num, table.cup th.num { text-align:right; font-variant-numeric:tabular-nums; }
  table.cup .rk { color:var(--dim); width:22px; }
  table.cup .pts { font-weight:800; color:var(--green); }
  table.cup .gl { font-weight:800; color:var(--green); }
  .sched-rnd { color:var(--dim); font-size:11px; text-transform:uppercase; letter-spacing:1px;
    margin:12px 0 4px; }
  .sched-row { display:flex; align-items:center; gap:8px; padding:6px 4px; border-bottom:1px solid #12170f;
    font-size:13px; }
  .sched-row .tm { flex:1; } .sched-row .tm.r { text-align:right; }
  .sched-row .sc { font-variant-numeric:tabular-nums; color:var(--dim); min-width:46px; text-align:center; }
  .sched-row.live { color:#fff; } .sched-row.live .sc { color:#d4af37; font-weight:700; }
  .win { color:#6ee7a8; font-weight:700; }
  /* LANDSCAPE on a phone: the pitch is height-limited (empty margins to the sides), so pull the
     scoreboard and footer OUT of the vertical stack and float them as broadcast overlays — the
     field then fills the full height instead of being squeezed between a top bar and a footer. */
  @media (orientation:landscape) and (max-height:600px) {
    #app { flex-direction:row; align-items:stretch; }
    #wrap { flex:1 1 auto; }
    /* LEFT RAIL — the scoreboard, restacked into a vertical card */
    #bar { flex:0 0 auto; width:clamp(122px,21vw,158px); display:flex; flex-direction:column;
      align-items:stretch; justify-content:center; gap:8px; grid-template-columns:none; background:none;
      padding:8px 8px 8px calc(8px + env(safe-area-inset-left)); }
    #bar .edge { display:none; }
    #bar .center { width:100%; flex-direction:column; gap:7px; }
    #bug { width:100%; flex-direction:column; }
    #clock { border-right:none; border-bottom:1px solid #000; padding:5px 0; min-width:0;
      justify-content:center; }
    .side { flex-direction:row; align-items:stretch; }
    .side .stack { flex:1; align-items:flex-start; }
    #score { justify-content:center; padding:6px 0; border-top:1px solid #000; }
    #round { text-align:center; }
    #upnext { text-align:center; white-space:normal; max-width:100%; }
    /* RIGHT RAIL — the footer links, stacked */
    #foot { flex:0 0 auto; width:clamp(110px,19vw,142px); flex-direction:column; flex-wrap:nowrap;
      align-items:flex-end; justify-content:center; gap:12px; background:none; text-align:right;
      padding:8px calc(10px + env(safe-area-inset-right)) 8px 8px; }
  }
</style>
</head>
<body>
<div id="app">
  <div id="bar">
    <span class="center">
      <span id="bug">
        <span id="clock">0:00</span>
        <span class="side h"><i class="sw"></i><span class="stack"><b class="abbr" id="abH">—</b><span class="fullnm" id="nmH"></span></span></span>
        <span id="score">0–0</span>
        <span class="side a"><span class="stack"><b class="abbr" id="abA">—</b><span class="fullnm" id="nmA"></span></span><i class="sw"></i></span>
      </span>
      <button id="tourbar" type="button" aria-label="open tournament">
        <span class="rline"><span id="conn">live</span><span id="round"></span></span>
        <span id="upnext"></span>
      </button>
    </span>
  </div>
  <div id="wrap">
    <canvas id="cv"></canvas>
    <div id="banner"><span class="big" id="bannerBig"></span><span class="sub" id="bannerSub"></span></div>
    <div id="toast"></div>
  </div>
  <div id="foot">
    <span>⚽ Pitch — <b>Artel Worlds</b></span>
    <a href="https://artel.run" target="_blank" rel="noopener">Artel ↗</a>
    <a class="gh" href="https://github.com/NicolasPrimeau/artel-worlds" target="_blank" rel="noopener">source ↗</a>
    <a href="https://worlds.artel.run/worlds" target="_blank" rel="noopener">all worlds →</a>
    <span class="share"><button id="sharebtn" type="button" aria-label="share">
      <svg viewBox="0 0 16 16" width="11" height="11" fill="currentColor"><path d="M11 2.5a2.5 2.5 0 1 1 .603 1.628l-6.718 3.12a2.499 2.499 0 0 1 0 1.504l6.718 3.12a2.5 2.5 0 1 1-.488.876l-6.718-3.12a2.5 2.5 0 1 1 0-3.256l6.718-3.12A2.5 2.5 0 0 1 11 2.5z"/></svg> share</button>
      <div id="sharepop" hidden><button id="sharecopy" type="button">copy link</button>
        <a id="shareli" target="_blank" rel="noopener">LinkedIn</a><a id="sharex" target="_blank" rel="noopener">X</a></div></span>
  </div>
</div>
<div id="cup" hidden>
  <div class="cup-box">
    <div class="cup-head"><b>🏆 AI World Cup <span class="ed" id="cupEd"></span></b>
      <button id="cupClose" type="button" aria-label="close">✕</button></div>
    <div class="cup-tabs">
      <button data-tab="bracket" class="on">Bracket</button>
      <button data-tab="boot">Golden Boot</button>
      <button data-tab="teams">Standings</button>
      <button data-tab="sched">Schedule</button>
    </div>
    <div class="cup-body">
      <div id="tab-bracket" class="tab on"></div>
      <div id="tab-boot" class="tab"></div>
      <div id="tab-teams" class="tab"></div>
      <div id="tab-sched" class="tab"></div>
    </div>
  </div>
</div>
<script>
const $ = id => document.getElementById(id);
const abbr = s => ((s || '').normalize('NFD').replace(/[^A-Za-z]/g, '').slice(0, 3).toUpperCase() || '—');
function upNext(t) {
  if (!t) return '';
  if (t.champion) return '🏆 ' + t.champion + ' — champions';
  const flat = t.rounds.flat();
  const i = flat.findIndex(x => x.live);
  const nx = i >= 0 ? flat[i + 1] : null;
  return nx ? `Up next: ${nx.a || 'TBD'} vs ${nx.b || 'TBD'}` : '';
}
const cv = $('cv'), ctx = cv.getContext('2d');
let world = { length:120, width:80, goal_width:24 };
let buf = [], latest = null;  // buf: timestamped snapshots; latest: newest (for the scoreboard)
const RENDER_DELAY = 150;  // render this far behind live so we always interpolate between two
                           // RECEIVED frames (never extrapolate) — absorbs network jitter, no stutter
let view = null, ballTrail = [], selected = null, lastTour = null, fitW = 0, fitH = 0;

function resize() {
  const dpr = Math.min(2, window.devicePixelRatio || 1), r = cv.getBoundingClientRect();
  fitW = r.width; fitH = r.height;
  cv.width = Math.max(1, Math.round(r.width * dpr));
  cv.height = Math.max(1, Math.round(r.height * dpr));
  computeView();
}
function computeView() {
  const cw = cv.width, ch = cv.height, L = world.length, Wd = world.width;
  const landscape = cw >= ch;
  const scale = landscape ? Math.min(cw / L, ch / Wd) * 0.96 : Math.min(cw / Wd, ch / L) * 0.96;
  const pw = (landscape ? L : Wd) * scale, ph = (landscape ? Wd : L) * scale;
  view = { scale, rot: !landscape, ox: (cw - pw) / 2, oy: (ch - ph) / 2 };
}
function S(wx, wy) {
  return view.rot ? [view.ox + wy * view.scale, view.oy + wx * view.scale]
                  : [view.ox + wx * view.scale, view.oy + wy * view.scale];
}
// A ResizeObserver re-fits whenever the canvas box actually changes — the reliable signal on
// mobile, where 'resize'/'orientationchange' fire at the wrong time (or not at all) and the
// viewport keeps settling as the toolbar animates. The window events stay as a belt-and-braces.
if (window.ResizeObserver) new ResizeObserver(() => resize()).observe(cv);
addEventListener('resize', resize);
const rekick = () => { resize(); setTimeout(resize, 200); setTimeout(resize, 500); };
addEventListener('orientationchange', rekick);
matchMedia('(orientation: portrait)').addEventListener?.('change', rekick);
if (window.visualViewport) visualViewport.addEventListener('resize', resize);

function screenToWorld(sx, sy) {
  if (!view) return [0, 0];
  return view.rot ? [(sy - view.oy) / view.scale, (sx - view.ox) / view.scale]
                  : [(sx - view.ox) / view.scale, (sy - view.oy) / view.scale];
}
cv.addEventListener('click', e => {  // tap a player to reveal their name; tap elsewhere to clear
  if (!latest) return;
  const r = cv.getBoundingClientRect();
  const [wx, wy] = screenToWorld((e.clientX - r.left) * (cv.width / r.width),
                                 (e.clientY - r.top) * (cv.height / r.height));
  let best = null, bd = 4.5;
  for (const p of latest.players) { const d = Math.hypot(p.x - wx, p.y - wy); if (d < bd) { bd = d; best = p.id; } }
  selected = best;
});

function line(pts) { ctx.beginPath(); pts.forEach(([wx, wy], i) => {
  const [px, py] = S(wx, wy); i ? ctx.lineTo(px, py) : ctx.moveTo(px, py); }); ctx.stroke(); }
function arc(wx, wy, rW, a0, a1) { const [cx, cy] = S(wx, wy); ctx.beginPath();
  ctx.arc(cx, cy, rW * view.scale, a0, a1); ctx.stroke(); }
function dot(wx, wy, rW, fill) { const [cx, cy] = S(wx, wy); ctx.beginPath();
  ctx.arc(cx, cy, rW * view.scale, 0, 7); ctx.fillStyle = fill; ctx.fill(); }

function drawField() {
  const L = world.length, Wd = world.width, s = view.scale;
  ctx.clearRect(0, 0, cv.width, cv.height);
  const [x0, y0] = S(0, 0), [x1, y1] = S(L, Wd);
  ctx.fillStyle = '#123a1c';
  ctx.fillRect(Math.min(x0, x1), Math.min(y0, y1), Math.abs(x1 - x0), Math.abs(y1 - y0));
  const stripes = 12;
  for (let i = 0; i < stripes; i += 2) {
    const [ax, ay] = S(L / stripes * i, 0), [bx, by] = S(L / stripes * (i + 1), Wd);
    ctx.fillStyle = '#15431f';
    ctx.fillRect(Math.min(ax, bx), Math.min(ay, by), Math.abs(bx - ax), Math.abs(by - ay));
  }
  ctx.strokeStyle = 'rgba(225,245,230,.5)'; ctx.lineWidth = Math.max(1, s * 0.22);
  line([[0,0],[L,0],[L,Wd],[0,Wd],[0,0]]);          // boundary
  line([[L/2,0],[L/2,Wd]]);                            // halfway
  arc(L/2, Wd/2, 9.15, 0, 7);                          // centre circle
  dot(L/2, Wd/2, 0.4, 'rgba(225,245,230,.5)');         // centre spot
  const boy0 = Wd/2 - 20, boy1 = Wd/2 + 20, box = 16;
  line([[0,boy0],[box,boy0],[box,boy1],[0,boy1]]);     // boxes
  line([[L,boy0],[L-box,boy0],[L-box,boy1],[L,boy1]]);
  dot(11, Wd/2, 0.4, 'rgba(225,245,230,.5)'); dot(L-11, Wd/2, 0.4, 'rgba(225,245,230,.5)');  // pen spots
  arc(0,0,2,0,Math.PI/2); arc(0,Wd,2,-Math.PI/2,0); arc(L,0,2,Math.PI/2,Math.PI); arc(L,Wd,2,Math.PI,3*Math.PI/2); // corners
  // goals — posts + a faint net
  const gm = world.goal_width/2, by0 = Wd/2 - gm, by1 = Wd/2 + gm;
  ctx.strokeStyle = '#fff'; ctx.lineWidth = Math.max(2, s*0.45);
  line([[0,by0],[0,by1]]); line([[L,by0],[L,by1]]);
  ctx.strokeStyle = 'rgba(255,255,255,.18)'; ctx.lineWidth = 1;
  for (let g = by0; g <= by1; g += 3) { line([[0,g],[-3,g]]); line([[L,g],[L+3,g]]); }
}

function lerp(a, b, t) { return a + (b - a) * t; }
function frame() {
  if (!buf.length) return { players: [], ball: null };
  const rt = performance.now() - RENDER_DELAY;
  let a = buf[0], b = buf[buf.length - 1];
  if (rt <= buf[0].t) { a = b = buf[0]; }
  else if (rt >= buf[buf.length - 1].t) { a = b = buf[buf.length - 1]; }
  else { for (let i = 0; i < buf.length - 1; i++) {
    if (buf[i].t <= rt && buf[i + 1].t >= rt) { a = buf[i]; b = buf[i + 1]; break; } } }
  const span = b.t - a.t, al = span > 0 ? (rt - a.t) / span : 1;
  const A = a.snap, B = b.snap, pm = {};
  A.players.forEach(p => pm[p.id] = p);
  // SNAP across teleports (dead-ball repositioning, kickoff resets) instead of lerping — otherwise
  // the ball/players visibly slide across the pitch when they're placed for a goal kick etc.
  const jump = (q, p, lim) => Math.hypot(p.x - q.x, p.y - q.y) > lim;
  const players = B.players.map(p => { const q = pm[p.id] || p;
    return jump(q, p, 8) ? { ...p } : { ...p, x: lerp(q.x, p.x, al), y: lerp(q.y, p.y, al) }; });
  const teleport = jump(A.ball, B.ball, 14);
  const ball = teleport ? { x: B.ball.x, y: B.ball.y, teleport: true }
                        : { x: lerp(A.ball.x, B.ball.x, al), y: lerp(A.ball.y, B.ball.y, al) };
  return { players, ball };
}

function render() {
  // Poll the canvas box every frame and re-fit on any change. This is the backstop that makes
  // orientation changes reliable on every device — it needs no resize/orientationchange event to
  // fire (those are flaky on mobile); a size change is caught within one frame regardless.
  const rr = cv.getBoundingClientRect();
  if (Math.abs(rr.width - fitW) > 0.5 || Math.abs(rr.height - fitH) > 0.5) resize();
  if (view && latest) {
    drawField();
    const { players, ball } = frame(), s = view.scale, pr = Math.max(4.5, s * 1.55);
    for (const p of players) {            // player shadows
      const [px, py] = S(p.x + 0.6, p.y + 0.6);
      ctx.beginPath(); ctx.arc(px, py, pr, 0, 7); ctx.fillStyle = 'rgba(0,0,0,.28)'; ctx.fill();
    }
    for (const p of players) {
      const [px, py] = S(p.x, p.y), gk = p.role === 'GK';
      ctx.beginPath(); ctx.arc(px, py, pr, 0, 7);
      // keepers wear a distinct shade of the team colour so they read at a glance
      ctx.fillStyle = gk ? (p.team === 'home' ? '#0c2f6b' : '#7a2a14')
                         : (p.team === 'home' ? '#3d8bff' : '#ff6a3d'); ctx.fill();
      ctx.lineWidth = Math.max(1, s*0.22); ctx.strokeStyle = 'rgba(255,255,255,.7)'; ctx.stroke();
      if (p.num != null && pr >= 6) {            // shirt number on the dot
        const nf = Math.max(8, pr * 1.05);
        ctx.font = `800 ${nf}px -apple-system,sans-serif`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillStyle = 'rgba(255,255,255,.95)'; ctx.fillText(p.num, px, py + nf * 0.06);
        ctx.textAlign = 'start'; ctx.textBaseline = 'alphabetic';
      }
    }
    if (ball) {
      if (ball.teleport) ballTrail.length = 0;  // don't streak the trail across a reposition
      ballTrail.push({ x: ball.x, y: ball.y }); if (ballTrail.length > 7) ballTrail.shift();
      ballTrail.forEach((b, i) => { const a = i / ballTrail.length;
        dot(b.x, b.y, s*0.0 + Math.max(1.6, s*0.7) / view.scale * a, `rgba(255,255,255,${0.05 + a*0.12})`); });
      const [bx, by] = S(ball.x + 0.5, ball.y + 0.7);  // ball shadow
      ctx.beginPath(); ctx.arc(bx, by, Math.max(2.2, s*0.8), 0, 7); ctx.fillStyle = 'rgba(0,0,0,.3)'; ctx.fill();
      const [px, py] = S(ball.x, ball.y);
      ctx.beginPath(); ctx.arc(px, py, Math.max(2.6, s*0.85), 0, 7);
      ctx.fillStyle = '#fff'; ctx.fill(); ctx.lineWidth = 1; ctx.strokeStyle = '#1a1a1a'; ctx.stroke();
    }
    if (selected != null) {                       // tapped player: ring + name label above
      const p = players.find(q => q.id === selected);
      if (!p) { selected = null; }
      else {
        const [px, py] = S(p.x, p.y), col = p.team === 'home' ? '#3d8bff' : '#ff6a3d';
        ctx.beginPath(); ctx.arc(px, py, pr + 4, 0, 7); ctx.strokeStyle = col;
        ctx.lineWidth = Math.max(1.5, s * 0.3); ctx.stroke();
        const stats = p.han != null
          ? `HAN ${p.han}   PAC ${p.pac}   KIK ${p.pas}`
          : `PAC ${p.pac}   SHO ${p.sho}   PAS ${p.pas}   STR ${p.str}`;
        const fs = Math.max(12, s * 1.4), sf = Math.max(9.5, s * 1.0), padX = 9;
        ctx.font = `700 ${fs}px -apple-system,sans-serif`; const nw = ctx.measureText(p.name).width;
        ctx.font = `600 ${sf}px -apple-system,sans-serif`; const sw = ctx.measureText(stats).width;
        const w = Math.max(nw, sw), h = fs + sf + 14;
        let lx = px - w / 2 - padX, ly = py - pr - 8 - h;
        lx = Math.max(2, Math.min(cv.width - w - padX * 2 - 2, lx));
        if (ly < 2) ly = py + pr + 8;             // flip below if no room above
        ctx.fillStyle = 'rgba(10,15,10,.93)';
        if (ctx.roundRect) { ctx.beginPath(); ctx.roundRect(lx, ly, w + padX * 2, h, 7); ctx.fill(); }
        else ctx.fillRect(lx, ly, w + padX * 2, h);
        ctx.strokeStyle = col; ctx.lineWidth = 1.2;
        if (ctx.roundRect) ctx.stroke();
        ctx.textAlign = 'left'; ctx.textBaseline = 'top';
        ctx.fillStyle = '#fff'; ctx.font = `700 ${fs}px -apple-system,sans-serif`;
        ctx.fillText(p.name, lx + padX, ly + 5);
        ctx.fillStyle = '#9fb4a6'; ctx.font = `600 ${sf}px -apple-system,sans-serif`;
        ctx.fillText(stats, lx + padX, ly + 5 + fs + 3);
        ctx.textAlign = 'start'; ctx.textBaseline = 'alphabetic';
      }
    }
  }
  requestAnimationFrame(render);
}

function setBanner(big, sub, color) {
  if (!big) { $('banner').classList.remove('show'); return; }
  $('bannerBig').textContent = big; $('bannerBig').style.color = color || '#fff';
  $('bannerSub').textContent = sub || ''; $('banner').classList.add('show');
}
let toastT;
function setToast(text) {
  const el = $('toast'); if (!text) { el.classList.remove('show'); return; }
  el.textContent = text; el.classList.add('show');
  clearTimeout(toastT); toastT = setTimeout(() => el.classList.remove('show'), 2200);
}

function apply(s) {
  if (s.length !== world.length || s.width !== world.width) { world = s; computeView(); }
  if (latest && latest.match_no !== s.match_no) { buf = []; ballTrail = []; selected = null; }  // new match
  latest = s;
  buf.push({ t: performance.now(), snap: s });
  if (buf.length > 12) buf.shift();
  $('abH').textContent = abbr(s.home.club); $('abA').textContent = abbr(s.away.club);
  $('nmH').textContent = s.home.club; $('nmA').textContent = s.away.club;
  $('score').textContent = `${s.home.score}–${s.away.score}`;
  $('round').textContent = s.round || '';
  $('upnext').textContent = upNext(s.tournament);
  // broadcast clock: a continuous MM:SS over a 90:00 match, ticking with seconds like TV
  const secs = Math.min(5400, Math.floor(s.tick / s.match_ticks * 5400));
  $('clock').textContent = s.fulltime ? 'FT' : `${Math.floor(secs / 60)}:${String(secs % 60).padStart(2, '0')}`;
  // banner is driven by server state — the goal freeze holds it long enough to read
  if (s.celebrating) {
    setBanner('GOAL', s.scorer || '', s.goal_team === 'home' ? '#3d8bff' : '#ff6a3d');
  } else if (s.fulltime && s.champion && s.round === 'Final') {
    setBanner('CHAMPIONS', s.champion, '#d4af37');
  } else if (s.fulltime) {
    const w = s.home.score > s.away.score ? s.home.club : s.away.score > s.home.score ? s.away.club : 'DRAW';
    setBanner('FULL TIME', w, '#6ee7a8');
  } else { setBanner(null); }
  lastTour = s.tournament;
  if (!$('cup').hidden) renderTour(lastTour);
  if (s.restart && apply._lastRestart !== s.tick - (s.tick % 1)) {
    const labels = { corner: 'Corner', 'goal-kick': 'Goal kick', 'throw-in': 'Throw-in' };
    if (apply._restartShown !== s.restart + ':' + s.match_no) { setToast(labels[s.restart] || ''); }
  }
  apply._restartShown = s.restart ? s.restart + ':' + s.match_no : null;
}

let ws, retry = 0;
function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/stream`);
  ws.onopen = () => { retry = 0; $('conn').className = 'live'; $('conn').textContent = 'live'; };
  ws.onmessage = e => { try { const s = JSON.parse(e.data); applyConn(s); apply(s); } catch (_) {} };
  ws.onclose = () => { $('conn').className = 'down'; $('conn').textContent = 'offline';
    setTimeout(connect, Math.min(3000, 400 * 2 ** retry++)); };
  ws.onerror = () => ws.close();
}
function applyConn(s) {  // the socket's up, but reflect the WORLD's state (paused vs live)
  const c = $('conn');
  if (s.paused) { c.textContent = 'paused'; c.className = 'paused'; }
  else { c.textContent = 'live'; c.className = 'live'; }
}
addEventListener('focus', () => { if (!ws || ws.readyState > 1) connect(); });

// share — native OS share sheet on mobile (navigator.share); popover fallback on desktop
(function () {
  const url = 'https://pitch.artel.run/', title = 'The AI World Cup — live on Pitch';
  $('shareli').href = 'https://www.linkedin.com/sharing/share-offsite/?url=' + encodeURIComponent(url);
  $('sharex').href = 'https://twitter.com/intent/tweet?url=' + encodeURIComponent(url) + '&text=' + encodeURIComponent(title);
  const btn = $('sharebtn'), pop = $('sharepop'), copy = $('sharecopy');
  btn.addEventListener('click', e => {
    e.stopPropagation();
    if (navigator.share) { navigator.share({ title, text: title, url }).catch(() => {}); return; }
    pop.hidden = !pop.hidden;
  });
  copy.addEventListener('click', async () => {
    try { await navigator.clipboard.writeText(url); } catch (_) {
      const t = document.createElement('textarea'); t.value = url; document.body.appendChild(t); t.select();
      try { document.execCommand('copy'); } catch (__) {} t.remove();
    }
    copy.textContent = 'copied ✓'; pop.hidden = true;
    setTimeout(() => { copy.textContent = 'copy link'; }, 1400);
  });
  document.addEventListener('click', e => { if (!e.target.closest('.share')) pop.hidden = true; });
})();

// --- tournament popup: bracket (SVG, with connecting lines), Golden Boot, standings, schedule ---
const esc = t => (t == null ? '' : String(t)).replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]));
const trim = (t, n) => { t = t || '—'; return t.length > n ? t.slice(0, n - 1) + '…' : t; };

function tieBox(t, x, y, w, h) {  // a single matchup card in the SVG bracket
  const live = t.live, gold = '#d4af37';
  const stroke = live ? gold : '#26312a';
  const rows = [[t.a, t.sa, t.winner && t.winner === t.a], [t.b, t.sb, t.winner && t.winner === t.b]];
  let g = `<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="5" fill="#0e1411" stroke="${stroke}" stroke-width="${live ? 2 : 1}"/>`;
  if (live) g += `<text x="${x + w - 5}" y="${y - 4}" text-anchor="end" font-size="8" fill="${gold}" font-weight="700">LIVE</text>`;
  rows.forEach((r, i) => {
    const ry = y + h / 2 * i, won = r[2] && t.played;
    const col = won ? '#6ee7a8' : (t.played && t.winner ? '#7c8a80' : '#cfe9d8');
    if (i) g += `<line x1="${x + 5}" y1="${ry}" x2="${x + w - 5}" y2="${ry}" stroke="#12170f"/>`;
    g += `<text x="${x + 6}" y="${ry + h / 4 + 3.5}" font-size="8.5" fill="${col}" font-weight="${won ? 700 : 400}">${esc(trim(r[0], 26))}</text>`;
    if (t.played) g += `<text x="${x + w - 6}" y="${ry + h / 4 + 3.5}" text-anchor="end" font-size="9.5" font-weight="700" fill="${col}">${r[1]}</text>`;
  });
  return g;
}
function connector(x1, ys, x2, y2) {  // two feeders (at x1, heights ys) joining one target at (x2,y2)
  const xm = (x1 + x2) / 2, c = '#2a352d';
  let g = `<polyline points="${x1},${ys[0]} ${xm},${ys[0]} ${xm},${ys[1]} ${x1},${ys[1]}" fill="none" stroke="${c}"/>`;
  g += `<line x1="${xm}" y1="${y2}" x2="${x2}" y2="${y2}" stroke="${c}"/>`;
  return g;
}
function renderBracket(t) {
  // two-sided 16-team draw: 8 teams down each flank (Round of 16 -> QF -> SF) converging on the
  // final in the centre. Left half = round slots 0-3 / 0-1 / 0; right half = the rest.
  const W = 148, H = 36;
  const r16 = t.rounds[0], qf = t.rounds[1], sf = t.rounds[2], third = t.rounds[3][0], fin = t.rounds[4][0];
  const X = [6, 168, 330, 492, 654, 816, 978];  // 7 columns: R16 QF SF | FINAL | SF QF R16
  const r16y = [22, 80, 138, 196], qfy = [51, 167], sfy = 109, finy = 109, thy = 242;
  const cx = X[3] + W / 2;
  let g = `<svg viewBox="0 0 1132 262" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,sans-serif">`;
  g += `<text x="${cx}" y="${finy - H / 2 - 7}" text-anchor="middle" font-size="10" fill="#7c8a80" letter-spacing="1.5">FINAL</text>`;
  g += `<text x="${cx}" y="${thy - H / 2 - 6}" text-anchor="middle" font-size="9" fill="#7c8a80" letter-spacing="1">THIRD PLACE</text>`;
  // connectors — left flank
  g += connector(X[0] + W, [r16y[0], r16y[1]], X[1], qfy[0]) + connector(X[0] + W, [r16y[2], r16y[3]], X[1], qfy[1]);
  g += connector(X[1] + W, [qfy[0], qfy[1]], X[2], sfy);
  g += `<line x1="${X[2] + W}" y1="${sfy}" x2="${X[3]}" y2="${finy}" stroke="#2a352d"/>`;
  // connectors — right flank (feeders sit to the right of their target)
  g += connector(X[6], [r16y[0], r16y[1]], X[5] + W, qfy[0]) + connector(X[6], [r16y[2], r16y[3]], X[5] + W, qfy[1]);
  g += connector(X[5], [qfy[0], qfy[1]], X[4] + W, sfy);
  g += `<line x1="${X[4]}" y1="${sfy}" x2="${X[3] + W}" y2="${finy}" stroke="#2a352d"/>`;
  // boxes
  for (let i = 0; i < 4; i++) { g += tieBox(r16[i], X[0], r16y[i] - H / 2, W, H); g += tieBox(r16[i + 4], X[6], r16y[i] - H / 2, W, H); }
  g += tieBox(qf[0], X[1], qfy[0] - H / 2, W, H) + tieBox(qf[1], X[1], qfy[1] - H / 2, W, H);
  g += tieBox(qf[2], X[5], qfy[0] - H / 2, W, H) + tieBox(qf[3], X[5], qfy[1] - H / 2, W, H);
  g += tieBox(sf[0], X[2], sfy - H / 2, W, H) + tieBox(sf[1], X[4], sfy - H / 2, W, H);
  g += tieBox(fin, X[3], finy - H / 2, W, H) + tieBox(third, X[3], thy - H / 2, W, H);
  if (t.champion) g += `<text x="${cx}" y="${finy + H / 2 + 18}" text-anchor="middle" font-size="12" fill="#d4af37" font-weight="800">🏆 ${esc(trim(t.champion, 20))}</text>`;
  g += `</svg>`;
  return `<div class="bracket-scroll">${g}</div><div class="bracket-hint">← swipe to see the full draw →</div>`;
}
function renderBoot(t) {
  if (!t.scorers.length) return '<p style="color:#7c8a80">No goals yet this edition.</p>';
  let h = '<table class="cup"><tr><th class="rk"></th><th>Player</th><th>Club</th><th class="num">⚽</th></tr>';
  t.scorers.forEach((r, i) => h += `<tr><td class="rk">${i + 1}</td><td>${esc(r.name)}</td><td style="color:#9fb4a6">${esc(r.club)}</td><td class="num gl">${r.goals}</td></tr>`);
  return h + '</table>';
}
function renderTeams(t) {
  if (!t.teams.length) return '<p style="color:#7c8a80">No results yet this edition.</p>';
  let h = '<table class="cup"><tr><th class="rk"></th><th>Club</th><th class="num">P</th><th class="num">W</th><th class="num">L</th><th class="num">GF</th><th class="num">GA</th><th class="num">Pts</th></tr>';
  t.teams.forEach((r, i) => h += `<tr><td class="rk">${i + 1}</td><td>${esc(r.club)}</td><td class="num">${r.p}</td><td class="num">${r.w}</td><td class="num">${r.l}</td><td class="num">${r.gf}</td><td class="num">${r.ga}</td><td class="num pts">${r.pts}</td></tr>`);
  return h + '</table>';
}
function renderSched(t) {
  let h = '', last = null;
  t.rounds.flat().forEach(tie => {
    if (tie.rnd !== last) { h += `<div class="sched-rnd">${esc(tie.rnd)}</div>`; last = tie.rnd; }
    const pens = tie.pa != null ? ` (${tie.pa}-${tie.pb} pens)` : '';
    const sc = tie.played ? `${tie.sa}–${tie.sb}` : (tie.live ? 'LIVE' : 'vs');
    const aw = tie.played && tie.winner === tie.a ? 'win' : '', bw = tie.played && tie.winner === tie.b ? 'win' : '';
    h += `<div class="sched-row ${tie.live ? 'live' : ''}"><span class="tm r ${aw}">${esc(trim(tie.a, 40))}</span><span class="sc">${sc}</span><span class="tm ${bw}">${esc(trim(tie.b, 40))}</span><span style="color:#7c8a80;font-size:11px">${pens}</span></div>`;
  });
  return h;
}
let _tourSig = '';
function renderTour(t) {
  if (!t) return;
  // rebuild only when the tournament data actually changes — otherwise every websocket frame
  // would replace the DOM and reset the bracket's scroll position mid-swipe (the scroll bug).
  const sig = JSON.stringify(t);
  if (sig === _tourSig) return;
  _tourSig = sig;
  const sc = $('tab-bracket').querySelector('.bracket-scroll');
  const keepLeft = sc ? sc.scrollLeft : 0;
  $('cupEd').textContent = 'Edition ' + t.edition + (t.champion ? ' · 🏆 ' + t.champion : '');
  $('tab-bracket').innerHTML = renderBracket(t);
  $('tab-boot').innerHTML = renderBoot(t);
  $('tab-teams').innerHTML = renderTeams(t);
  $('tab-sched').innerHTML = renderSched(t);
  const sc2 = $('tab-bracket').querySelector('.bracket-scroll');
  if (sc2) sc2.scrollLeft = keepLeft;
}
(function () {
  const open = () => { $('cup').hidden = false; _tourSig = ''; renderTour(lastTour); };
  const close = () => { $('cup').hidden = true; };
  $('tourbar').addEventListener('click', open);
  $('cupClose').addEventListener('click', close);
  $('cup').addEventListener('click', e => { if (e.target.id === 'cup') close(); });
  addEventListener('keydown', e => { if (e.key === 'Escape') close(); });
  document.querySelectorAll('.cup-tabs button').forEach(b => b.addEventListener('click', () => {
    document.querySelectorAll('.cup-tabs button').forEach(x => x.classList.toggle('on', x === b));
    document.querySelectorAll('.cup-body .tab').forEach(x => x.classList.toggle('on', x.id === 'tab-' + b.dataset.tab));
  }));
})();

resize();
connect();
requestAnimationFrame(render);
</script>

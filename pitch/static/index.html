<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#0a0f0a">
<title>Pitch — Artel Worlds</title>
<style>
  :root { --bg:#0a0f0a; --home:#3d8bff; --away:#ff6a3d; --line:#cfe9d6; --dim:#7d8a80; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { margin:0; height:100%; background:var(--bg); color:#eafff0; overflow:hidden;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
  #app { display:flex; flex-direction:column; height:100dvh; }
  /* scoreboard */
  #bar { display:flex; align-items:center; justify-content:center; gap:10px;
    padding:calc(6px + env(safe-area-inset-top)) 10px 6px; flex:0 0 auto; }
  #bar .club { font-weight:700; font-size:clamp(12px,3.4vw,18px); white-space:nowrap;
    overflow:hidden; text-overflow:ellipsis; max-width:32vw; }
  #bar .h { color:var(--home); text-align:right; } #bar .a { color:var(--away); text-align:left; }
  #score { font-weight:800; font-variant-numeric:tabular-nums; font-size:clamp(18px,5vw,26px);
    background:#11181230; border:1px solid #20271f; border-radius:8px; padding:2px 12px; }
  #clock { font-size:clamp(10px,2.6vw,13px); color:var(--dim); min-width:34px; text-align:center; }
  #wrap { position:relative; flex:1 1 auto; min-height:0; }
  canvas { position:absolute; inset:0; width:100%; height:100%; display:block; }
  #banner { position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    pointer-events:none; opacity:0; transition:opacity .2s; }
  #banner.show { opacity:1; }
  #banner span { font-weight:900; letter-spacing:2px; font-size:clamp(34px,12vw,90px);
    text-shadow:0 2px 30px rgba(0,0,0,.6); }
  #conn { position:absolute; top:6px; right:8px; font-size:10px; color:var(--dim); }
  #conn.live::before { content:"● "; color:#6ee7a8; }
  #conn.down { color:#d98a8a; }
  #foot { flex:0 0 auto; display:flex; gap:14px; justify-content:center; align-items:center;
    padding:5px 10px calc(5px + env(safe-area-inset-bottom)); font-size:11px; color:var(--dim); }
  #foot a { color:#6ee7a8; text-decoration:none; }
  #ticker { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:60vw; }
</style>
</head>
<body>
<div id="app">
  <div id="bar">
    <span class="club h" id="homeClub">—</span>
    <span id="score">0–0</span>
    <span class="club a" id="awayClub">—</span>
  </div>
  <div id="wrap">
    <canvas id="cv"></canvas>
    <div id="banner"><span id="bannerText"></span></div>
    <div id="conn">connecting…</div>
    <div style="position:absolute;top:6px;left:8px;font-size:11px;color:var(--dim)" id="clock">0'</div>
  </div>
  <div id="foot">
    <span>⚽ Pitch — <b>Artel Worlds</b></span>
    <span id="ticker"></span>
    <a href="https://worlds.artel.run/worlds" target="_blank" rel="noopener">all worlds →</a>
  </div>
</div>
<script>
const $ = id => document.getElementById(id);
const cv = $('cv'), ctx = cv.getContext('2d');
let world = {length:120, width:80, goal_width:24};
let prev = null, cur = null, recvAt = 0, lastScore = "0-0";
const STEP_MS = 100;  // server tick rate; we interpolate across it
let dpr = 1, view = null;

function resize() {
  dpr = Math.min(2, window.devicePixelRatio || 1);
  const r = cv.getBoundingClientRect();
  cv.width = Math.max(1, Math.round(r.width * dpr));
  cv.height = Math.max(1, Math.round(r.height * dpr));
  computeView();
}
function computeView() {
  const cw = cv.width, ch = cv.height, L = world.length, Wd = world.width;
  const landscape = cw >= ch;
  // landscape: pitch laid out long-axis horizontal. portrait: rotate 90° so it fills a tall screen.
  const scale = landscape ? Math.min(cw / L, ch / Wd) * 0.96 : Math.min(cw / Wd, ch / L) * 0.96;
  const pw = (landscape ? L : Wd) * scale, ph = (landscape ? Wd : L) * scale;
  view = { scale, rot: !landscape, ox: (cw - pw) / 2, oy: (ch - ph) / 2 };
}
function S(wx, wy) {  // world -> screen (device px)
  return view.rot
    ? [view.ox + wy * view.scale, view.oy + wx * view.scale]
    : [view.ox + wx * view.scale, view.oy + wy * view.scale];
}
addEventListener('resize', resize);
addEventListener('orientationchange', () => setTimeout(resize, 200));

function drawField() {
  const L = world.length, Wd = world.width, s = view.scale;
  ctx.clearRect(0, 0, cv.width, cv.height);
  // grass + subtle stripes
  const [x0, y0] = S(0, 0), [x1, y1] = S(L, Wd);
  ctx.fillStyle = '#123a1c';
  ctx.fillRect(Math.min(x0, x1), Math.min(y0, y1), Math.abs(x1 - x0), Math.abs(y1 - y0));
  ctx.save();
  const stripes = 10;
  for (let i = 0; i < stripes; i++) {
    if (i % 2) continue;
    const a = (L / stripes) * i, b = (L / stripes) * (i + 1);
    const [ax, ay] = S(a, 0), [bx, by] = S(b, Wd);
    ctx.fillStyle = '#15431f';
    ctx.fillRect(Math.min(ax, bx), Math.min(ay, by), Math.abs(bx - ax), Math.abs(by - ay));
  }
  ctx.restore();
  ctx.strokeStyle = 'rgba(207,233,214,.55)'; ctx.lineWidth = Math.max(1, s * 0.25);
  const line = pts => { ctx.beginPath(); pts.forEach(([wx, wy], i) => {
    const [px, py] = S(wx, wy); i ? ctx.lineTo(px, py) : ctx.moveTo(px, py); }); ctx.stroke(); };
  // boundary
  line([[0,0],[L,0],[L,Wd],[0,Wd],[0,0]]);
  // halfway
  line([[L/2,0],[L/2,Wd]]);
  // centre circle
  ctx.beginPath(); const [cx, cy] = S(L/2, Wd/2); ctx.arc(cx, cy, 10*s, 0, 7); ctx.stroke();
  // penalty boxes + goal mouths
  const gm = world.goal_width/2, by0 = Wd/2 - gm, by1 = Wd/2 + gm;
  const box = 16, boy0 = Wd/2 - 20, boy1 = Wd/2 + 20;
  line([[0,boy0],[box,boy0],[box,boy1],[0,boy1]]);
  line([[L,boy0],[L-box,boy0],[L-box,boy1],[L,boy1]]);
  // goals (thick posts)
  ctx.strokeStyle = '#fff'; ctx.lineWidth = Math.max(2, s*0.5);
  line([[0,by0],[0,by1]]); line([[L,by0],[L,by1]]);
}

function lerp(a, b, t) { return a + (b - a) * t; }
function interpEntities() {
  if (!cur) return { players: [], ball: null };
  const t = prev ? Math.min(1, (performance.now() - recvAt) / STEP_MS) : 1;
  const pmap = {}; if (prev) prev.players.forEach(p => pmap[p.id] = p);
  const players = cur.players.map(p => {
    const q = pmap[p.id] || p;
    return { ...p, x: lerp(q.x, p.x, t), y: lerp(q.y, p.y, t) };
  });
  let ball = cur.ball;
  if (prev && prev.ball) ball = { x: lerp(prev.ball.x, cur.ball.x, t), y: lerp(prev.ball.y, cur.ball.y, t) };
  return { players, ball };
}

function render() {
  if (view) {
    drawField();
    const { players, ball } = interpEntities();
    const s = view.scale, pr = Math.max(4, s * 1.5);
    for (const p of players) {
      const [px, py] = S(p.x, p.y);
      ctx.beginPath(); ctx.arc(px, py, pr, 0, 7);
      ctx.fillStyle = p.team === 'home' ? getCss('--home') : getCss('--away');
      ctx.fill();
      ctx.lineWidth = Math.max(1, s*0.18); ctx.strokeStyle = 'rgba(0,0,0,.45)'; ctx.stroke();
      if (p.role === 'GK') { ctx.fillStyle = '#0a0f0a'; ctx.beginPath(); ctx.arc(px, py, pr*0.42, 0, 7); ctx.fill(); }
    }
    if (ball) {
      const [bx, by] = S(ball.x, ball.y);
      ctx.beginPath(); ctx.arc(bx, by, Math.max(2.5, s*0.85), 0, 7);
      ctx.fillStyle = '#fff'; ctx.fill();
      ctx.lineWidth = 1; ctx.strokeStyle = '#222'; ctx.stroke();
    }
  }
  requestAnimationFrame(render);
}
function getCss(v) { return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }

function flash(text, color, ms) {
  $('bannerText').textContent = text; $('bannerText').style.color = color;
  $('banner').classList.add('show');
  clearTimeout(flash._t); flash._t = setTimeout(() => $('banner').classList.remove('show'), ms);
}

function apply(s) {
  if (s.length !== world.length || s.width !== world.width) { world = s; computeView(); }
  else world = s;
  prev = cur; cur = s; recvAt = performance.now();
  $('homeClub').textContent = s.home.club;
  $('awayClub').textContent = s.away.club;
  const sc = `${s.home.score}–${s.away.score}`;
  $('score').textContent = sc;
  const mins = Math.min(90, Math.floor(s.tick / s.match_ticks * 90));
  $('clock').textContent = s.fulltime ? "FT" : mins + "'";
  // goal flash on score change (not at kickoff reset where match_no changes)
  const key = s.match_no + ":" + sc;
  if (apply._lastKey && apply._lastMatch === s.match_no && key !== apply._lastKey && !s.fulltime) {
    flash('GOAL', '#fff', 1600);
  }
  if (s.fulltime && apply._lastFt !== s.match_no) {
    apply._lastFt = s.match_no;
    const w = s.home.score > s.away.score ? s.home.club : s.away.score > s.home.score ? s.away.club : 'DRAW';
    flash('FULL TIME', '#6ee7a8', 5000);
  }
  apply._lastKey = key; apply._lastMatch = s.match_no;
  // ticker of recent results
  if (s.history && s.history.length) {
    $('ticker').textContent = s.history.slice().reverse()
      .map(r => `${r.home} ${r.h}–${r.a} ${r.away}`).join('   •   ');
  }
}

let ws, retry = 0;
function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/stream`);
  ws.onopen = () => { retry = 0; $('conn').className = 'live'; $('conn').textContent = 'live'; };
  ws.onmessage = e => { try { apply(JSON.parse(e.data)); } catch (_) {} };
  ws.onclose = () => { $('conn').className = 'down'; $('conn').textContent = 'reconnecting';
    setTimeout(connect, Math.min(3000, 400 * 2 ** retry++)); };
  ws.onerror = () => ws.close();
}
addEventListener('focus', () => { if (!ws || ws.readyState > 1) connect(); });

resize();
connect();
requestAnimationFrame(render);
</script>
</body>
</html>
